lizează la:\n- a) drumuri;\n- b) pardoseli rezistente la agresivitate chimică;\n- c) bolți și fundații solicitate puternic;\n- d) placarea în băi, holuri, încăperi cu umiditate mare;\n- e) placarea pilelor și culeelor de poduri.\n**Răspuns: a,b,e**\n22) Produse ceramice utilizate în lucrări de protecție și finisaj sunt:\n- a) cărămizile de placaj;\n- b) cahlele pentru sobe de teracotă;\n- c) faianțele;\n- d) gresiile;\n- e) porțelanul și semiporțelanul.\n**Răspuns: a,c,d**\n### Tehnologia de Fabricație\n23) Tehnologia de fabricație a materialelor ceramice cuprinde următoarele etape:\n- a) pregătirea amestecului de materii prime, uscarea formelor, arderea;\n- b) pregătirea amestecului de materii prime, fasonarea formelor crude; arderea, tratamentele de suprafață;\n- c) pregătirea amestecului de materii prime, fasonarea formelor crude; uscarea formelor, arderea, tratamentele de suprafață;\n- d) pregătirea amestecului de materii prime, fasonarea formelor crude; uscarea formelor, tratamentele de suprafață;\n- e) pregătirea amestecului de materii prime, fasonarea formelor crude; uscarea formelor, autoclavizarea.\n**Răspuns: c**\n24) Fasonarea materialelor ceramice determină:\n- a) eliminarea tensiunilor interne;\n- b) forma definitivă a produselor;\n- c) eliminarea controlată a apei;\n- d) creșterea durabilității;\n- e) reducerea contractiei la uscare.\n**Răspuns: b**\n25) Uscarea formelor crude ale materialelor ceramice determină:\n- a) eliminarea tensiunilor interne;\n- b) forma definitivă a produselor;\n- c) eliminarea controlată a apei;\n- d) creșterea durabilității;\n- e) reducerea contractiei la uscare.\n**Răspuns: c,e**\n26) Tratamentele de suprafață aplicate materialelor ceramice determină:\n- a) eliminarea tensiunilor interne;\n- b) forma definitivă a produselor;\n- c) eliminarea controlată a apei;\n- d) creșterea durabilității;\n- e) reducerea contractiei la uscare.\n**Răspuns: d**\n27) Pentru creșterea durabilității și un aspect mai frumos produselor ceramice li se aplică:\n- a) angobe;\n- b) glazuri;\n- c) smalțuri;\n- d) emailuri;\n- e) lacuri.\n**Răspuns: a,b,c,d**\n### Procedee de Fabricație\n28) Tigilele se obțin prin procedeul de:\n- a) tragere;\n- b) suflare;\n- c) laminare;\n- d) presare;\n- e) centrifugare.\n**Răspuns: a,d**\n29) Din gresie ceramică se pot realiza:\n- a) blocuri pentru planșee;\n- b) plăci;\n- c) cărămizi;\n- d) tuburi și piese de legătură;\n- e) plăci de majolică.\n**Răspuns: b,c,d**\n### Verificări și Proprietăți\n30) Asupra cărămizilor se fac următoarele verificări de ordinul I:\n- a) culoarea;\n- b) sageata;\n- c) sunetul;\n- d) crăpăturile pe fețele laterale și de așezare;\n- e) efluorescențele.\n**Răspuns: a,b,c,d,e**\n31) Verificarile periodice asupra cărămizilor sunt:\n- a) verificarea dimensiunilor;\n- b) determinarea densității;\n- c) determinarea densității aparente;\n- d) calculul compactității;\n- e) determinarea absorbției de apă.\n**Răspuns: a,b,c,d,e**\n32) Asupra materialelor pentru învelitori se fac următoarele verificări curente:\n- a) sunetul;\n- b) masa;\n- c) influența granulelor de var;\n- d) planeitatea (săgeata);\n- e) impermeabilitatea.\n**Răspuns: a,b,d,e**\n33) Asupra materialelor pentru învelitoare se fac următoarele verificări perioadice:\n- a) verificarea dimensiunilor;\n- b) impermeabilitatea la apă;\n- c) verificarea dimensiunilor crăpăturilor;\n- d) capacitatea portantă;\n- e) rezistența la îngheț – dezgheț.\n**Răspuns: a,b,d,e**\n34) Capacitatea portantă a țiglei se determină cu:\n- a) presa hidraulică;\n- b) aparatul Fruhling-Michaelis;\n- c) aparatul Vicat;\n- d) aparatul Sutard;\n- e) masa vibrantă.\n**Răspuns: b**\n35) Capacitatea portantă a unei țigle trebuie să fie:\n- a) 50 daN/cm²;\n- b) 60 daN/cm²;\n- c) un om cu trusa de scule în spate;\n- d) 70 daN/cm²;\n- e) 80 daN/cm²;\n**Răspuns: c**\n36) Impermeabilitatea la apă a unei țigle este corespunzătoare dacă:\n- a) la partea inferioară nu apar picături de apă după 72 ore;\n- b) la partea inferioară nu apar picături de apă după 3 ore;\n- c) la partea inferioară nu apar picături de apă după 12 ore;\n- d) la partea inferioară nu apar picături de apă după 24 ore;\n- e) la partea inferioară nu apar picături de apă după 48 ore;\n**Răspuns: b**\n### Calculul Proprietăților\n37) Cu relația ρs/ρ se calculează:\n- a) absorbtia de apă a cărămizii;\n- b) rezistența la compresiune a cărămizii;\n- c) densitatea reală a cărămizii;\n- d) compactitatea cărămizii;\n- e) porozitatea cărămizii.\n**Răspuns: d**\n38) Cu relația 1 - ρs/ρ se calculează:\n- a) absorbtia de apă a cărămizii;\n- b) rezistența la compresiune a cărămizii;\n- c) densitatea reală a cărămizii;\n- d) compactitatea cărămizii;\n- e) porozitatea cărămizii.\n**Răspuns: e**\n39) Cu relația (msat - m)/m * 100 se calculează:\n- a) absorbtia de apă în masă, a cărămizii;\n- b) rezistența la compresiune a cărămizii;\n- c) densitatea reală a cărămizii;\n- d) compactitatea cărămizii;\n- e) porozitatea cărămizii.\n**Răspuns: a**\n40) Cu relația P/A se calculează:\n- a) absorbtia de apă a cărămizii;\n- b) rezistența la compresiune a cărămizii;\n- c) densitatea reală a cărămizii;\n- d) compactitatea cărămizii;\n- e) porozitatea cărămizii.\n**Răspuns: b**\n## 10. Sticla și produse din sticlă utilizate în construcții\n### Definiții și Clasificări\n1) Componentul de bază la fabricarea sticlei este:\n- a) calcar și oxid de plumb pentru stabilitatea lor;\n- b) bioxidul de siliciu cu punctul de topire foarte ridicat;\n- c) carbonatul de sodiu pentru a coborî temperatura de topire a amestecului;\n- d) carbonatul de potasiu pentru a coborî temperatura de topire a amestecului;\n- e) oxizi metalici pentru a obține sticle colorate.\n**Răspuns: b**\n2) Pentru obținerea sticlelor colorate în procesul de fabricare se adaugă în amestecul de bază:\n- a) fosfat de calciu;\n- b) trioxid de aluminiu și oxid de magneziu;\n- c) calcar sau oxid de plumb;\n- d) carbonatul de sodiu sau carbonatul de potasiu;\n- e) oxizi metalici.\n**Răspuns: e**\n3) În funcție de substanțele folosite ca adaosuri topitoare sau stabilizatoare, sticla poate fi:\n- a) calco-sodică;\n- b) calco-potasica;\n- c) plumbo-potasica;\n- d) plumbo-sodică;\n- e) sodică.\n**Răspuns: a,b,c**\n### Fabricația Sticlei\n4) Faza I de fabricare a sticlei cuprinde:\n- a) topirea amestecului de materii prime;\n- b) fasonarea produselor din sticlă;\n- c) măcinarea fină și omogenizarea amestecului de materie primă;\n- d) recoacerea produselor din sticlă în vederea anulării tensiunilor interioare cauzate de răcirea bruscă a sticlei;\n- e) finisarea și decorarea produselor din sticlă.\n**Răspuns: c**\n5) Faza a-II-a de fabricare a sticlei cuprinde:\n- a) topirea amestecului de materii prime;\n- b) fasonarea produselor din sticlă;\n- c) măcinarea fină și omogenizarea amestecului de materie primă;\n- d) recoacerea produselor din sticlă în vederea anulării tensiunilor interioare cauzate de răcirea bruscă a sticlei;\n- e) finisarea și decorarea produselor din sticlă.\n**Răspuns: a**\n6) În faza a-III-a de fabricare a sticlei se face:\n- a) topirea amestecului de materii prime;\n- b) fasonarea produselor din sticlă;\n- c) măcinarea fină și omogenizarea amestecului de materie primă;\n- d) finisarea și decorarea produselor din sticlă.\n- e) recoacerea produselor din sticlă în vederea anulării tensiunilor interioare cauzate de răcirea bruscă a sticlei;\n**Răspuns: b**\n7) În faza a-IV-a de obținere a produselor din sticlă se face:\n- a) topirea amestecului de materii prime;\n- b) fasonarea produselor din sticlă;\n- c) măcinarea fină și omogenizarea amestecului de materie primă;\n- d) recoacerea produselor din sticlă în vederea anulării tensiunilor interioare cauzate de răcirea bruscă a sticlei;\n- e) finisarea și decorarea produselor din sticlă.\n**Răspuns: d**\n8) În faza a-V-a de obținere a produselor din sticlă se face:\n- a) topirea amestecului de materii prime;\n- b) fasonarea obiectelor din sticlă;\n- c) măcinarea fină și omogenizarea amestecului de materie primă;\n- d) recoacerea produselor din sticlă în vederea anulării tensiunilor interioare cauzate de răcirea bruscă a sticlei;\n- e) finisarea și decorarea produselor din sticlă.\n**Răspuns: e**\n### Fasonare și Finisare\n9) Fasonarea obiectelor din sticlă se face prin:\n- a) gravare;\n- b) șlefuire;\n- c) suflare;\n- d) laminare;\n- e) pictare.\n**Răspuns: c,d**\n10) Etapa de fasonare pentru obținerea geamurilor se face prin:\n- a) suflare;\n- b) presare;\n- c) laminare;\n- d) tragere;\n- e) procedee combinate (tragere – laminare).\n**Răspuns: e**\n11) Etapa de recoarcere a produselor din stică presupune:\n- a) încălzirea produselor fasonate la (550-600)°C;\n- b) încălzirea produselor fasonate la (1450-1550)°C;\n- c) răcirea lor treptată;\n- d) eliminarea tensiunilor interne;\n- e) arderea produselor fasonate la (500-600)°C;\n**Răspuns: a,c,d**\n12) Finisarea și decorarea obiectelor de sticlă se face prin:\n- a) gravare;\n- b) șlefuire și polizare;\n- c) suflare și tragere;\n- d) laminare și turnare;\n- e) pictare.\n**Răspuns: a,b,e**\n### Utilizări ale Sticlei\n13) Sticla poate fi utilizată în construcții ca:\n- a) materiale pentru uși, ferestre și luminatoare;\n- b) materiale pentru protecție și finisaj;\n- c) materiale pentru pereți și planșee;\n- d) materiale pentru drenaje, cablări, transport substanțe agresive și gaze;\n- e) materiale pentru termoizolații.\n**Răspuns: a,b,c,d,e**\n14) Ca material termoizolator sticla se folosește sub formă de:\n- a) tuburi de sticlă cu lungimi și diametre diferite;\n- b) vată de sticlă, fibre de sticlă, sticla poroasă;\n- c) blocuri de sticlă, geam termoizolant, profile din sticlă și corpuri Rotalit, dale Nevada;\n- d) plăci de sticlă opaxit, plăci de sticlă cristalizată, plăci de sticlă mozaic;\n- e) geam pentru vitrine, geam securit, geam triplex, geam armat, geam riglat și geam tras.\n**Răspuns: b**\n15) Produsele din sticlă pentru iluminat natural sunt:\n- a) tuburi de sticlă cu lungimi și diametre diferite;\n- b) vată de sticlă, fibre de sticlă, sticla poroasă;\n- c) blocuri de sticlă, geam termoizolant (termopan), profile din sticlă și corpuri Rotalit, dale Nevada;\n- d) plăci de sticlă opaxit, plăci de sticlă cristalizată, plăci de sticlă mozaic;\n- e) geam pentru vitrine, geam securit, geam triplex, geam armat, geam riglat și geam tras.\n**Răspuns: c,e**\n16) În cazul lucrărilor de protecție și finisaj se folosesc următoarele produse din sticlă:\n- a) tuburi de sticlă cu lungimi și diametre diferite;\n- b) vată de sticlă, fibre de sticlă, sticla poroasă;\n- c) blocuri de sticlă, geam termoizolant, profile din sticlă și corpuri Rotalit, dale Nevada;\n- d) plăci de sticlă opaxit, plăci de sticlă cristalizată, plăci de sticlă mozaic;\n- e) geam pentru vitrine, geam securit, geam triplex, geam armat, geam riglat și geam tras.\n**Răspuns: d**\n17) În cazul realizării planșeelor și pereților din produse din sticlă se utilizează:\n- a) tuburi de sticlă cu lungimi și diametre diferite;\n- b) vată de sticlă, fibre de sticlă, sticla poroasă;\n- c) blocuri de sticlă, geam termoizolant, profile din sticlă și corpuri Rotalit, dale Nevada;\n- d) plăci de sticlă opaxit, plăci de sticlă cristalizată, plăci de sticlă mozaic;\n- e) geam pentru vitrine, geam securit, geam triplex, geam armat, geam riglat și geam tras.\n**Răspuns: c**\n18) Pentru executarea drenajelor subterane, protecția unor cabluri de telefon și la transportul soluțiilor agresive și gaze se utilizează:\n- a) tuburi de sticlă cu lungimi și diametre diferite;\n- b) vata de sticlă, fibre de sticlă, sticla poroasă;\n- c) blocuri de sticlă, geam termoizolant, profile din sticlă și corpuri Rotalit, dale Nevada;\n- d) plăci de sticlă opaxit, plăci de sticlă cristalizată, plăci de sticlă mozaic;\n- e) geam pentru vitrine, geam securit, geam triplex, geam armat, geam riglat și geam tras.\n**Răspuns: a**\n19) Produsele pentru izolarea termică, pe bază de sticlă sunt:\n- a) geam armat;\n- b) cărămidă;\n- c) beton celular autoclavizat;\n- d) vata de sticlă;\n- e) tuful vulcanic.\n**Răspuns: d**\n### Tipuri de Geamuri\n20) În construcții, din sticlă se realizează:\n- a) geam tras;\n- b) geam colorat;\n- c) geam armat;\n- d) geam ornamental;\n- e) geam termopan.\n**Răspuns: a,b,c,d,e**\n21) Geamul care la spargere se sfarmă în bucăți, dar nu taie, se numește:\n- a) termopan;\n- b) triplex;\n- c) duplex;\n- d) securit;\n- e) armat.\n**Răspuns: d**\n22) Geamul alcătuit din mai multe foi de sticlă lipite între ele cu folii se numește:\n- a) termopan;\n- b) triplex;\n- c) duplex;\n- d) securit;\n- e) armat.\n**Răspuns: b,c**\n23) Geamul care folosește proprietățile termoizolatoare ale vidului, aerului sau a unor gaze, se numește:\n- a) termopan;\n- b) triplex;\n- c) duplex;\n- d) securit;\n- e) armat.\n**Răspuns: a**\n### Plăci și Corpuri din Sticlă\n24) Plăcile de sticlă cristalizată sunt:\n- a) utilizate la placarea pereților;\n- b) utilizate la executarea pardoselilor;\n- c) mai scumpe decât faianța;\n- d) mai ieftine decât faianța;\n- e) utilizate la realizarea planșeelor luminoase.\n**Răspuns: a,b,d**\n25) Plăcile din sticlă opaxit sunt:\n- a) plăci albe sau colorate;\n- b) cu fața văzută netedă iar fața opusă este cu striuri;\n- c) cu fața văzută cu striuri iar fața opusă este netedă;\n- d) folosite la placarea pereților interiori și a încăperilor cu umiditate mare;\n- e) folosite la placarea pereților interiori și a încăperilor cu umiditate mică.\n**Răspuns: a,b,d**\n26) Plăcile de sticlă – mozaic pentru fațade sunt:\n- a) pătrate;\n- b) cu fața văzută mată sau lucioasă iar partea opusă cu striuri;\n- c) cu fața văzută cu striuri sau lucioasă iar partea opusă mată;\n- d) folosite la placarea pereților interiori și exteriori;\n- e) folosite la placarea coloanelor și a altor elemente de construcții înlocuind plăcuțele ceramice.\n**Răspuns: a,b,d,e**\n27) Corpurile rotalit sunt:\n- a) folosite la realizarea planșeelor luminoase;\n- b) cu fața superioară cu striuri antiderapante;\n- c) cu zonele laterale cu adâncituri și striațiuni;\n- d) cu fața inferioară scobită;\n- e) din sticlă incoloră sau verzuie.\n**Răspuns: a,b,c,d,e**\n28) Dalele de sticlă pentru pereți - dale Nevada sunt:\n- a) pătrate;\n- b) din sticlă incoloră sau în diferite nuanțe ale culorii verzi;\n- c) biconcave sau monocave;\n- d) armate sau nearmate;\n- e) cu muchiile cu un șanț și striuri pentru montare.\n**Răspuns: a,b,c,e**\n29) Dalele de sticlă pentru pereți - dale Nevada sunt:\n- a) folosite la executarea pereților luminoși în holurile clădirilor publice, spitale, aerogări, gări, cinematografe;\n- b) așezate una peste alta, pe cant;\n- c) în spațiile tubulare se introduce armătura atât în rosturile orizontale cât și în cele verticale monolizarea realizându-se cu pasta de ciment;\n- d) armate sau nearmate;\n- e) îmbinate la un singur rând, la un rând și jumătate sau la două rânduri.\n**Răspuns: a,b,c**\n30) Profilele U sunt:\n- a) armate sau nearmate;\n- b) din sticlă colorată sau incoloră;\n- c) cu ambele fețe netede sau cu una din fețe ornamentată;\n- d) folosite la executarea pereților interiori;\n- e) îmbinate la un singur rând, la un rând și jumătate sau la două rânduri.\n**Răspuns: a,b,c,d,e**\n### Geam Termopan și Blocuri de Sticlă\n31) Geamul dublu termoizolant – Termopan se identifică prin:\n- a) manevrabilitate diversificată (deschidere pivotantă, pivotant - basculantă, basculantă, glisantă etc);\n- b) termoizolațiile pentru pereți;\n- c) tâmplăria - PVC, lemn, aluminiu;\n- d) albă sau colorată (verde, galben, albastru, roșu, etc);\n- e) 1, 2, 3, 4, 5 camere de aer.\n**Răspuns: a,c,d,e**\n32) Geamul dublu termoizolant – Termopan se identifică prin:\n- a) 2 foi de geam izolator, aflate la o distanță bine stabilită;\n- b) etanșeizarea - cu 2 rânduri de garnituri de cauciuc;\n- c) la învelitorile șarpantelor;\n- d) protecția perfectă împotriva agenților atmosferici;\n- e) reducerea pierderilor de energie din interior.\n**Răspuns: a,b,d,e**\n33) Blocurile de sticlă, cărămizile de sticlă:\n- a) pereți despărțitori în clădiri publice și de locuit;\n- b) la învelitorile șarpantelor și a luminatoarelor;\n- c) formă pătrată, dreptunghiulară, triunghiulară;\n- d) transparente, clare, semitransparente;\n- e) colorate prin injectare, colorate în masă.\n**Răspuns: a,c,d,e**\n34) Tiglele de sticlă:\n- a) țigle solzi sau cu jgheab;\n- b) la învelitorile șarpantelor și a luminatoarelor;\n- c) la drenajele subterane;\n- d) transportul soluțiilor agresive și al gazelor;\n- e) cabluri de forță și de telefon.\n**Răspuns: a,b**\n35) Tuburi de sticlă:\n- a) la drenajele subterane;\n- b) structură fibroasă;\n- c) transportul soluțiilor agresive și al gazelor;\n- d) cabluri de forță și de telefon;\n- e) materiale termoizolante la izolarea planșeelor.\n**Răspuns: a,c,d**\n### Sticlă Spongioasă și Vată de Sticlă\n36) Sticla spongioasă:\n- a) materie primă - deșeuri de sticlă + adaos de calcar, sulfat de sodiu + cărbune;\n- b) la topirea sticlei, adaosurile se descompun, elimină ( CO₂ și SO₂ );\n- c) structură compactă;\n- d) rămân prinse în topitură, iar la răcire ⇒ structură foarte poroasă și rigidă;\n- e) aspect de burete cu o densitate aparentă foarte mică (150-250) kg/m³.\n**Răspuns: a,b,d,e**\n37) Sticla spongioasă:\n- a) porozitate totală care poate ajunge la 90 %;\n- b) se poate tăia cu ferestrăul;\n- c) termoizolațiile pentru pereți;\n- d) structură fibroasă;\n- e) la drenajele subterane.\n**Răspuns: a,b,c**\n38) Vata de sticlă se identifică prin:\n- a) structură fibroasă;\n- b) obținută prin suflarea unei topituri vâscoase de sticlă, tragere sau prin centrifugare;\n- c) fibrele se presează sub formă de saltele, prinse între plase de sârmă, carton ondulat;\n- d) ca materiale termoizolante la izolarea planșeelor, conductelor;\n- e) este atacată de rozătoare.\n**Răspuns: a,b,c,d**\n## 11. Metale și aliaje în construcții\n### Proprietăți și Clasificări\n1) Metalele au următoarele proprietăți:\n- a) în stare normală toate sunt solide;\n- b) bune conductoare de căldură și electricitate;\n- c) maleabile și ductile;\n- d) luciu și sunet caracteristic;\n- e) predispuse să formeze ioni pozitivi prin acapararea de electroni pe ultimul strat.\n**Răspuns: b,c,d**\n2) Trecerea unui metal din starea topită în starea solidă se face prin:\n- a) cristalizare;\n- b) topire;\n- c) înghețare;\n- d) întărire;\n- e) metalizare.\n**Răspuns: a**\n3) Proprietatea metalelor de a cristaliza în mai multe tipuri de rețele cristaline funcție de temperatura la care are loc cristalizarea se numește:\n- a) izomorfism;\n- b) polimorfism;\n- c) polimerizare;\n- d) metalotropie;\n- e) cristalotropie.\n**Răspuns: b**\n### Fonte și Oțeluri\n4) Fontele obținute în furnale sunt:\n- a) fontă cenușie (de turnătorie);\n- b) fontă colorată (obținerea oțelului inox);\n- c) fontă albă (obținerea oțelului);\n- d) fonte speciale (obținerea oțelurilor speciale);\n- e) fonte de aliere (obținerea metalelor aliate).\n**Răspuns: a,c,d**\n5) Materia primă pentru obținerea fontei este:\n- a) minereurile de fier (min. 55 % fier);\n- b) cocsul + fondanți;\n- c) minereu de fier natural + cocsul + fondanți;\n- d) minereu de fier natural + cocsul;\n- e) minereu de fier natural + fondanți.\n**Răspuns: c**\n6) Fonta cenușie este:\n- a) relativ moale;\n- b) servesc la fabricarea oțelurilor speciale;\n- c) servește la fabricarea oțelurilor;\n- d) se prelucrează la mașini unelte;\n- e) foarte dură.\n**Răspuns: a,d**\n7) Fonta albă este:\n- a) relativ moale\n- b) servește la fabricarea oțelurilor speciale;\n- c) servește la fabricarea oțelurilor;\n- d) se prelucrează la mașini unelte;\n- e) foarte dură.\n**Răspuns: c,e**\n8) Fontele speciale:\n- a) conțin în diferite proporții unul sau mai multe elemente de aliere (Si, Al, Mn, Cr, Ti, Mo);\n- b) servesc la fabricarea oțelurilor speciale;\n- c) servește la fabricarea oțelurilor;\n- d) se prelucrează la mașini unelte;\n- e) foarte dură.\n**Răspuns: a,b**\n9) Produsele din fontă sunt:\n- a) plăci, capace;\n- b) elemente de rezemare;\n- c) obiecte pentru instalații electrice;\n- d) obiecte pentru instalații de canalizare;\n- e) obiecte pentru instalații de alimentare cu apă.\n**Răspuns: a,b,c,d,e**\n10) Dezavantajele produselor din fontă sunt:\n- a) nu pot fi prelucrate prin laminare;\n- b) nu pot fi prelucrate prin forjare;\n- c) se rup casant;\n- d) rezistă la șoc foarte bine;\n- e) nu rezistă la compresiune.\n**Răspuns: a,b,c**\n### Aliaje și Utilizări\n11) Bronzurile sunt aliajele cuprului cu:\n- a) zincul;\n- b) aluminiul;\n- c) siliciul;\n- d) staniul;\n- e) magneziul.\n**Răspuns: d**\n12) Alamele sunt aliajele cuprului cu:\n- a) zincul;\n- b) aluminiul;\n- c) siliciul;\n- d) staniul;\n- e) magneziul.\n**Răspuns: a**\n13) Laminatele, armăturile pentru beton armat și precomprimat se vor realiza din:\n- a) aliaje cu crom;\n- b) aliaje cu nichel;\n- c) aliaje cu mangan;\n- d) aliaje cu siliciu;\n- e) oțeluri carbon.\n**Răspuns: e**\n14) Aluminiul se utilizează în construcții la:\n- a) profile din Al pentru tâmplărie;\n- b) folie de Al pentru izolații hidrofuge;\n- c) fundații;\n- d) strat de protecție împotriva coroziunii;\n- e) table și plăci.\n**Răspuns: a,b,d,e**\n### Protecția Metalelor\n15) Protecția metalelor împotriva coroziunii prin acoperirea cu straturi protectoare se face prin:\n- a) vopsire, lăcuire, emailare;\n- b) zincare;\n- c) galvanizare;\n- d) vălțuire;\n- e) metalizare.\n**Răspuns: a,b,c,e**\n16) Protecția metalelor împotriva coroziunii prin aplicarea de straturi din compuși chimici se face prin:\n- a) vopsire, lăcuire, emailare;\n- b) metalizare;\n- c) oxidare;\n- d) fosfatare;\n- e) cromatare.\n**Răspuns: a**\n17) Aliajele metalice:\n- a) se obțin prin răcirea unei topituri;\n- b) nu prezintă ductilitate;\n- c) se obțin prin precipitare electrolitică concomitentă din soluții apoase;\n- d) sunt formate din cel puțin doi componenti dintre care cel puțin unul este metal;\n- e) au rezistența la tracțiune redusă.\n**Răspuns: a,c,d**\n18) Fontele au un conținut de carbon de:\n- a) (2-3)%;\n- b) (2,5-3,5)%;\n- c) (2,5-5)%;\n- d) (3-4)%;\n- e) (3,5-5)%.\n**Răspuns: c**\n### Utilizări în Beton\n19) În furnale se obțin următoarele tipuri de fonte:\n- a) fonta gri;\n- b) fonta albă;\n- c) fonta cenușie;\n- d) fonta neagră;\n- e) fonte speciale.\n**Răspuns: b,c,e**\n20) Pentru betonul armat și betonul precomprimat se utilizează:\n- a) oțeluri cu profil neted;\n- b) oțeluri cu profil periodic;\n- c) plase din sarmă trasă netedă;\n- d) fonta cenușie;\n- e) fonte speciale.\n**Răspuns: a,b,c**\n21) Pentru betonul precomprimat se utilizează:\n- a) oțeluri mediu aliate;\n- b) sârmă netedă;\n- c) sârmă cu amprente;\n- d) toroane;\n- e) plase din sârmă trasă netedă.\n**Răspuns: b,c,d**\n22) Prin alierea Al cu:\n- a) Si rezultă siluminurile;\n- b) Sn rezultă bronzurile;\n- c) Cu, Mg, Mn rezultă duraluminiul;\n- d) Zn rezultă alamele;\n- e) Ni rezultă constantanul.\n**Răspuns: a,c**\n23) Prin alierea Cu cu:\n- a) Si rezultă siluminurile;\n- b) Sn rezultă bronzurile;\n- c) Cu, Mg, Mn rezultă duraluminiul;\n- d) Zn rezultă alamele;\n- e) Ni rezultă constantanul.\n**Răspuns: b,d,e**\n24) Plumbul este un metal:\n- a) ușor fuzibil;\n- b) rezistent la unii agenți agresivi;\n- c) de culoare roșcată;\n- d) foarte greu;\n- e) care nu rezistă în mediu bazic.\n**Răspuns: a,b,d**\n25) Folosirea armăturii în beton duce la:\n- a) scăderea densității betonului armat;\n- b) creșterea densității betonului armat;\n- c) creșterea rezistenței la compresiune a betonului armat;\n- d) creșterea rezistenței la întindere a betonului armat;\n- e) mărirea deformărilor înainte de rupere a betonului armat.\n**Răspuns: b,d,e**\n## 12. Lemn și produse din lemn\n### Avantaje și Dezavantaje\n1) Avantajele utilizării lemnului în construcții sunt:\n- a) masă mică (greutate);\n- b) rezistențe mecanice foarte mari;\n- c) ușurință în prelucrare;\n- d) textură plăcută;\n- e) poate fi un izolator termic.\n**Răspuns: a,c,d,e**\n2) Dezavantajele utilizării lemnului în construcții sunt:\n- a) nu rezistă bine la microorganisme;\n- b) nu rezistă bine la foc;\n- c) nu rezistă bine la transfer termic;\n- d) nu rezistă bine la acțiunea apei;\n- e) nu este stabil la temperaturi mai mari de 110°C.\n**Răspuns: a,b,d,e**\n3) Sub acțiunea temperaturii, lemnul devine:\n- a) t = 50°C amorf;\n- b) t ≥ 110°C instabil;\n- c) t = 200°C combustibil;\n- d) t = 250°C compresibil;\n- e) t = 300°C inflamabil luând foc în aer fără flacără.\n**Răspuns: b,c,e**\n4) La tăiere, apa din lemn se găsește în următoarele stări:\n- a) apă din umidități;\n- b) apă liberă;\n- c) apă capilară;\n- d) apă de hignoscopicitate;\n- e) apă legată chimic.\n**Răspuns: b,d,e**\n5) Umiditatea cea mai mare a lemnului se întâlnește în lemn:\n- a) vara în țesuturile mai vârstnice;\n- b) toamna în țesuturile tinere;\n- c) iarna în țesuturile tinere;\n- d) vara în țesuturile tinere;\n- e) toamna în țesuturile mai vârstnice.\n**Răspuns: d**\n6) Densitatea aparentă a lemnului este de:\n- a) 1200 kg/m³;\n- b) 1200-1500 kg/m³;\n- c) 1500 kg/m³;\n- d) 1500-1800 kg/m³;\n- e) 1800 kg/m³.\n**Răspuns: c**\n### Clasificarea Lemnului\n7) Densitatea aparentă a lemnului depinde de:\n- a) umiditatea lemnului;\n- b) absorbția de apă a lemnului;\n- c) anotimpul în care se face debitarea;\n- d) esența lemnului;\n- e) vârsta lemnului.\n**Răspuns: a,c,d**\n8) Din categoria materialului lemnos tare face parte:\n- a) bradul;\n- b) stejarul;\n- c) molidul;\n- d) nucul;\n- e) frasinul.\n**Răspuns: b,d,e**\n9) Din categoria materialului lemnos tare face parte:\n- a) plopul;\n- b) salcia;\n- c) salcâmul;\n- d) teiul;\n- e) fagul.\n**Răspuns: c,e**\n10) Din categoria materialului lemnos moale face parte:\n- a) bradul;\n- b) stejarul;\n- c) molidul;\n- d) nucul;\n- e) frasinul.\n**Răspuns: a,c**\n11) Din categoria materialului lemnos moale face parte:\n- a) plopul;\n- b) salcia;\n- c) salcâmul;\n- d) teiul;\n- e) fagul.\n**Răspuns: a,b,d**\n### Rezistențe Mecanice\n12) Rezistențele mecanice care se determină la lemn sunt:\n- a) rezistența la compresiune paralelă cu fibrele;\n- b) rezistența la compresiune perpendiculară pe fibre;\n- c) rezistența la întindere cu forțe perpendiculare pe fibre;\n- d) rezistența la întindere prin încovoiere;\n- e) rezistența la întindere paralelă cu fibrele.\n**Răspuns: a,b,c,d,e**\n13) Relațiile Re⊥ = 20 daN/cm² și Re∥ = 80 daN/cm², sunt valabile la:\n- a) lemnul de esență tare;\n- b) lemnul de esență moale;\n- c) lemnul de esență mijlocie;\n- d) rășinoase;\n- e) foioase.\n**Răspuns: b,d**\n14) Relațiile Ri⊥ = 40 daN/cm² și Ri∥ = 100 daN/cm², sunt valabile la:\n- a) lemnul de esență tare;\n- b) lemnul de esență moale;\n- c) lemnul de esență mijlocie;\n- d) rășinoase;\n- e) foioase.\n**Răspuns: a,e**\n15) Pentru o umiditate de 15% sunt valabile următoarele relații:\n- a) Ri∥ = 2 Ri⊥ pentru rășinoase și foioase\n- b) Ri⊥ = 1,5 Ri∥ pentru rășinoase\n- c) Ri⊥ = 2 Ri∥ pentru foioase;\n- d) Ri⊥ = 1,5 Ri∥ pentru foioase;\n- e) Ri⊥ = 2 Ri∥ pentru rășinoase\n**Răspuns: a,b,c**\n### Defecte ale Lemnului\n16) Contragerea și umflarea lemnului:\n- a) variază funcție de umiditate;\n- b) variază funcție de specia arborelui;\n- c) sunt hotărătoare la debitarea cherestelei din cilindru lemnos;\n- d) variază funcție de înălțimea arborelui;\n- e) variază funcție de vârsta arborelui.\n**Răspuns: a,b**\n17) Materialul lemnos poate avea următoarele defecte:\n- a) datorită crăpăturilor;\n- b) determinate de umiditatea de 15%;\n- c) noduri;\n- d) de structură;\n- e) a trunchiului lemnos.\n**Răspuns: a,c,d,e**\n18) Defectele de formă a trunchiului sunt:\n- a) scobitura;\n- b) fibra răsucită;\n- c) rulura;\n- d) ovalitatea;\n- e) canelura.\n**Răspuns: a,d,e**\n19) Defectele de formă a trunchiului sunt:\n- a) cadranura;\n- b) lăbărțarea;\n- c) fibra înclinată;\n- d) conicitatea anormală;\n- e) curbura.\n**Răspuns: b,d,e**\n20) Defectele de formă a trunchiului sunt:\n- a) inima stelată;\n- b) concrescența;\n- c) fibra creată;\n- d) înfurcirea;\n- e) excentricitatea.\n**Răspuns: b,d,e**\n21) Defectele de structură sunt:\n- a) fibra creată;\n- b) fibra răsucită;\n- c) fibra înclinată;\n- d) lăbărțarea;\n- e) contracția.\n**Răspuns: a,b,c**\n22) Defectele de structură sunt:\n- a) loviturile de trasnet;\n- b) nodurile;\n- c) inelele anuale neuniforme;\n- d) ovalitatea;\n- e) pungile de rășină.\n**Răspuns: c,e**\n23) Defectele de structură sunt:\n- a) părțile moi;\n- b) gelivurile;\n- c) excrescențele;\n- d) inima stelată;\n- e) înfurcirea.\n**Răspuns: a,c**\n24) Defectele datorită crăpăturilor sunt:\n- a) pungile moi;\n- b) gelivurile;\n- c) loviturile de trăsnet;\n- d) curbura;\n- e) rulura.\n**Răspuns: b,c,e**\n25) Defectele datorită crăpăturilor sunt:\n- a) conicitatea anormală;\n- b) concrescența;\n- c) contracția;\n- d) cadranura;\n- e) canelura.\n**Răspuns: c,d**\n26) Defectele datorită crăpăturilor sunt:\n- a) inima stelată;\n- b) gelivurile;\n- c) părțile moi;\n- d) gâlmele;\n- e) nodurile căzătoare.\n**Răspuns: a,b**\n### Uscarea și Prelucrarea Lemnului\n27) Uscarea lemnului cu ajutorul curenților de înaltă frecvență presupune:\n- a) încălzirea corpurilor în interiorul lemnului;\n- b) așezarea scândurilor în stive lăsând să treacă aerul prin ele;\n- c) utilizarea unui spațiu de depozitare mare;\n- d) un timp de uscare foarte redus, fiind un procedeu foarte costisitor;\n- e) aplicarea pe suprafața lemnului a unor săruri (sare, uree, glucoză).\n**Răspuns: a,d**\n28) Care este produsul lemnos obținut prin tăierea lemnului rotund în direcție longitudinală, având toate fețele plane și paralele, două câte două, sau numai două fețe plane și paralele?\n- a) cioplitura,\n- b) stâlpii pentru linii aeriene;\n- c) buștenii;\n- d) parchetul;\n- e) cheresteaua.\n**Răspuns: e**\n29) Ce produse din lemn își păstrează structura materialului lemnos din care provin:\n- a) brute, semifabricatele, finite;\n- b) moderne din lemn;\n- c) bilele, manelele și prăjinile;\n- d) stâlpii pentru linii aeriene;\n- e) traversele de cale ferată.\n**Răspuns: a,c,d,e**\n30) Ce produse din lemn nu își păstrează structura materialului lemnos din care provin:\n- a) brute, semifabricatele, finite;\n- b) moderne din lemn;\n- c) bilele, manelele și prăjinile;\n- d) stâlpii pentru linii aeriene;\n- e) traversele de cale ferată.\n**Răspuns: b**\n### Produse din Lemn\n31) Din categoria produselor brute lemnoase, fac parte:\n- a) lemnul rotund pentru mină;\n- b) moderne din lemn;\n- c) bilele, manelele și prăjinile;\n- d) stâlpii pentru liniile aeriene;\n- e) traversele de cale ferată.\n**Răspuns: a,c,d**\n32) Care produse lemnoase sunt utilizate pentru lucrările de sprijinire în mine:\n- a) cioplitura,\n- b) lemnul rotund de mină;\n- c) buștenii;\n- d) parchetul;\n- e) cheresteaua.\n**Răspuns: b**\n33) Din ce material prin prelucrare se pot obține scânduri, dulapi, șipci, rigle, grinzi?\n- a) cioplitură;\n- b) cherestea;\n- c) stâlpi pentru linii aeriene;\n- d) bușteni;\n- e) parchet.\n**Răspuns: b**\n34) Materialele brute lemnoase sunt:\n- a) lemn lamelar;\n- b) cioplitura;\n- c) bilele, manelele, prăjinile;\n- d) lemnul rotund de mină;\n- e) stâlpii pentru liniile aeriene.\n**Răspuns: c,d,e**\n35) Produsele semifabricate din lemn sunt:\n- a) cioplitura;\n- b) cheresteaua;\n- c) furnirurile;\n- d) placajele;\n- e) panelele.\n**Răspuns: a,b,c,d,e**\n36) Elementele de construcție din lemn obținute prin tăiere și cioplire sunt:\n- a) elemente de șarpantă - grinzi, pane, căpriori;\n- b) stâlpi pentru rețele electrice;\n- c) stâlpi pentru mină;\n- d) cherestea;\n- e) furnirul.\n**Răspuns: a,d**\n37) Din cherestea se obțin:\n- a) scânduri;\n- b) dulapi;\n- c) manele;\n- d) margini;\n- e) șipci.\n**Răspuns: a,b,e**\n38) Din cherestea se obțin:\n- a) scânduri;\n- b) dulapi;\n- c) bile;\n- d) șipci;\n- e) rigle și grinzi.\n**Răspuns: a,b,d,e**\n### Tehnologii de Prelucrare\n39) Retezarea la capete, curățarea de crengi, îndepărtarea scoarței fără alte operații asupra cilindrului lemnos duce la formarea produselor lemnoase:\n- a) brute,\n- b) semifabricatele,\n- c) finite;\n- d) moderne din lemn;\n- e) bilele, manelele și prăjinile.\n**Răspuns: a,e**\n40) Care produse lemnoase sunt utilizate pentru obținerea produselor finite din lemn și a semifabricatelor:\n- a) cioplitură,\n- b) stâlpii pentru linii aeriene;\n- c) buștenii;\n- d) parchetul;\n- e) cheresteaua.\n**Răspuns: c**\n41) Furnirul se obține prin:\n- a) acoperirea unor șipci din lemn moale pe ambele fețe cu foi subțiri (0,4-0,6) mm din lemn cu direcția fibrelor perpendiculară pe cea a șipcilor;\n- b) lipirea unui număr impar de foi de lemn subțiri (0,4-0,6) mm între ele, fibrele foilor vor fi perpendiculare unele pe altele;\n- c) tăierea trunchiului de lemn în foi subțiri (0,4-0,6) mm în lungul trunchiului sau tangențial la el;\n- d) prin debitarea cu grijă a trunchiului de copac;\n- e) prin tăierea în foi perpendiculare pe înălțimea trunchiului.\n**Răspuns: c**\n42) Placajele se obțin prin:\n- a) acoperirea unor șipci din lemn moale pe ambele fețe cu foi subțiri (0,4-0,6) mm din lemn cu direcția fibrelor perpendiculară pe cea a șipcilor;\n- b) lipirea unui număr impar de foi de lemn subțiri (0,4-0,6) mm între ele, fibrele foilor vor fi perpendiculare unele pe altele;\n- c) tăierea trunchiului de lemn în foi subțiri (0,4-0,6) mm în lungul trunchiului sau tangențial la el;\n- d) prin debitarea cu grijă a trunchiului de copac;\n- e) prin tăierea în foi perpendiculare pe înălțimea trunchiului.\n**Răspuns: b**\n43) Panelele se obțin prin:\n- a) acoperirea unor șipci din lemn moale pe ambele fețe cu foi subțiri (0,4-0,6) mm din lemn cu direcția fibrelor perpendiculară pe cea a șipcilor;\n- b) lipirea unui număr impar de foi de lemn subțiri (0,4-0,6) mm între ele, fibrele foilor vor fi perpendiculare unele pe altele;\n- c) tăierea trunchiului de lemn în foi subțiri (0,4-0,6) mm în lungul trunchiului sau tangențial la el;\n- d) prin debitarea cu grijă a trunchiului de copac;\n- e) prin tăierea în foi perpendiculare pe înălțimea trunchiului.\n**Răspuns: a**\n44) Produsele finite din lemn sunt:\n- a) plăcile celulare;\n- b) scândurile faltuite;\n- c) dușumelele lambă și uluc;\n- d) parchetul;\n- e) frizurile.\n**Răspuns: a,b,c,d**\n### Materiale Moderne din Lemn\n45) Plăcile din așchii de lemn (PAL) se obțin prin:\n- a) presarea la cald a fibrelor lemnoase;\n- b) aglomerarea așchiilor din lemn cu un adeziv chimic sub efectul temperaturii și presiunii;\n- c) impregnarea și îmbinarea cu rășini a deșeurilor de cherestea;\n- d) impregnarea și îmbinarea cu rășini a foilor de furnir din placaje;\n- e) impregnarea și îmbinarea cu rășini a blocurilor mari de lemn.\n**Răspuns: b**\n46) Plăcile fibrolemnoase (PFL) se obțin prin:\n- a) presarea la cald a fibrelor lemnoase;\n- b) aglomerarea așchiilor din lemn cu un adeziv chimic;\n- c) impăslirea și încleierea fibrelor izolate și a fascicolelor de fibre de lemn;\n- d) impregnarea și îmbinarea cu rășini a foilor de furnir din placaje;\n- e) impregnarea și îmbinarea cu rășini a blocurilor mari de lemn.\n**Răspuns: c**\n47) Lemnul stratificat densificat (lignofolul) se obține prin:\n- a) presarea la cald a fibrelor lemnoase;\n- b) aglomerarea așchiilor din lemn cu un adeziv chimic;\n- c) impregnarea și îmbinarea cu rășini a deșeurilor de cherestea;\n- d) impregnarea și îmbinarea cu rășini a foilor de furnir din placaje;\n- e) impregnarea și îmbinarea cu rășini a blocurilor mari de lemn.\n**Răspuns: d**\n48) Lemnul impregnat și presat (lignostonul) se obține prin:\n- a) presarea la cald a fibrelor lemnoase;\n- b) aglomerarea așchiilor din lemn cu un adeziv chimic;\n- c) impregnarea și îmbinarea cu rășini a deșeurilor de cherestea;\n- d) impregnarea și îmbinarea cu rășini a foilor de furnir din placaje;\n- e) impregnarea și îmbinarea cu rășini a blocurilor mari de lemn.\n**Răspuns: e**\n### 49) Lemnul lamelar încleiat se obține prin:\n- a) îmbinarea cu un adeziv a unor piese din lemn;\n- b) aglomerarea așchiilor din lemn cu un adeziv chimic;\n- c) impregnarea și îmbinarea cu rășini a deșeurilor de cherestea;\n- d) impregnarea și îmbinarea cu rășini a foilor de furnir din placaje;\n- e) impregnarea și îmbinarea cu rășini a blocurilor mari de lemn.\n**Răspuns: a**\n### 50) Protecția lemnului împotriva coroziunii și a focului se face prin:\n- a) uscarea naturală, artificială și chimică;\n- b) carbonizarea superficială;\n- c) aplicarea de straturi protectoare de lacuri și vopsele;\n- d) impregnarea cu substanțe antiseptice și hidrofuge;\n- e) acoperirea cu sticlă solubilă, tencuială de var sau ipsos.\n**Răspuns: b,d,e**\n### 51) Materialele moderne din lemn sunt obținute prin:\n- a) debitare;\n- b) îndepărtarea scoarței și a crengilor;\n- c) presare și tratare la cald;\n- d) impregnare cu rășini sintetice;\n- e) rindeluire.\n**Răspuns: c,d**\n### 52) Din categoria materialelor moderne din lemn fac parte:\n- a) plăci aglomerate din lemn;\n- b) plăci fibro-lemnoase;\n- c) lemnul stratificat;\n- d) parchetul laminat;\n- e) parchetul lamelar.\n**Răspuns: a,b,c**\n### 53) Care este umiditatea relativă standard a lemnului utilizat ca material de construcție:\n- a) 5-10%;\n- b) 15%;\n- c) 5-25%;\n- d) 30%;\n- e) 10%.\n**Răspuns: b**\n### 54) Ce produse lemnoase sunt alcătuite dintr-un miez de șipci din lemn moale, lipite între ele și acoperite pe ambele fețe cu foi de furnir?\n- a) furnirul;\n- b) panelele;\n- c) placajul;\n- d) plăcile celulare;\n- e) scândurile fălțuite.\n**Răspuns: b**\n### 55) Umiditarea lemnului este alcătuită din:\n- a) apa liberă;\n- b) apa liberă și de higroscopicitate;\n- c) apa legată chimic;\n- d) apa liberă, de higroscopicitate și apa legată chimic;\n- e) apa liberă și apa legată chimic.\n**Răspuns: d**\n### 56) Ce produs se obține prin retezarea la capete, curățarea de crengi, îndepărtarea scoarței:\n- a) bușteni, bile, manele;\n- b) furnir;\n- c) panele;\n- d) lemn rotund de mină;\n- e) stâlpi de linii aeriene.\n**Răspuns: a,d,e**\n### 57) Din categoria produselor semifabricate din lemn fac parte:\n- a) stâlpii de linii aeriene;\n- b) bulumacii;\n- c) cioplitura;\n- d) traversele de cale ferată;\n- e) prăjinile.\n**Răspuns: b,c,d**\n### 58) Furnirul se obține din:\n- a) lemn de rășinoase;\n- b) lemn de foioase;\n- c) plăci aglomerate din lemn;\n- d) plăci fibro-lemnoase;\n- e) lemn rotund de mină.\n**Răspuns: b**\n### 59) Produsele finite din lemn sunt:\n- a) placajul;\n- b) plăcile celulare;\n- c) furnirul;\n- d) șindrila;\n- e) dușumele cu lamba și uluc.\n**Răspuns: b,d,e**\n### 60) Ce produse lemnoase se obțin prin tăierea buștenilor de foioase - în foi subțiri, plane h = (0,4 – 0,6) mm?\n- a) furnirul;\n- b) panelele;\n- c) placajul;\n- d) plăcile celulare;\n- e) scândurile fălțuite.\n**Răspuns: a**\n### 61) Uscarea lemnului se face:\n- a) în aer condiționat;\n- b) în mod natural;\n- c) prin metoda chimică;\n- d) prin metoda mecanică;\n- e) cu ajutorul curenților de înaltă frecvență.\n**Răspuns: a,b,c,e**\n### 62) Ce produse lemnoase sunt alcătuite dintr-un cadru rigid de lemn acoperite pe ambele fețe cu furnir sau placaj?\n- a) furnirul;\n- b) panelele;\n- c) placajul;\n- d) plăcile celulare;\n- e) scândurile fălțuite.\n**Răspuns: d**\n### 63) Ce produse lemnoase se obțin prin lipirea foilor de furnir (3-9) cu adezivi de foarte bună calitate și presarea la cald astfel încât fibrele a două foi consecutive să facă un unghi drept (uneori se formează unghiuri de 30, 45 sau 60°)?\n- a) furnirul;\n- b) panelele;\n- c) placajul;\n- d) plăcile celulare;\n- e) scândurile fălțuite.\n**Răspuns: c**\n### 64) Ce produse lemnoase se obțin din scânduri de lemn de rășinoase rindeluite pe fața văzută?\n- a) furnirul;\n- b) panelele;\n- c) placajul;\n- d) plăcile celulare;\n- e) scândurile fălțuite.\n**Răspuns: e**\n## 13. Metode nedestructive pentru determinarea caracteristicilor mecanice ale betonului\n### 1) Încercarea nedestructivă care se bazează pe măsurarea urmei lăsate pe suprafața elementului de o masă mobilă proiectată pe suprafața cu o anumită energie, se numește:\n- a) încercare mecanică cu amprentă;\n- b) încercare acustică;\n- c) încercare atomică;\n- d) încercare mecanică cu recul;\n- e) încercare acustică cu recul.\n**Răspuns: a**\n### 2) Încercarea nedestructivă care se bazează pe proprietatea ultrasunetelor de a nu se propaga prin aer se numește:\n- a) încercare mecanică cu amprentă;\n- b) încercare acustică;\n- c) încercare atomică;\n- d) încercare mecanică cu recul;\n- e) încercare acustică cu recul.\n**Răspuns: b**\n### 3) Încercarea nedestructivă în care se măsoară energia de recul a unui material se numește:\n- a) încercare mecanică cu amprentă;\n- b) încercare acustică;\n- c) încercare atomică;\n- d) încercare mecanică cu recul;\n- e) încercare acustică cu recul.\n**Răspuns: d**\n### 4) Metodele cu radiații penetrante și metodele cu neutroni fac parte din categoria metodelor nedestructive:\n- a) mecanice cu amprentă;\n- b) acustice;\n- c) atomice;\n- d) mecanice cu recul;\n- e) acustice cu recul.\n**Răspuns: c**\n### 5) Biografia betonului încercat cu betonoscopul este dată de:\n- a) tipul de liant;\n- b) tipul de cofraj;\n- c) tipul de utilaj de transport;\n- d) tipul de agregat;\n- e) tipul de macara utilizată la punerea în operă.\n**Răspuns: a,d**\n### 6) Cele mai vechi metode nedestructive sunt:\n- a) metodele acustice;\n- b) metodele mecanice;\n- c) metodele atomice;\n- d) metodele electro-magnetice;\n- e) metodele combinate.\n**Răspuns: b**\n### 7) Din grupa metodelor mecanice de suprafață fac parte:\n- a) metoda ultrasonică;\n- b) metoda cu amprentă;\n- c) metoda cu neutroni;\n- d) metoda cu recul;\n- e) metoda de rezonanță.\n**Răspuns: b,d**\n### 8) Sclerometrul cu amprentă se utilizează la:\n- a) determinarea rezistenței la compresiune;\n- b) determinarea rezistenței la uzură;\n- c) determinarea rezistenței la oboseală;\n- d) determinarea rezistenței la compresiune prin șoc;\n- e) determinarea rezistenței la încovoiere.\n**Răspuns: a**\n### 9) Dezavantajele metodelor nedestructive mecanice de suprafață sunt:\n- a) determinările pot fi repetate pe același element;\n- b) rezultatele pot introduce erori;\n- c) pe același element pot fi determinate mai multe caracteristici;\n- d) se pot utiliza „in situ”;\n- e) rezistențele dau informații pentru un strat superficial din material.\n**Răspuns: b,e**\n### 10) Avantajele metodelor nedestructive sunt:\n- a) determinările pot fi repetate pe același element;\n- b) rezistențele sunt orientative;\n- c) pe același element pot fi determinate mai multe caracteristici;\n- d) se pot utiliza „in situ”;\n- e) rezistențele au valori exacte.\n**Răspuns: a,c,d**\n### 11) Betonoscopul se utilizează la determinarea rezistenței la compresiune prin:\n- a) metoda ultrasonică;\n- b) metoda cu amprentă;\n- c) metoda cu neutroni;\n- d) metoda cu recul;\n- e) metoda de rezonanță.\n**Răspuns: a**\n### 12) Timpul în care ultrasunetele străbat proba (între cei doi palpatori), exprimat în μ, se înregistrează în cazul utilizării:\n- a) metodei acustice;\n- b) metodei mecanice cu amprentă;\n- c) metodei mecanice cu recul;\n- d) metodelor atomice;\n- e) metodelor cu neutroni.\n**Răspuns: a**\n### 13) Două diametre perpendiculare ale urmei lăsate de sclerometru, pe elementul de construcție pe care se face determinarea, se citesc în cazul:\n- a) metodei acustice;\n- b) metodei mecanice cu amprentă;\n- c) metodei mecanice cu recul;\n- d) metodelor atomice;\n- e) metodelor cu neutroni.\n**Răspuns: b**\n### 14) În cazul metodelor nedestructive, (coeficientul de etalonare a aparatului) este obligatoriu a corecta mărimea înregistrată de aparat, pentru că:\n- a) utilizatorul nu are calificarea corespunzătoare;\n- b) aparatul este defect;\n- c) în timp, aparatul se decalibrează;\n- d) nu se dispune de aparatul corespunzător metodei;\n- e) proba nu e bine curățată.\n**Răspuns: c**\n### 15) Coeficientul de etalonare (în cazul metodelor nedestructive), corectează:\n- a) rezistențele mecanice;\n- b) rezistența la compresiune;\n- c) factorul de maturitate;\n- d) mărimea citită pe aparatul utilizat;\n- e) biografia betonului.\n**Răspuns: d**\n### 16) Prin biografia betonului se înțelege:\n- a) informații în legătură cu modul de rezemare al epruvetelor;\n- b) informații în legătură cu forma epruvetelor;\n- c) data turnării betonului;\n- d) informații în legătură cu compoziția betonului și condițiile de păstrare;\n- e) informații în legătură cu gradul de agresivitate.\n**Răspuns: c,d**\n## 14. Materiale din polimeri\n### 1) Proprietățile caracteristice fundamentale a maselor plastice care le recomandă a fi utilizate în construcții sunt:\n- a) plasticitatea;\n- b) elasticitatea;\n- c) flexibilitatea;\n- d) rigiditatea;\n- e) ductilitatea.\n**Răspuns: a,b,c,e**\n### 2) Adaosurile utilizate la fabricarea maselor plastice sunt:\n- a) plastifiantii;\n- b) elastomerii;\n- c) antioxidanții;\n- d) pigmentii;\n- e) substanțe de umplutură.\n**Răspuns: a,c,d,e**\n### 3) Masele plastice se prelucrează prin:\n- a) turnare, presare;\n- b) injectare și torcretare;\n- c) laminare;\n- d) extrudare;\n- e) peliculizare.\n**Răspuns: a,b,c,d,e**\n### 4) Esterii celulozei sunt mase plastice:\n- a) pe bază de izopren;\n- b) pe bază de celuloză;\n- c) pe bază de sinteză;\n- d) pe bază de proteine;\n- e) pe bază de policaridusare.\n**Răspuns: b**\n### 5) Celuloidul este o masă plastică:\n- a) pe bază de izopren;\n- b) pe bază de celuloză;\n- c) pe bază de sinteză;\n- d) pe bază de proteine;\n- e) pe bază de policaridusare.\n**Răspuns: b**\n### 6) Cauciucul sintetic se obține ca un polimer:\n- a) pe bază de izopren;\n- b) pe bază de celuloză;\n- c) pe bază de sinteză;\n- d) pe bază de proteine;\n- e) prin polimerizarea butadienei.\n**Răspuns: e**\n### 7) Polietilena este o masă plastică:\n- a) pe bază de izopren;\n- b) pe bază de celuloză;\n- c) pe bază de sinteză;\n- d) pe bază de proteine;\n- e) prin polimerizare.\n**Răspuns: e**\n### 8) Polistirenul este o masă plastică:\n- a) pe bază de izopren;\n- b) pe bază de celuloză;\n- c) pe bază de sinteză;\n- d) pe bază de proteine;\n- e) prin polimerizare.\n**Răspuns: e**\n### 9) Prelucrarea materialelor din polimeri se poate realiza prin:\n- a) turnare;\n- b) expandare;\n- c) calandrare;\n- d) peliculizare;\n- e) forjare.\n**Răspuns: a,b,c,d**\n### 10) Prelucrarea materialelor din polimeri se poate realiza prin:\n- a) sudare;\n- b) forjare;\n- c) laminare;\n- d) injectare;\n- e) presare.\n**Răspuns: c,d,e**\n### 11) Prelucrarea materialelor din polimeri se poate realiza prin:\n- a) expandare;\n- b) extrudare;\n- c) injectare;\n- d) forjare;\n- e) calandrare.\n**Răspuns: a,b,c,e**\n### 12) Masele plastice sunt alcătuite din:\n- a) polimeri și diferite adaosuri cu rol de plastifiere, stabilizare, armare sau pigmentare;\n- b) macromolecule monodimensionale cu elasticitate mare;\n- c) macromolecule care își măresc reversibil plasticitatea la încălzire;\n- d) macromolecule bidimensionale care la încălzire trec în structuri tridimensionale devenind rigide;\n- e) celuloză hidratată prin tratare cu o soluție concentrată de clorură de zinc.\n**Răspuns: a**\n### 13) Din polietilenă, în construcții se realizează:\n- a) conducte pentru fluide calde;\n- b) foi subțiri transparente;\n- c) protecții anticorozive;\n- d) țevi pentru alimentări cu apă și canalizare;\n- e) garnituri de etanșare, plăci și covoare, tapete.\n**Răspuns: b,d**\n### 14) Din polipropilenă, în construcții, se realizează:\n- a) conducte pentru fluide calde;\n- b) foi subțiri transparente;\n- c) protecții anticorozive;\n- d) țevi pentru alimentări cu apă și canalizare;\n- e) garnituri de etanșare, plăci și covoare, tapete.\n**Răspuns: a,c**\n### 15) Din policlorură de vinil (PCV), în construcții, se realizează:\n- a) conducte pentru fluide calde;\n- b) foi subțiri transparente;\n- c) protecții anticorozive;\n- d) țevi pentru alimentări cu apă și canalizare;\n- e) garnituri de etanșare, plăci și covoare, tapete.\n**Răspuns: e**\n### 16) Din policlorură de vinil (PCV), în construcții, se realizează:\n- a) tuburi pentru instalații electrice;\n- b) jgheaburi, burlane;\n- c) rame de ferestre;\n- d) mâna curentă la scări;\n- e) materiale termo și fonoizolante.\n**Răspuns: a,b,c,d,e**\n### 17) Prin reacțiile de polimerizare se obțin:\n- a) policlorura de vinil;\n- b) polietilena;\n- c) cleiul de cazeină;\n- d) polipropilena;\n- e) polistirenul.\n**Răspuns: a,b,d,e**\n### 18) Prin reacțiile de polimerizare se obțin:\n- a) poliacetatul de vinil;\n- b) cauciucul de siliconi;\n- c) politetrafluoretilena;\n- d) polimetacrilatul de metil;\n- e) rășinile de siliconi.\n**Răspuns: a,c,d**\n### 19) Prin reacțiile de policondensare se obțin:\n- a) polistirenul;\n- b) rășinile epoxidice;\n- c) polietilena;\n- d) poliuretanii;\n- e) poliesterii.\n**Răspuns: b,d,e**\n### 20) Prin reacțiile de policondensare se obțin:\n- a) uleiurile de siliconi;\n- b) polipropilena;\n- c) rășinile de siliconi;\n- d) cauciucuri și siliconi;\n- e) policlorura de vinil.\n**Răspuns: a,c,d**\n### 21) Din poliacetatul de vinil (P.A.V.) se obține:\n- a) Aracet-impermeabilizator pentru mortare și betoane;\n- b) Vinarom - adeziv pentru lemn;\n- c) Aracet – adeziv pentru covoare P.C.V;\n- d) Vinarom – pentru zugrăveli;\n- e) Aracet – adeziv pentru plăci de sticlă, ceramică.\n**Răspuns: a,c,d,e**\n### 22) Politetrafluoretilena (teflonul) se folosește ca:\n- a) impermeabilizator pentru mortare și betoane;\n- b) protecție anticorozivă;\n- c) sticlă organică;\n- d) etanșare;\n- e) izolant electric.\n**Răspuns: b,d,e**\n### 23) Rășinile epoxidice se folosesc ca adezivi pentru:\n- a) beton vechi, beton nou;\n- b) beton-metal, metal-metal, metal-sticlă;\n- c) uleiuri;\n- d) siliconi;\n- e) rășini.\n**Răspuns: a,b**\n## 15. Materiale de izolație, protecție și finisaj\n### 1) Ca materiale de izolare termică și fonică se utilizează:\n- a) beton, BCA, vată de sticlă, vată minerală;\n- b) BCA, cărămidă, plută, stufit, bumlitzul;\n- c) BCA, vată de sticlă, plută, stufit, plăci de stabilit;\n- d) plăci de talaș, betoane cu agregate vegetale, pâsla;\n- e) betoane, cărămizi, carton bitumat.\n**Răspuns: c,d**\n### 2) Materialele utilizate la hidroizolații sunt:\n- a) bitum;\n- b) carton bitumat;\n- c) pânză bitumată;\n- d) împăslituri din fibră metalică bitumate;\n- e) împăslituri din fibră de sticlă bitumate.\n**Răspuns: a,b,c,d,e**\n### 3) Materialele anorganice pentru izolații termice sunt:\n- a) vată de sticlă;\n- b) plută expandată, plută bitumată;\n- c) vată minerală;\n- d) produse ceramice poroase;\n- e) plăci de stufit.\n**Răspuns: a,c,d**\n### 4) Materialele organice pentru izolații termice sunt:\n- a) vată de sticlă;\n- b) plută expandată, plută bitumată;\n- c) vată minerală;\n- d) produse ceramice poroase;\n- e) plăci de stufit.\n**Răspuns: b,e**\n### 5) Materialele mixte pentru izolații termice sunt:\n- a) plăci rigide din vată minerală;\n- b) plăci semirigide din vată minerală;\n- c) betoane cu agregate vegetale;\n- d) betoane cu agregate din șamotă;\n- e) betoane cu agregate și polimeri.\n**Răspuns: a,b,c,e**\n### 6) Materialele pentru izolații fonice se pot realiza din:\n- a) membrane din placaj;\n- b) plăci fonoabsorbante din vată minerală;\n- c) plăci de ipsos;\n- d) plăci ceramice;\n- e) plăci pe bază de nisip și rășini epoxidice.\n**Răspuns: a,b,e**\n### 7) Izolațiile împotriva vibrațiilor și impactului pot fi realizate din:\n- a) plăci PFL, PAL;\n- b) plută;\n- c) pâsle;\n- d) vată minerală;\n- e) arcuri.\n**Răspuns: a,b,c,d,e**\n### 8) Izolația hidrofugă se poate realiza cu:\n- a) plăci din PFL, PAL;\n- b) plăci ceramice;\n- c) membrane bituminoase;\n- d) betoane asfaltice;\n- e) cartoane și pânze bitumate.\n**Răspuns: c,e**\n### 9) Adezivii sunt:\n- a) suspensii de pigmenti în lacuri cu sau fără adaus de ulei, după întărire dau pelicule colorate și opace;\n- b) amestecuri de gelatină, caseină, polimeri sau bitum cu alte materiale care le fac să adere bine la materialele cu care vin în contact;\n- c) amestecuri de adezivi și materiale de umplutură;\n- d) dispersii de pigmenti și materiale de umplutură în firnăisuri și lacuri, după uscare devin dure și mate;\n- e) soluții de substanțe peliculogene în solvenți volatili cu sau fără adausuri de ulei, după întărire devin lucioase.\n**Răspuns: b**\n### 10) Adezivii sunt pe bază de:\n- a) gelatină (din resturile de piei și oase prin fierberea acestora în apă la presiune);\n- b) caseină- se prepară din caseină separată din lapte;\n- c) rășini sintetice – soluții coloide de rășini sintetice în solvenți volatili;\n- d) uleiuri;\n- e) pigmenti.\n**Răspuns: a,b,c**\n### 11) Emailurile sunt:\n- a) suspensii de pigmenti în lacuri cu sau fără adaus de ulei, după întărire dau pelicule colorate și opace;\n- b) amestecuri de gelatină, caseină, polimeri sau bitum cu alte materiale care le fac să adere bine la materialele cu care vin în contact;\n- c) amestecuri de adezivi și materiale de umplutură;\n- d) dispersii de pigmenti și materiale de umplutură în firnăisuri și lacuri, după uscare devin dure și mate;\n- e) soluții de substanțe peliculogene în solvenți volatili cu sau fără adausuri de ulei, după întărire devin lucioase.\n**Răspuns: a**\n### 12) Chiturile sunt:\n- a) suspensii de pigmenti în lacuri cu sau fără adaus de ulei, după întărire dau pelicule colorate și opace;\n- b) amestecuri de gelatină, caoseină, polimeri sau bitum cu alte materiale care le fac să adere bine la materialele cu care vin în contact;\n- c) amestecuri de adezivi și materiale de umplutură;\n- d) dispersii de pigmenti și materiale de umplutură în firnașuri și lacuri, după uscare devin dure și mate;\n- e) soluții de substanțe peliculogene în solvenți volatili cu sau fără adausuri de ulei, după întărire devin lucioase.\n**Răspuns: d**\n### 13) Grundurile sunt:\n- a) suspensii de pigmenti în lacuri cu sau fără adaus de ulei, după întărire dau pelicule colorate și opace;\n- b) amestecuri de gelatină, caseină, polimeri sau bitum cu alte materiale care le fac să adere bine la materialele cu care vin în contact;\n- c) amestecuri de adezivi și materiale de umplutură;\n- d) dispersii de pigmenti și materiale de umplutură în firnașuri și lacuri, după uscare devin dure și mate;\n- e) soluții de substanțe peliculogene în solvenți volatili cu sau fără adausuri de ulei, după întărire devin lucioase.\n**Răspuns: c**\n### 14) Zugrăvelile pot fi:\n- a) simple cu apă și clei - pe suprafețe tencuite (huma – pudră din argilă uscată);\n- b) cu silicați - pe suprafețele tencuite de cărămidă, beton sau piatră;\n- c) cu caseină - pe suprafețele tencuite din beton, cărămidă sau lemn;\n- d) decorative - zugrăveli cu liniatură, șprițuite;\n- e) lavabile și semilavabile.\n**Răspuns: a,b,c,d,e**\n### 15) Zugrăvelile pot fi:\n- a) în ulei;\n- b) în relief (calciu-vecchio) - peretilor interiori;\n- c) cu caseină - pe suprafețele tencuite din beton;\n- d) cu silicați – pe suprafețele din lemn;\n- e) cu gelatină.\n**Răspuns: b,c**\n### 16) Vopsitoriile pot fi:\n- a) pe bază de bază de poliacetat de vinil (PVA) în emulsie apoasă;\n- b) în ulei;\n- c) decorative;\n- d) în relief (calciu-vecchio în ulei);\n- e) cu silicați - pe suprafețele tencuite de cărămidă, beton sau piatră.\n**Răspuns: a,b,c,d**\n### 17) Materiale pentru finisarea uscată a pereților – Tapetele pot fi:\n- a) nelavabile - hârtie netedă sau presată, țesături textile, mătase sau împăslitură de trestie;\n- b) semilavabile - hârtie specială acoperită pe una din fețe (cea văzută) cu un strat de polimer, în relief, permeabil la vapori de apă;\n- c) lavabile sunt cu suport de hârtie acoperit cu o peliculă de polimer;\n- d) placajele interioare;\n- e) placajele exterioare.\n**Răspuns: a,b,c**\n### 18) Materialele pentru pardoseli pot fi din:\n- a) piatră naturală (marmură, calcar, granit);\n- b) linoleum sau PVC;\n- c) din pământ;\n- d) piatră artificială (beton, ciment, ipsos, ceramice, mozaic);\n- e) din lemn.\n**Răspuns: a,b,c,d,e**\n### 19) Vopselele pe bază de ulei sunt:\n- a) suspensii de pigmenti în substanțe peliculogene cu sau fără material de umplutură;\n- b) suspensii de var, ciment, humă în apă sau soluții coloidale de clei-apă;\n- c) suspensii de pigmenti în uleiuri sicative;\n- d) suspensii sau emulsii apoase de polimeri care conțin materiale de umplutură și pigmenti;\n- e) soluții apoase de gelatină, clei de oase și pigmenti.\n**Răspuns: c**\n### 20) Vopselele pe bază de polimeri sunt:\n- a) suspensii de pigmenti în substanțe peliculogene cu sau fără material de umplutură;\n- b) suspensii de var, ciment, humă în apă sau soluții coloidale de clei-apă;\n- c) suspensii de pigmenti în uleiuri sicative;\n- d) suspensii sau emulsii apoase de polimeri care conțin materiale de umplutură și pigmenti;\n- e) soluții apoase de gelatină, clei de oase și pigmenti.\n**Răspuns: d**\n## 16. Materiale compozite\n### 1) În funcție de perioada de apariție, materialele compozite se clasifică în:\n- a) două generații;\n- b) trei generații;\n- c) patru generații;\n- d) cinci generații;\n- e) șase generații.\n**Răspuns: b**\n### 2) Din prima generație de materiale compozite fac parte:\n- a) bachelita armată;\n- b) papirusul;\n- c) cărămizile armate;\n- d) materialele metalice armate;\n- e) hârtia.\n**Răspuns: b,c,d,e**\n### 3) Din a doua generație de materiale compozite fac parte:\n- a) zidăria de piatră și mortar din var hidraulic;\n- b) hârtia;\n- c) bachelita armată;\n- d) zidăria din cărămidă arsă și mortar;\n- e) materialele metalice armate.\n**Răspuns: c,e**\n### 4) Din a doua generație de materiale compozite fac parte:\n- a) papirusul;\n- b) betoanele armate dispers;\n- c) cărămizile armate;\n- d) materiale plastice armate cu fibre de sticlă;\n- e) betoane armate cu fibre de bor.\n**Răspuns: b,d**\n### 5) Din a doua generație de materiale compozite fac parte:\n- a) materialele plastice armate cu fibre de carbon;\n- b) zidăria din cărămidă arsă și mortar;\n- c) betoane armate dispers;\n- d) cărămizile armate cu paie;\n- e) poliesteri armați cu fibre.\n**Răspuns: c**\n### 6) Materialul compozit se definește ca un sistem multifazic obținut pe cale:\n- a) naturală;\n- b) artificială;\n- c) prin polimerizare;\n- d) prin policondensare;\n- e) prin poliaditie.\n**Răspuns: b**\n### 7) Materialul compozit este un sistem creat prin asamblarea artificială a:\n- a) unui component de armare și a unei mase de bază;\n- b) unei mase de bază simplu armată;\n- c) a unei mase de bază și a doi componenti de armare;\n- d) adaosurilor tehnologice;\n- e) ramforsantului și a adaosurilor tehnologice.\n**Răspuns: a**\n### 8) Structura unui material compozit este alcătuită din:\n- a) matrice, ranforsant, adaosuri tehnologice, interfața fibra-matrice;\n- b) masa de bază, materialul de armare, adaosurile tehnologice, interfața fibra-matrice;\n- c) ranforsantul, matricea, aditivi;\n- d) matrice, ranforsant;\n- e) ranforsant, adaosuri topitoare.\n**Răspuns: a,b**\n### 9) Structura unui material compozit este alcătuită din:\n- a) matrice, ranforsant, adaosuri tehnologice;\n- b) ranforsant, întăritor, accelerator;\n- c) ranforsantul, matricea, ancolant;\n- d) masa de bază, materialul de armare, adaosurile tehnologice, interfața fibra-matrice;\n- e) termoplaste, termorigide, catalizatori.\n**Răspuns: d**\n### 10) Matricea poate fi:\n- a) metalică;\n- b) carbonică;\n- c) minerală;\n- d) magnetică;\n- e) polimerică.\n**Răspuns: a,c,e**\n### 11) Matricea polimerică poate fi sub formă de:\n- a) catalizatori;\n- b) accelerator;\n- c) catalizatori;\n- d) termoplaste;\n- e) termorigide.\n**Răspuns: d,e**\n### 12) Matricea minerală poate fi din:\n- a) ciment;\n- b) ipsos;\n- c) var;\n- d) ceramică;\n- e) metalică.\n**Răspuns: a,b,d**\n### 13) Termoplastele își păstrează proprietățile mecanice și electrice până la temperatura:\n- a) 80°C;\n- b) 100°C;\n- c) 120°C;\n- d) 200°C;\n- e) 220°C.\n**Răspuns: c**\n### 14) Matricea minerală poate fi din:\n- a) ceramică;\n- b) metalică;\n- c) termoplaste, termorigide;\n- d) ipsos, ciment;\n- e) ignifuganți.\n**Răspuns: a,d**\n### 15) Ranforsantul poate fi:\n- a) mineral;\n- b) organic;\n- c) anti ultraviolete;\n- d) fibre de carbon;\n- e) fibre din carbură de siliciu.\n**Răspuns: a,b**\n### 16) Ranforsantul poate fi:\n- a) organic;\n- b) metallic;\n- c) sub formă de umpluturi;\n- d) sub formă de catalizatori;\n- e) ceramic.\n**Răspuns: a,b,e**\n### 17) Adaosurile tehnologice pot fi:\n- a) termoplaste;\n- b) catalizatori;\n- c) umpluturi;\n- d) termorigide;\n- e) protectori.\n**Răspuns: b,c,e**\n### 18) Adaosurile tehnologice pot fi:\n- a) anti ultraviolete;\n- b) whiskers;\n- c) din titan;\n- d) acceleratori;\n- e) ignifuganți.\n**Răspuns: a,d,e**\n### 19) Adaosurile tehnologice pot fi:\n- a) termorigide;\n- b) umpluturi;\n- c) catalizatori;\n- d) din bachelită;\n- e) poliesteri armați.\n**Răspuns: b,c**\n### 20) Matricea îndeplinește funcțiunile:\n- a) împiedică flambajul fibrelor de armare;\n- b) majorează rezistența la întindere;\n- c) constituie mediul de transmisie a eforturilor în compozit;\n- d) stabilește forma definitivă a produsului;\n- e) împiedică smulgerea fibrelor.\n**Răspuns: a,c,d**\n### 21) Termoplastele au:\n- a) rezistență mare la șoc mecanic;\n- b) rezistență mare la temperaturi înalte;\n- c) coeficient mare de dilatare termică;\n- d) conductivitate termică ridicată;\n- e) o bună stabilitate dimensională.\n**Răspuns: c,e**\n### 22) Termoplastele au:\n- a) slabă rezistență la coroziune;\n- b) rezistența mică la șoc mecanic;\n- c) rezistență mecanică redusă la temperaturi înalte;\n- d) conductivitate termică redusă;\n- e) coeficient mare de dilatare termică.\n**Răspuns: a,b,c,d,e**\n### 23) Termoplastele au o structură:\n- a) liniară;\n- b) reticulară;\n- c) hexagonală;\n- d) ramificată;\n- e) rectangulară.\n**Răspuns: a,d**\n### 24) Termorigidele au o structură:\n- a) liniară;\n- b) reticulară;\n- c) hexagonală;\n- d) ramificată;\n- e) rectangulară.\n**Răspuns: b**\n### 25) Matricea minerală poate fi realizată din:\n- a) ciment, ipsos, ceramică;\n- b) ceramică, ciment, var;\n- c) ciment, var, ipsos;\n- d) var, ciment;\n- e) ipsos, var.\n**Răspuns: a**\n### 26) Matricea metalică poate fi sub formă de aliaje pe bază de:\n- a) Al, Ca, Mn, Ti, Fe;\n- b) Al, Cu, Mg, Ti, Te;\n- c) Mg, Ti, Al, Cu, Fe;\n- d) Cu, Na, Ti, Fe, Mn;\n- e) Al, Fe, K, Mg, Ca.\n**Răspuns: c**\n### 27) Pentru a evita smulgerea fibrelor din matrice, coeficientul de formă (l/d) trebuie să fie egal cu:\n- a) 29;\n- b) 25;\n- c) 30-50;\n- d) 52;\n- e) 55.\n**Răspuns: c**\n### 28) Interfața fibră-matrice are o grosime de:\n- a) 10⁻⁶ m;\n- b) 10⁻⁷ m;\n- c) 10⁻⁸ m;\n- d) 10⁻⁹ m;\n- e) 10⁻¹⁰ m.\n**Răspuns: c**\n### 29) Avantajele materialelor compozite:\n- a) stabilitate chimică;\n- b) deformății neliniare;\n- c) capacitate de amortizare a vibrațiilor;\n- d) cheltuieli mici de întreținere și reparații;\n- e) grad ridicat de finisare.\n**Răspuns: a,c,d,e**\n### 30) Dezavantajele materialelor compozite:\n- a) (rezistență la rupere/greutate specifică) mult mai mare decât la materialele tradiționale;\n- b) deformății neliniare;\n- c) flexibilitate mare la pânzele cu grosime variabilă;\n- d) asamblarea dificilă cu materialele tradiționale;\n- e) capacitatea de amortizare a vibrațiilor.\n**Răspuns: b,d**\n## 17. Betoane armate cu fibre\n### 1) Betoanele cu armare dispersă sunt alcătuite din:\n- a) beton+fibre continue;\n- b) beton+fibre discontinue;\n- c) beton+fibre continue și discontinue;\n- d) ciment + fibre de azbest;\n- e) ciment + whiskers.\n**Răspuns: b,d**\n### 2) Betoanele cu armare dispersă utilizează ca liant:\n- a) cimentul aluminos;\n- b) cimentul magnezian;\n- c) cimentul portland;\n- d) ipsos;\n- e) bitum.\n**Răspuns: c**\n### 3) Betoanele cu armare dispersă utilizează agregate cu φmax:\n- a) 1mm;\n- b) 3mm;\n- c) 7(10)mm;\n- d) 15mm;\n- e) 31mm.\n**Răspuns: c**\n### 4) Betoanele cu armare dispersă utilizează fibre:\n- a) naturale și artificiale;\n- b) numai naturale;\n- c) numai artificiale;\n- d) doar naturale minerale;\n- e) doar artificiale organice.\n**Răspuns: a**\n### 5) Din fibrele naturale organice fac parte:\n- a) părul de animale;\n- b) carbonul;\n- c) celuloza;\n- d) bazalt;\n- e) zgura de furnal înalt.\n**Răspuns: a,c**\n### 6) Din fibrele naturale organice fac parte:\n- a) polietilena;\n- b) soia;\n- c) loes;\n- d) fibre de nuci de cocos;\n- e) iuta.\n**Răspuns: b,d,e**\n### 7) Fibrele naturale minerale sunt din:\n- a) fibre de nuci de cocos;\n- b) soia;\n- c) azbest;\n- d) bumbac;\n- e) celuloză de lemn.\n**Răspuns: c**\n### 8) Fibrele artificiale organice sunt din:\n- a) carbon;\n- b) polietilena;\n- c) vâscoză;\n- d) in, sisal;\n- e) poliesteri sau acrilice.\n**Răspuns: b,c,e**\n### 9) Fibrele artificiale organice sunt din:\n- a) acetat de celuloză;\n- b) poliesteri;\n- c) sisal;\n- d) silico-aluminoase;\n- e) polipropilenă modificată.\n**Răspuns: a,b,e**\n### 10) Fibrele artificiale minerale sunt din:\n- a) bazalt;\n- b) polietilenă;\n- c) polipropilenă modificată;\n- d) grafit;\n- e) sticlă zirconică.\n**Răspuns: a,d,e**\n### 11) Fibrele artificiale minerale sunt din:\n- a) oțel;\n- b) zgură de furnal înalt;\n- c) azbest;\n- d) fibre de nuci de cocos;\n- e) celuloză de lemn și vegetale.\n**Răspuns: a,b**\n### 12) Azbocimentul se obține din:\n- a) beton+azbest;\n- b) beton+aditivi+azbest;\n- c) ciment+azbest;\n- d) ciment+ nisip + azbest;\n- e) azbest+ nisip.\n**Răspuns: c**\n### 13) Fibrele de azbest se obțin:\n- a) prin polimerizare;\n- b) prin policondensare;\n- c) prin poliaditie;\n- d) prin defibrare;\n- e) pe cale mecanică sau chimică.\n**Răspuns: d,e**\n### 14) Materia primă pentru fibrele de carbon poate fi:\n- a) solidă;\n- b) lichidă;\n- c) gazoasă;\n- d) plasmă;\n- e) vâscoasă.\n**Răspuns: a,b,c**\n### 15) Materia primă solidă pentru fibrele de carbon este:\n- a) gudoanele;\n- b) cărbunele amorf;\n- c) asfaltul de petrol;\n- d) acetilena;\n- e) uleiurile aromatice.\n**Răspuns: b,c**\n### 16) Materia primă lichidă pentru fibrele de carbon este:\n- a) asfaltul de petrol;\n- b) petrolul;\n- c) acetilena;\n- d) cărbunele amorf;\n- e) hidrocarburile.\n**Răspuns: b**\n### 17) Materia primă lichidă pentru fibrele de carbon este:\n- a) uleiuri aromatice;\n- b) hidrocarburi;\n- c) gudoane;\n- d) fibrele organice;\n- e) azbocimentul.\n**Răspuns: a,c**\n### 18) Materia primă gazoasă pentru fibrele de carbon este:\n- a) acetilena;\n- b) hidrocarburi;\n- c) petrol;\n- d) cărbunele amorf;\n- e) fibrele organice.\n**Răspuns: a,b**\n### 19) Fibrele de oțel au secțiunea:\n- a) circulară;\n- b) eliptică;\n- c) triunghiulară;\n- d) pătrată;\n- e) rectangulară.\n**Răspuns: a,d,e**\n### 20) Fibrele de oțel au forma:\n- a) rectilinie;\n- b) în zig-zac;\n- c) cu ciocuri la extremități;\n- d) rugoasă;\n- e) ondulată.\n**Răspuns: a,c,e**\n### 21) Fibrele de sticlă pot fi:\n- a) cu calciu;\n- b) cu potasiu;\n- c) cu titan;\n- d) cu magneziu;\n- e) cu zirconiu.\n**Răspuns: a,e**\n### 22) Fibrele de sticlă pot fi:\n- a) cu polipropilenă;\n- b) cu zirconiu;\n- c) cu aluminiu;\n- d) cu bazosilicăți;\n- e) cu sodiu.\n**Răspuns: b,d,e**\n### 23) La armarea betoanelor cu ciment portland se folosesc fibrele de sticlă:\n- a) cu zirconiu;\n- b) cu silice;\n- c) cu sodiu;\n- d) cu titan;\n- e) cu magneziu.\n**Răspuns: a**\n### 24) Fibrele de sticlă obișnuită se folosesc la betoane având ca liant:\n- a) ipsosul;\n- b) cimentul portland;\n- c) cimentul aluminos;\n- d) cimentul alitic;\n- e) cimentul belitic.\n**Răspuns: a,c**\n### 25) Fibrele de sticlă obișnuită se folosesc la betoane având ca liant:\n- a) cimentul portland;\n- b) cimentul aluminos;\n- c) cimentul magnezian;\n- d) cimentul celitic;\n- e) cimenturile speciale.\n**Răspuns: b,c**\n### 26) Modulul de elasticitate al betonului cu fibre este dat de relația:\n- a) Ebf = Ef μ + Em (1 - μ);\n- b) Ebf = Ef (1 - μ) + Em μ;\n- c) Ebf = Em (1 - μ) + Ef (1 + μ);\n- d) Ebf = Efμ + Em(1 + μ);\n- e) Ebf = Emμ + Ef(1 - μ).\n**Răspuns: a**\n### 27) În betoanele cu fibre de sticlă, granulele de ciment au dimensiunile de aproximativ:\n- a) 20μ;\n- b) 30μ;\n- c) 40μ;\n- d) 50μ;\n- e) 60μ.\n**Răspuns: a**\n### 28) După câte luni de păstare în apă, întreg filamentul de fibre de stică este acoperit cu ciment:\n- a) două luni;\n- b) trei luni;\n- c) (2 - 4) luni;\n- d) (1 - 2) luni;\n- e) (6 -12) luni.\n**Răspuns: e**\n### 29) Procentul optim (în masă) de fibre de sticlă înglobate în beton este:\n- a) 2%;\n- b) 3%;\n- c) (5 - 6)%;\n- d) 7%;\n- e) 9%.\n**Răspuns: c**\n### 30) Betoanele cu fibre de sticlă au dimensiunea maximă a granuleului de nisip:\n- a) 0,25mm;\n- b) 1mm;\n- c) 4mm;\n- d) 8mm;\n- e) 16mm.\n**Răspuns: d**\n### 31) Sticla zirconică a apărut prima oară în:\n- a) 1920;\n- b) 1948;\n- c) 1967;\n- d) 1973;\n- e) 1985.\n**Răspuns: c**\n### 32) Betoanele cu fibre de oțel - fibrele au diametre de:\n- a) 0,15mm;\n- b) 0,25mm;\n- c) 0,35mm;\n- d) 0,45mm;\n- e) 0,55mm.\n**Răspuns: b,c,d**\n### 33) Lungimea minimă a fibrelor pentru ca acestea să nu se smulgă la apariția primelor fisuri este dată de relația:\n- a) l = d (Ef/τm) εt;\n- b) l = d (Ef/Em) εt;\n- c) l = d (Ef/τm) dt;\n- d) l = d (Ef/En) εt;\n- e) l = d (Et/Em) εt.\n**Răspuns: a**\n### 34) Intervalul dintre fibre este dat de relația:\n- a) S = ³√(Vb/n);\n- b) S = √(Vb/n);\n- c) S = ³√(Vb/d);\n- d) S = ³√(Vm/d);\n- e) S = ³√(Vb/d²).\n**Răspuns: a**\n### 35) Betoanele cu fibre de oțel folosesc ca liant:\n- a) ipsosul;\n- b) cimentul portland;\n- c) cimentul aluminos;\n- d) cimentul belitic;\n- e) cimentul alitic.\n**Răspuns: b**\n### 36) Betoanele cu fibre de oțel au diametrul maxim al agregatelor de:\n- a) 1 mm;\n- b) 3 mm;\n- c) 7 mm;\n- d) 10 mm;\n- e) 15 mm.\n**Răspuns: d**\n### 37) Betoanele cu fibre de carbon - la elementele întinse – procentul maxim de armare:\n- a) 2%;\n- b) 4%;\n- c) 6%;\n- d) 8%;\n- e) 10%.\n**Răspuns: e**\n### 38) Betoanele cu fibre de carbon - la elemente încovoiate - procentul maxim de armare:\n- a) 6%;\n- b) 8%;\n- c) 10%;\n- d) 12%;\n- e) 14%.\n**Răspuns: b**\n## 18. Betoane cu polimeri\n### 1) Ce procent din producția de polimeri este folosit în construcții:\n- a) 10%;\n- b) 20%;\n- c) 30%;\n- d) 40%;\n- e) 50%.\n**Răspuns: c**\n### 2) Betoanele cu polimeri pot fi:\n- a) acoperiri;\n- b) permanente;\n- c) temporare;\n- d) betoane propriu-zise;\n- e) impregnate și polimerizate.\n**Răspuns: a,d,e**\n### 3) Acoperirile cu polimeri:\n- a) pătrund în elementul de construcție;\n- b) nu pătrund în elementul de construcție;\n- c) modifică proprietățile fizico-mecanice;\n- d) protejează elementele de beton;\n- e) modifică proprietățile chimice ale betonului.\n**Răspuns: b,d**\n### 4) Acoperirile cu polimeri:\n- a) modifică proprietățile masei de beton;\n- b) nu modifică proprietățile masei de beton;\n- c) modifică proprietățile doar la suprafață;\n- d) influențează permeabilitatea;\n- e) influențează rezistențele mecanice.\n**Răspuns: b,c**\n### 5) Acoperirile cu polimeri se utilizează pentru:\n- a) a micșora permeabilitatea;\n- b) a mări gelivitatea;\n- c) a mări rezistențele mecanice;\n- d) a mări durabilitatea betonului;\n- e) a reduce rezistența la acțiuni chimice.\n**Răspuns: a,b,d**\n### 6) Acoperirile cu polimeri folosesc următorii polimeri:\n- a) epoxidici;\n- b) latexul;\n- c) poliuretanii;\n- d) rășini sintetice;\n- e) polietilena.\n**Răspuns: a,c,e**\n### 7) Betoanele propriu-zise cu polimeri pot fi:\n- a) betoane de ciment cu polimeri;\n- b) betoane de ciment fără polimeri;\n- c) betoane de ciment impregnate;\n- d) betoane cu polimeri, fără ciment;\n- e) betoane cu acoperiri superficiale.\n**Răspuns: a,d**\n### 8) Betoanele de ciment cu polimeri se mai numesc:\n- a) plastobeton;\n- b) betoane cu latex;\n- c) betoane impregnate;\n- d) betoane artificiale;\n- e) betoane de ultimă generație.\n**Răspuns: a,b**\n### 9) Betoanele de ciment cu polimeri se mai numesc:\n- a) betoane cu rășini sintetice;\n- b) betoane polimerizate;\n- c) betoane cu latex;\n- d) betoane moderne;\n- e) betoane aditivate.\n**Răspuns: a,c**\n### 10) Betoanele de ciment cu polimeri se obțin prin adăugarea în masa lor a:\n- a) unui aditiv;\n- b) unui compus macromolecular;\n- c) unui adaos;\n- d) unui adaos tehnologic;\n- e) unui compus micromolecular.\n**Răspuns: b**\n### 11) Liantul mineral la betoanele de ciment cu polimeri poate fi:\n- a) ciment portland;\n- b) ipsosul;\n- c) bitumul;\n- d) cimentul alitic;\n- e) cimentul aluminos.\n**Răspuns: a,b,e**\n### 12) Liantul mineral la betoanele de ciment cu polimeri poate fi:\n- a) varul;\n- b) cauciucul butadienic;\n- c) ipsosul;\n- d) cimentul belitic;\n- e) cimentul brawmilleritic.\n**Răspuns: c**\n### 13) Liantul organic la betoanele de ciment cu polimeri poate fi:\n- a) natural;\n- b) artificial;\n- c) mineral;\n- d) bitumul;\n- e) bitumul aditivat.\n**Răspuns: a,b**\n### 14) Liantul organic sintetic la betoanele de ciment cu polimeri poate fi:\n- a) policlorura de vinil;\n- b) poliacetatul de vinil;\n- c) bitumul;\n- d) uleiurile silicative;\n- e) gudroanele.\n**Răspuns: a,b**\n### 15) Liantul organic sintetic la betoanele de ciment cu polimeri poate fi:\n- a) cauciucul butadienic;\n- b) cauciucul natural;\n- c) etil celuloza;\n- d) hidrații de carbon;\n- e) polistirenul.\n**Răspuns: a**\n### 16) Liantul organic natural la betoanele de ciment cu polimeri poate fi:\n- a) bitumul;\n- b) asfalturile;\n- c) gudroanele;\n- d) polimetacrilății;\n- e) serul sangvin.\n**Răspuns: a,b,c,e**\n### 17) Liantul organic natural la betoanele de ciment cu polimeri poate fi:\n- a) cauciucul natural;\n- b) cazeina;\n- c) cauciucul butadienic;\n- d) polistirenul;\n- e) metil-celuloza.\n**Răspuns: a**\n### 18) În betoanele de ciment cu polimeri, preponderent este:\n- a) părți egale de liant mineral și organic;\n- b) liantul mineral;\n- c) liantul organic;\n- d) apa;\n- e) aditivul.\n**Răspuns: b**\n### 19) La betoanele de ciment cu polimeri dozajele uzuale Ag/C sunt:\n- a) 5;\n- b) 4;\n- c) 3;\n- d) 2;\n- e) 1.\n**Răspuns: c**\n### 20) La betoanele de ciment cu polimeri dozajele uzuale P/C sunt:\n- a) 0,02;\n- b) 0,05-0,2;\n- c) 0,29;\n- d) 0,21;\n- e) 0,23.\n**Răspuns: b**\n### 21) Betoanele de ciment cu polimeri se utilizează la:\n- a) repararea elementelor de beton;\n- b) creșterea gelivității;\n- c) elemente de finisaj;\n- d) creșterea rezistențelor mecanice;\n- e) protecții anticorozive.\n**Răspuns: a,b,e**\n### 22) Betoanele cu polimeri fără ciment conțin:\n- a) liant mineral + agregate + polimer;\n- b) polimer + agregat + agent de întărire;\n- c) polimer + agregate + apă;\n- d) liant mineral + liant organic;\n- e) polimer + agregat + apă.\n**Răspuns: b**\n### 23) La betoanele cu polimeri fără ciment se folosesc polimerii:\n- a) epoxidici;\n- b) vinilici;\n- c) poliesterii;\n- d) metil-celuloza;\n- e) fenolici.\n**Răspuns: a,c,e**\n### 24) La betoanele cu polimeri fără ciment se folosesc agregate:\n- a) de balastieră;\n- b) calcar;\n- c) granulit;\n- d) de concasaj;\n- e) piatra de ghips.\n**Răspuns: a,d**\n### 25) La betoanele cu polimeri fără ciment se folosesc ca agregate:\n- a) filerul;\n- b) granule de cauciuc;\n- c) granulit;\n- d) spărturi ceramice;\n- e) bolovăniș.\n**Răspuns: a**\n### 26) Betoanele impregnate și polimerizate se obțin:\n- a) din beton obișnuit impregnat cu un monomer și polimerizat;\n- b) beton cu liant mixt (mineral + organic);\n- c) prin introducerea unui compus macromolecular;\n- d) microbeton acoperit cu polimeri;\n- e) beton impregnat cu polimeri.\n**Răspuns: a**\n### 27) Betoanele impregnate și polimerizate se obțin din:\n- a) ciment + agregat + apă;\n- b) ciment + agregat + apă + monomer;\n- c) ciment + polimer + agregat + apă;\n- d) polimer + agregate + ciment;\n- e) ipsos + agregat + apa + monomer.\n**Răspuns: b**\n### 28) Impregnarea cu monomer se face la:\n- a) 90°C;\n- b) 5,3 atm și 20°C;\n- c) 10 atm și 25°C;\n- d) 15 atm și 55°C;\n- e) 20 atm și 215°C.\n**Răspuns: e**\n### 29) Betoanele impregnate și polimerizate au rezistențe mecanice mai mari față de betonul obișnuit:\n- a) de două ori;\n- b) de trei ori;\n- c) de patru ori;\n- d) de 1,5 ori;\n- e) de zece ori.\n**Răspuns: b**\n### 30) Betoanele impregnate și polimerizate – polimerizarea se face:\n- a) înainte de întărire;\n- b) după întărire;\n- c) după uscare;\n- d) înainte de punere în operă;\n- e) după punerea în operă.\n**Răspuns: b**";

      { "question": "Which of the following are primary colors of light?", "options": ["Red", "Green", "Blue", "Yellow", "Cyan"], "answer": [0, 1, 2] },
      { "question": "What is the capital of France?", "options": ["London", "Berlin", "Paris", "Madrid", "Rome"], "answer": [2] },
      { "question": "Which planets in our solar system are known as gas giants?", "options": ["Mercury", "Venus", "Jupiter", "Saturn", "Mars"], "answer": [2, 3] },
      { "question": "In which year did World War II end?", "options": ["1943", "1944", "1945", "1946", "1947"], "answer": [2] },
