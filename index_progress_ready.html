    const STORAGE_KEY = 'quiz-personal-v1';
    const SESSION_KEY = 'quiz-session-v1';
    const STATS_KEY = 'quiz-lifetime-stats-v1';

    function savePreferences() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          questionTimeSec: questionTimeSec,
          waitBetweenSec: waitBetweenSec,
          noTimersMode: noTimersMode
        }));
      } catch (e) { /* ignore */ }
    }

    function loadPreferences() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        var saved = JSON.parse(raw);
        if (typeof saved.questionTimeSec === 'number') questionTimeSec = saved.questionTimeSec;
        if (typeof saved.waitBetweenSec === 'number') waitBetweenSec = saved.waitBetweenSec;
        if (typeof saved.noTimersMode === 'boolean') noTimersMode = saved.noTimersMode;
      } catch (e) { /* ignore */ }
    }

    function buildQuestionId(question) {
      var cat = question && question.category !== undefined ? question.category : currentCategory;
      var num = question && question.number !== undefined ? question.number : '';
      var text = question && question.question ? question.question : '';
      return String(cat || 'x') + '::' + String(num) + '::' + text;
    }

    function loadLifetimeStats() {
      try {
        var raw = localStorage.getItem(STATS_KEY);
        if (!raw) return {};
        var parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch (e) {
        return {};
      }
    }

    function saveLifetimeStats(stats) {
      try {
        localStorage.setItem(STATS_KEY, JSON.stringify(stats || {}));
      } catch (e) { /* ignore */ }
    }

    function getLifetimeSummary() {
      var stats = loadLifetimeStats();
      var attemptedQuestions = 0;
      var totalAttempts = 0;
      var correctAttempts = 0;
      var wrongAttempts = 0;
      Object.keys(stats).forEach(function (key) {
        var item = stats[key];
        if (!item) return;
        attemptedQuestions += 1;
        totalAttempts += item.seen || 0;
        correctAttempts += item.correct || 0;
        wrongAttempts += item.wrong || 0;
      });
      var accuracy = totalAttempts > 0 ? Math.round((correctAttempts / totalAttempts) * 100) : 0;
      return {
        attemptedQuestions: attemptedQuestions,
        totalAttempts: totalAttempts,
        correctAttempts: correctAttempts,
        wrongAttempts: wrongAttempts,
        accuracy: accuracy
      };
    }

    function getCategorySummary(cat, list) {
      var stats = loadLifetimeStats();
      var attemptedQuestions = 0;
      var totalAttempts = 0;
      var correctAttempts = 0;
      var wrongAttempts = 0;
      var totalQuestions = Array.isArray(list) ? list.length : 0;
      (list || []).forEach(function (question) {
        var item = stats[buildQuestionId(question)];
        if (!item) return;
        attemptedQuestions += 1;
        totalAttempts += item.seen || 0;
        correctAttempts += item.correct || 0;
        wrongAttempts += item.wrong || 0;
      });
      var accuracy = totalAttempts > 0 ? Math.round((correctAttempts / totalAttempts) * 100) : 0;
      return {
        attemptedQuestions: attemptedQuestions,
        totalQuestions: totalQuestions,
        totalAttempts: totalAttempts,
        correctAttempts: correctAttempts,
        wrongAttempts: wrongAttempts,
        accuracy: accuracy
      };
    }

    function recordQuestionResult(question, wasCorrect) {
      if (!question) return;
      var stats = loadLifetimeStats();
      var key = buildQuestionId(question);
      if (!stats[key]) {
        stats[key] = {
          seen: 0,
          correct: 0,
          wrong: 0,
          lastSeen: null
        };
      }
      stats[key].seen += 1;
      if (wasCorrect) stats[key].correct += 1;
      else stats[key].wrong += 1;
      stats[key].lastSeen = Date.now();
      saveLifetimeStats(stats);
    }

    function saveSession() {
      if (!Array.isArray(activeQuestions) || activeQuestions.length === 0 || currentCategory === null || currentQuestionIndex >= activeQuestions.length) {
        return;
      }
      try {
        localStorage.setItem(SESSION_KEY, JSON.stringify({
          currentCategory: currentCategory,
          activeQuestions: activeQuestions,
          currentQuestionIndex: currentQuestionIndex,
          score: score,
          wrongCount: wrongCount,
          answerResults: answerResults,
          questionTimeSec: questionTimeSec,
          waitBetweenSec: waitBetweenSec,
          noTimersMode: noTimersMode,
          savedAt: Date.now()
        }));
      } catch (e) { /* ignore */ }
    }

    function loadSavedSession() {
      try {
        var raw = localStorage.getItem(SESSION_KEY);
        if (!raw) return null;
        var saved = JSON.parse(raw);
        if (!saved || !Array.isArray(saved.activeQuestions) || saved.activeQuestions.length === 0) return null;
        return saved;
      } catch (e) {
        return null;
      }
    }

    function clearSavedSession() {
      try {
        localStorage.removeItem(SESSION_KEY);
      } catch (e) { /* ignore */ }
    }

    function applySavedSession(saved) {
      if (!saved || !Array.isArray(saved.activeQuestions) || saved.activeQuestions.length === 0) return false;
      currentCategory = typeof saved.currentCategory === 'number' ? saved.currentCategory : null;
      activeQuestions = saved.activeQuestions;
      currentQuestionIndex = typeof saved.currentQuestionIndex === 'number' ? saved.currentQuestionIndex : 0;
      if (currentQuestionIndex < 0) currentQuestionIndex = 0;
      if (currentQuestionIndex >= activeQuestions.length) currentQuestionIndex = activeQuestions.length - 1;
      score = typeof saved.score === 'number' ? saved.score : 0;
      wrongCount = typeof saved.wrongCount === 'number' ? saved.wrongCount : 0;
      answerResults = Array.isArray(saved.answerResults) ? saved.answerResults.slice() : new Array(activeQuestions.length);
      if (typeof saved.questionTimeSec === 'number') questionTimeSec = saved.questionTimeSec;
      if (typeof saved.waitBetweenSec === 'number') waitBetweenSec = saved.waitBetweenSec;
      if (typeof saved.noTimersMode === 'boolean') noTimersMode = saved.noTimersMode;
      applyPreferencesToUI();

      document.querySelector('.question-container').classList.remove('category-screen', 'main-menu-screen');
      var backBtn = document.getElementById('btn-back');
      if (backBtn) backBtn.classList.remove('hidden');
      var tracker = document.getElementById('progress-tracker');
      if (tracker) tracker.classList.remove('hidden');
      displayQuestion(currentQuestionIndex);
      return true;
    }

    function resumeSavedSession() {
      var saved = loadSavedSession();
      if (!saved) return false;
      return applySavedSession(saved);
    }

    function createActionButton(label, background, color, onClick, disabled) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn';
      btn.textContent = label;
      btn.style.background = background;
      btn.style.color = color;
      btn.disabled = !!disabled;
      btn.style.opacity = disabled ? '0.55' : '1';
      btn.style.cursor = disabled ? 'default' : 'pointer';
      if (!disabled) btn.addEventListener('click', onClick);
      return btn;
    }

    function refreshCurrentMenu() {
      var section = document.querySelector('.question-container');
      if (section && section.classList.contains('category-screen')) showCategoryScreen();
      else showMainMenu();
    }

    function appendProgressActions(parent, includeLifetimeSummary) {
      var saved = loadSavedSession();
      var lifetime = getLifetimeSummary();
      var box = document.createElement('div');
      box.style.marginTop = '1rem';
      box.style.padding = '0.9rem';
      box.style.borderRadius = '10px';
      box.style.background = '#f5f6f8';
      box.style.border = '1px solid #e1e4ea';

      if (includeLifetimeSummary) {
        var summary = document.createElement('div');
        summary.style.marginBottom = '0.75rem';
        summary.innerHTML = '<strong>Lifetime progress</strong><div style="margin-top:0.35rem;font-size:0.92rem;color:#445;">' +

      }

      actions.style.flexWrap = 'wrap';

      }, !saved));

      actions.appendChild(createActionButton('Reset lifetime stats', '#f8d7da', '#721c24', function () {

    function shuffleArray(arr) {

      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function shuffleQuestionOptions(question) {
      const pairs = question.options.map((text, i) => ({ text, originalIndex: i }));
      const shuffled = shuffleArray(pairs);
      const newOptions = shuffled.map(p => p.text);
      const newAnswer = [];
      shuffled.forEach((p, newIdx) => {
        if (question.answer.includes(p.originalIndex)) newAnswer.push(newIdx);
      });
      var out = { question: question.question, options: newOptions, answer: newAnswer };
      if (question.number !== undefined) out.number = question.number;
      if (question.category !== undefined) out.category = question.category;
      return out;
    }

    function shuffleQuestions(questionsList) {
      const shuffled = shuffleArray(questionsList);
      return shuffled.map(q => shuffleQuestionOptions(q));
    }

    function showLoadWarning(msg) {
      const el = document.getElementById('load-warning');

    function parseMarkdownQuiz(mdText) {
      var structured = {};
      var names = {};
      for (var c = 6; c <= 18; c++) structured[c] = [];
      var lines = mdText.split(/\r?\n/);
      var i = 0;
      var currentCategory = 6;
      var reCategory = /^##\s+(\d+)\.\s*(.*)$/;
      var reSubheading = /^###\s+(?!\d+\))/;
      var reQuestion = /^(?:###\s*)?(\d+)\)\s*(.+)$/;
      var reOption = /^-\s*([a-e])\)\s*(.+)$/;
      var reAnswer = /^\*\*Răspuns:\s*([a-e,]+)/i;
      while (i < lines.length) {
        var catMatch = lines[i].match(reCategory);
        if (catMatch) {
          var num = parseInt(catMatch[1], 10);
          if (num >= 6 && num <= 18) {
            currentCategory = num;
            if (catMatch[2]) names[num] = catMatch[2].trim();
          }
          i++;
          continue;
        }
        var qLine = lines[i];
        var qMatch = qLine.match(reQuestion);
        if (!qMatch) {
          if (lines[i].match(reSubheading)) { i++; continue; }
          i++;
          continue;
        }
        var questionNum = parseInt(qMatch[1], 10);
        var questionText = qMatch[2].trim();
        var options = [];
        var optionsByLetter = {};
        i++;
        while (i < lines.length) {
          if (lines[i].match(reCategory)) break;
          if (lines[i].match(reSubheading) && !lines[i].match(reQuestion)) break;
          if (lines[i].match(reQuestion)) break;
          var optMatch = lines[i].match(reOption);
          if (optMatch) {
            var letter = optMatch[1].toLowerCase();
            var optText = optMatch[2].replace(/\s*;\s*$/, '').trim();
            var idx = options.length;
            options.push(optText);
            optionsByLetter[letter] = idx;
            i++;
          } else if (lines[i].match(reAnswer)) {
            break;
          } else {
            i++;
          }
        }
        if (i >= lines.length) break;
        var ansMatch = lines[i].match(reAnswer);
        if (!ansMatch) {
          if (lines[i].match(reQuestion)) continue;
          i++;
          continue;
        }
        var answerLetters = ansMatch[1].toLowerCase().replace(/\s/g, '').split(',');
        var answer = [];
        for (var k = 0; k < answerLetters.length; k++) {
          var letter = answerLetters[k].trim();
          if (optionsByLetter.hasOwnProperty(letter)) {
            answer.push(optionsByLetter[letter]);
          }
        }
        answer.sort(function (a, b) { return a - b; });
        if (questionText && options.length > 0 && answer.length > 0) {
          structured[currentCategory].push({ question: questionText, options: options, answer: answer, number: questionNum, category: currentCategory });
        }
        i++;
      }
      return { questions: structured, names: names };
    }

    function flattenStructured(structured) {
      var flat = [];
      for (var c = 6; c <= 18; c++) {
        if (structured[c] && structured[c].length) flat = flat.concat(structured[c]);
      }
      return flat;
    }

    function showCategoryScreen() {
      var questionEl = document.querySelector('.question-text');
      var optionsContainer = document.getElementById('options-container');
      stopQuestionTimer();
      stopWaitTimer();
      clearPauseState();
      if (!questions || Object.keys(questions).length === 0) return;

      questionEl.closest('section').classList.remove('main-menu-screen');
      questionEl.closest('section').classList.add('category-screen');

      appendProgressActions(optionsContainer, false);
      var wrap = document.createElement('div');
      wrap.className = 'category-buttons';
      wrap.style.marginTop = '1rem';
      for (var c = 6; c <= 18; c++) {
        var count = questions[c] ? questions[c].length : 0;
        var btn = document.createElement('button');
        btn.type = 'button';

          var metaEl = document.createElement('small');
          metaEl.textContent = 'Seen ' + catSummary.attemptedQuestions + '/' + catSummary.totalQuestions + ' · Accuracy ' + catSummary.accuracy + '%';

      }

    function startQuizForCategory(cat) {
      var list = questions[cat];
      if (!list || list.length === 0) return;
      document.querySelector('.question-container').classList.remove('category-screen', 'main-menu-screen');
      currentCategory = cat;
      activeQuestions = shuffleQuestions(list.slice());
      currentQuestionIndex = 0;
      score = 0;
      wrongCount = 0;
      answerResults = new Array(activeQuestions.length);
      var backBtn = document.getElementById('btn-back');
      if (backBtn) backBtn.classList.remove('hidden');
      var tracker = document.getElementById('progress-tracker');
      if (tracker) tracker.classList.remove('hidden');
      displayQuestion(currentQuestionIndex);
    }

    function handleBackClick() {
      stopQuestionTimer();
      stopWaitTimer();
      clearPauseState();
      showCategoryScreen();
    }

    async function loadQuestions() {
      hideLoadWarning();
      try {
        var result = parseMarkdownQuiz(EMBEDDED_MARKDOWN);
        var flat = flattenStructured(result.questions);
        if (flat.length > 0) {
          questions = result.questions;
          categoryNames = result.names || {};
          showMainMenu();
          return;
        }
      } catch (err) {
        console.warn('Embedded markdown parse failed:', err.message);
      }

      if (typeof window.QUIZ_QUESTIONS === 'object' && Array.isArray(window.QUIZ_QUESTIONS) && window.QUIZ_QUESTIONS.length > 0) {
        questions = {};
        for (var c = 6; c <= 18; c++) questions[c] = [];
        questions[6] = window.QUIZ_QUESTIONS;
        categoryNames[6] = 'All questions';
        showMainMenu();
        showLoadWarning('Loaded fallback embedded question list.');
        return;
      }

      questions = {};
      for (var c = 6; c <= 18; c++) questions[c] = [];
      questions[6] = EMBEDDED_QUESTIONS;
      categoryNames[6] = 'All questions';
      showMainMenu();
      showLoadWarning('Embedded category dataset could not be parsed. Using built-in demo questions.');
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    function stopQuestionTimer() {
      if (questionTimerId !== null) {
        clearInterval(questionTimerId);
        questionTimerId = null;
      }
    }

    function stopWaitTimer() {
      if (waitTimerId !== null) {
        clearInterval(waitTimerId);
        waitTimerId = null;
      }
    }

    function updateProgressTracker() {
      var total = activeQuestions.length;
      var current = Math.min(currentQuestionIndex + 1, total) || 1;
      var curEl = document.getElementById('progress-current-total');
      var corEl = document.getElementById('progress-correct');
      var wrongEl = document.getElementById('progress-wrong');
      var barEl = document.getElementById('progress-bar');
      var pctEl = document.getElementById('progress-pct');
      if (curEl) curEl.textContent = current + ' / ' + total;
      if (corEl) corEl.textContent = 'Correct: ' + score;
      if (wrongEl) wrongEl.textContent = 'Wrong: ' + wrongCount;
      if (barEl) {
        barEl.innerHTML = '';
        for (var i = 0; i < total; i++) {
          var seg = document.createElement('div');
          seg.className = 'progress-segment';
          if (answerResults[i] === true) seg.classList.add('correct');
          else if (answerResults[i] === false) seg.classList.add('wrong');
          else seg.classList.add('pending');
          barEl.appendChild(seg);
        }
      }
      var answered = score + wrongCount;
      var pct = total > 0 ? Math.round((answered / total) * 100) : 0;
      if (pctEl) pctEl.textContent = pct + '%';
    }

    function setPauseResumeVisibility(paused) {
      const pauseBtn = document.querySelector('.btn-pause');
      const resumeBtn = document.querySelector('.btn-resume');
      if (pauseBtn) pauseBtn.classList.toggle('hidden', paused);
      if (resumeBtn) resumeBtn.classList.toggle('hidden', !paused);
    }

    function goToNextQuestion() {
      currentQuestionIndex += 1;
      if (currentQuestionIndex >= activeQuestions.length) {
        showResults();
      } else {
        displayQuestion(currentQuestionIndex);
      }
    }

    function showResults() {
      const questionEl = document.querySelector('.question-text');
      const optionsContainer = document.getElementById('options-container');
      stopQuestionTimer();
      stopWaitTimer();
      clearPauseState();

      const total = activeQuestions.length;
      const percentage = total > 0 ? Math.round((score / total) * 100) : 0;
      const answered = score + wrongCount;
      const progressPct = total > 0 ? Math.round((answered / total) * 100) : 0;
      const lifetime = currentCategory !== null ? getCategorySummary(currentCategory, questions[currentCategory] || []) : getLifetimeSummary();

      questionEl.textContent = 'Quiz complete!';
      optionsContainer.innerHTML = '<div class="results-panel">' +
        '<h2>Your results</h2>' +
        '<p class="results-score">' + score + ' / ' + total + '</p>' +
        '<p class="results-percentage">' + percentage + '% correct</p>' +
        '<p class="results-summary">Correct: ' + score + ' &middot; Wrong: ' + wrongCount + ' &middot; Progress: ' + progressPct + '%</p>' +
        '<p class="results-summary" style="margin-top:0.75rem;color:#445;">Lifetime for this category: ' + lifetime.attemptedQuestions + '/' + lifetime.totalQuestions + ' questions tried &middot; ' + lifetime.accuracy + '% accuracy</p>' +
        '</div>';
      updateProgressTracker();
      clearSavedSession();

      const timerEl = document.querySelector('.timer');
      if (timerEl) timerEl.textContent = formatTime(0);
      var showBtn = document.getElementById('btn-show-answer');
      if (showBtn) showBtn.disabled = true;
      var backBtn = document.getElementById('btn-back');
      if (backBtn) backBtn.classList.remove('hidden');
      var nextBtn = document.getElementById('btn-next-question');
      if (nextBtn) nextBtn.classList.add('hidden');
    }

    function startWaitCountdown(startRemaining) {
      stopWaitTimer();
      if (noTimersMode) {
        goToNextQuestion();
        return;
      }
      waitRemainingSec = startRemaining !== undefined ? startRemaining : waitBetweenSec;
      if (waitRemainingSec <= 0) {
        goToNextQuestion();
        return;
      }
      const timerEl = document.querySelector('.timer');
      if (timerEl) timerEl.textContent = formatTime(waitRemainingSec) + ' until next';

      waitTimerId = setInterval(() => {
        if (isPaused) return;
        waitRemainingSec -= 1;
        if (timerEl) timerEl.textContent = formatTime(waitRemainingSec) + ' until next';
        if (waitRemainingSec <= 0) {
          stopWaitTimer();
          goToNextQuestion();
        }
      }, 1000);
    }

    function handleTimeUp(question, optionsContainer) {
      stopQuestionTimer();
      clearPauseState();
      if (answerResults[currentQuestionIndex] === undefined) {
        answerResults[currentQuestionIndex] = false;
        wrongCount += 1;
        recordQuestionResult(question, false);
        updateProgressTracker();
        saveSession();
      }
      const timerEl = document.querySelector('.timer');
      if (timerEl) timerEl.textContent = formatTime(0);

      const buttons = optionsContainer.querySelectorAll('.option-btn');
      buttons.forEach((btn) => { btn.disabled = true; });
      question.answer.forEach((idx) => {
        if (buttons[idx]) buttons[idx].classList.add('correct');
      });
      var showBtn = document.getElementById('btn-show-answer');
      if (showBtn) showBtn.disabled = true;
      if (!noTimersMode) startWaitCountdown();
    }

    function clearPauseState() {
      isPaused = false;
      pausePhase = null;
      pauseRemaining = 0;
      pauseQuestion = null;
      pauseOptionsContainer = null;
      setPauseResumeVisibility(false);
    }

    function startQuestionTimer(question, optionsContainer, startRemaining) {
      stopQuestionTimer();
      clearPauseState();
      if (noTimersMode) return;
      questionRemainingSec = startRemaining !== undefined ? startRemaining : questionTimeSec;
      const timerEl = document.querySelector('.timer');
      if (timerEl) timerEl.textContent = formatTime(questionRemainingSec);

      questionTimerId = setInterval(() => {
        if (isPaused) return;
        questionRemainingSec -= 1;
        if (timerEl) timerEl.textContent = formatTime(questionRemainingSec);
        if (questionRemainingSec <= 0) {
          handleTimeUp(question, optionsContainer);
        }
      }, 1000);
    }

    function displayQuestion(index) {
      const questionEl = document.querySelector('.question-text');
      const optionsContainer = document.getElementById('options-container');
      stopQuestionTimer();
      stopWaitTimer();
      clearPauseState();

      if (index < 0 || index >= activeQuestions.length) {
        showResults();
        return;
      }

      const question = activeQuestions[index];
      questionEl.textContent = (question.number !== undefined ? question.number + ') ' : '') + question.question;

      optionsContainer.innerHTML = '';
      question.options.forEach((optionText, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn option-btn';
        btn.dataset.index = String(i);
        btn.textContent = optionText;
        btn.addEventListener('click', () => handleOptionClick(btn, question, optionsContainer));
        optionsContainer.appendChild(btn);
      });

      var showBtn = document.getElementById('btn-show-answer');
      if (showBtn) showBtn.disabled = false;
      var nextBtn = document.getElementById('btn-next-question');
      var timerEl = document.querySelector('.timer');
      if (noTimersMode) {
        if (nextBtn) nextBtn.classList.remove('hidden');
        if (timerEl) timerEl.textContent = 'No limit';
      } else {
        if (nextBtn) nextBtn.classList.add('hidden');
        startQuestionTimer(question, optionsContainer);
      }
      updateProgressTracker();
      saveSession();
    }

    function handleOptionClick(clickedBtn, question, optionsContainer) {
      const buttons = optionsContainer.querySelectorAll('.option-btn');
      if (buttons[0].disabled) return;
      if (clickedBtn.classList.contains('correct') || clickedBtn.classList.contains('wrong')) return;

      const clickedIndex = parseInt(clickedBtn.dataset.index, 10);
      const correctIndices = question.answer;
      const isCorrect = correctIndices.includes(clickedIndex);

      clickedBtn.classList.add(isCorrect ? 'correct' : 'wrong');

      if (isCorrect) {
        const correctSelectedCount = optionsContainer.querySelectorAll('.option-btn.correct').length;
        if (correctSelectedCount === correctIndices.length) {
          score += 1;
          answerResults[currentQuestionIndex] = true;
          recordQuestionResult(question, true);
          updateProgressTracker();
          saveSession();
          stopQuestionTimer();
          buttons.forEach((btn) => { btn.disabled = true; });
          if (!noTimersMode) startWaitCountdown();
        }
      } else {
        answerResults[currentQuestionIndex] = false;
        wrongCount += 1;
        recordQuestionResult(question, false);
        updateProgressTracker();
        saveSession();
        stopQuestionTimer();
        correctIndices.forEach((idx) => {
          if (buttons[idx]) buttons[idx].classList.add('correct');
        });
        buttons.forEach((btn) => { btn.disabled = true; });
        if (!noTimersMode) startWaitCountdown();
      }
    }

    function handlePauseClick() {
      if (isPaused) return;
      if (questionTimerId !== null) {
        clearInterval(questionTimerId);
        questionTimerId = null;
        isPaused = true;
        pausePhase = 'question';
        pauseRemaining = questionRemainingSec;
        pauseQuestion = activeQuestions[currentQuestionIndex];
        pauseOptionsContainer = document.getElementById('options-container');
        setPauseResumeVisibility(true);
        const timerEl = document.querySelector('.timer');
        if (timerEl) timerEl.textContent = formatTime(pauseRemaining) + ' (paused)';
      } else if (waitTimerId !== null) {
        clearInterval(waitTimerId);
        waitTimerId = null;
        isPaused = true;
        pausePhase = 'wait';
        pauseRemaining = waitRemainingSec;
        setPauseResumeVisibility(true);
        const timerEl = document.querySelector('.timer');
        if (timerEl) timerEl.textContent = formatTime(pauseRemaining) + ' until next (paused)';
      }
    }

    function handleResumeClick() {
      if (!isPaused) return;
      if (pausePhase === 'question' && pauseQuestion && pauseOptionsContainer) {
        startQuestionTimer(pauseQuestion, pauseOptionsContainer, pauseRemaining);
      } else if (pausePhase === 'wait') {
        startWaitCountdown(pauseRemaining);
      }
      clearPauseState();
    }

    function handleSkipClick() {
      if (waitTimerId !== null) {
        stopWaitTimer();
        clearPauseState();
        goToNextQuestion();
      } else if (questionTimerId !== null && activeQuestions[currentQuestionIndex]) {
        const question = activeQuestions[currentQuestionIndex];
        const optionsContainer = document.getElementById('options-container');
        handleTimeUp(question, optionsContainer);
      }
    }

    function handleShowAnswerClick() {
      if (currentQuestionIndex < 0 || currentQuestionIndex >= activeQuestions.length) return;
      const optionsContainer = document.getElementById('options-container');
      const buttons = optionsContainer.querySelectorAll('.option-btn');
      if (!buttons.length || buttons[0].disabled) return;
      const question = activeQuestions[currentQuestionIndex];
      handleTimeUp(question, optionsContainer);
    }

    function toggleSettingsPanel() {
      document.getElementById('settings-panel').classList.toggle('open');
    }

    function updateSettingsFromUI() {
      var qInput = document.getElementById('setting-question-time');
      var wInput = document.getElementById('setting-wait-between');
      var noTimersInput = document.getElementById('setting-no-timers');
      if (qInput) {
        questionTimeSec = parseInt(qInput.value, 10);
        var qVal = document.getElementById('question-time-value');
        if (qVal) qVal.textContent = questionTimeSec;
      }
      if (wInput) {
        waitBetweenSec = parseInt(wInput.value, 10);
        var wVal = document.getElementById('wait-between-value');
        if (wVal) wVal.textContent = waitBetweenSec;
      }
      if (noTimersInput) {
        noTimersMode = noTimersInput.checked;
        if (activeQuestions.length > 0 && currentQuestionIndex < activeQuestions.length) {
          var nextBtn = document.getElementById('btn-next-question');
          var timerEl = document.querySelector('.timer');
          if (noTimersMode) {
            stopQuestionTimer();
            stopWaitTimer();
            if (nextBtn) nextBtn.classList.remove('hidden');
            if (timerEl) timerEl.textContent = 'No limit';
          } else {
            if (nextBtn) nextBtn.classList.add('hidden');
            if (timerEl) timerEl.textContent = formatTime(questionTimeSec);
            startQuestionTimer(activeQuestions[currentQuestionIndex], document.getElementById('options-container'));
          }
        }
      }
      savePreferences();
      saveSession();
    }

    function handleNextQuestionClick() {
      if (activeQuestions.length === 0 || currentQuestionIndex >= activeQuestions.length) return;
      var optionsContainer = document.getElementById('options-container');
      var question = activeQuestions[currentQuestionIndex];
      if (answerResults[currentQuestionIndex] === undefined) {
        answerResults[currentQuestionIndex] = false;
        wrongCount += 1;
        recordQuestionResult(question, false);
        updateProgressTracker();
        saveSession();
        var buttons = optionsContainer.querySelectorAll('.option-btn');
        buttons.forEach(function (btn) { btn.disabled = true; });
        question.answer.forEach(function (idx) {
          if (buttons[idx]) buttons[idx].classList.add('correct');
        });
        var showBtn = document.getElementById('btn-show-answer');
        if (showBtn) showBtn.disabled = true;
      }
      goToNextQuestion();
    }

    loadPreferences();
    applyPreferencesToUI();

    document.querySelector('.btn-pause').addEventListener('click', handlePauseClick);
    document.querySelector('.btn-resume').addEventListener('click', handleResumeClick);
    document.querySelector('.btn-skip').addEventListener('click', handleSkipClick);
    document.getElementById('btn-back').addEventListener('click', handleBackClick);
    document.getElementById('btn-show-answer').addEventListener('click', handleShowAnswerClick);
    document.getElementById('btn-next-question').addEventListener('click', handleNextQuestionClick);
    document.getElementById('btn-settings').addEventListener('click', toggleSettingsPanel);

    document.getElementById('setting-question-time').addEventListener('input', updateSettingsFromUI);
    document.getElementById('setting-question-time').addEventListener('change', updateSettingsFromUI);
    document.getElementById('setting-wait-between').addEventListener('input', updateSettingsFromUI);
    document.getElementById('setting-wait-between').addEventListener('change', updateSettingsFromUI);
    document.getElementById('setting-no-timers').addEventListener('change', updateSettingsFromUI);

    window.addEventListener('beforeunload', function () {
      savePreferences();
      saveSession();
    });

    function loadQuestionsWhenReady() {
      loadQuestions();
    }
    loadQuestionsWhenReady();
  </script>
</body>
</html>
