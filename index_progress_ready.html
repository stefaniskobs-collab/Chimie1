<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Quiz</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f2f5;
      padding: clamp(0.5rem, 2vw, 1rem);
    }

    .quiz-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: clamp(1rem, 4vw, 2rem);
      max-width: 560px;
      width: 100%;
      min-width: 0;
    }

    .quiz-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .timer {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 600;
      color: #1a1a2e;
      background: #e8eaf0;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      min-height: 44px;
      display: flex;
      align-items: center;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .btn {
      font-size: clamp(0.85rem, 2vw, 0.9rem);
      font-weight: 500;
      padding: 0.5rem 0.75rem;
      min-height: 44px;
      min-width: 44px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-skip {
      background: #e8eaf0;
      color: #1a1a2e;
    }

    .btn-skip:hover {
      background: #d0d4dc;
    }

    .btn-pause {
      background: #1a1a2e;
      color: #fff;
    }

    .btn-pause:hover {
      background: #2d2d44;
    }

    .btn-resume {
      background: #28a745;
      color: #fff;
    }

    .btn-resume:hover {
      background: #218838;
    }

    .btn-resume.hidden {
      display: none;
    }

    .btn-pause.hidden {
      display: none;
    }

    .btn-back {
      background: #6c757d;
      color: #fff;
    }

    .btn-back:hover {
      background: #5a6268;
    }

    .btn-back.hidden {
      display: none;
    }

    .btn-next-question.hidden {
      display: none;
    }

    .progress-tracker {
      margin-bottom: 1rem;
    }

    .progress-tracker.hidden {
      display: none;
    }

    .progress-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: #1a1a2e;
    }

    .progress-stats span {
      font-weight: 600;
    }

    .progress-bar-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .progress-bar-wrap {
      flex: 1;
      display: flex;
      height: 12px;
      background: #e8eaf0;
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-segment {
      flex: 1;
      min-width: 2px;
      transition: background 0.2s;
    }

    .progress-segment.pending {
      background: #e8eaf0;
    }

    .progress-segment.correct {
      background: #28a745;
    }

    .progress-segment.wrong {
      background: #dc3545;
    }

    .progress-pct {
      font-weight: 600;
      font-size: 0.9rem;
      min-width: 3rem;
      color: #1a1a2e;
    }

    .question-container {
      margin-bottom: clamp(1rem, 4vw, 2rem);
    }

    .question-text {
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      line-height: 1.5;
      color: #1a1a2e;
      margin: 0;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      font-size: clamp(0.95rem, 2vw, 1rem);
      padding: clamp(0.75rem, 3vw, 1rem) clamp(1rem, 3vw, 1.25rem);
      min-height: 48px;
      background: #f5f6f8;
      color: #1a1a2e;
      border: 2px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .option-btn:hover {
      background: #e8eaf0;
      border-color: #c0c4cc;
    }

    .option-btn:disabled {
      cursor: default;
      opacity: 1;
    }

    .option-btn:disabled:hover {
      background: inherit;
      border-color: inherit;
    }

    .option-btn.correct {
      background: #d4edda;
      border-color: #28a745;
      color: #155724;
    }

    .option-btn.wrong {
      background: #f8d7da;
      border-color: #dc3545;
      color: #721c24;
    }

    .results-panel {
      text-align: center;
      padding: 2rem;
    }

    .results-panel h2 {
      font-size: clamp(1.25rem, 3vw, 1.5rem);
      color: #1a1a2e;
      margin: 0 0 1rem 0;
    }

    .results-score {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    .results-percentage {
      font-size: clamp(1.1rem, 2.5vw, 1.25rem);
      color: #28a745;
      font-weight: 600;
    }

    .load-warning {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #856404;
    }

    .load-warning.hidden {
      display: none;
    }

    .btn-show-answer {
      background: #6c757d;
      color: #fff;
    }

    .btn-show-answer:hover {
      background: #5a6268;
    }

    .btn-settings {
      background: #17a2b8;
      color: #fff;
    }

    .btn-settings:hover {
      background: #138496;
    }

    .settings-panel {
      margin-top: 1rem;
      padding: 1rem;
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      display: none;
    }

    .settings-panel.open {
      display: block;
    }

    .settings-panel h3 {
      font-size: 1rem;
      margin: 0 0 0.75rem 0;
      color: #1a1a2e;
    }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .setting-row label {
      min-width: 180px;
      font-size: 0.9rem;
      color: #495057;
    }

    .setting-row input[type="range"] {
      flex: 1;
      min-width: 120px;
      max-width: 200px;
    }

    .setting-row input[type="number"] {
      width: 3.5rem;
      padding: 0.35rem 0.5rem;
      font-size: 0.9rem;
      border: 1px solid #ced4da;
      border-radius: 6px;
    }

    .setting-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: #1a1a2e;
      min-width: 2rem;
    }

    .category-screen .category-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .category-btn {
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      background: #17a2b8;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .category-btn:hover {
      background: #138496;
    }

    .category-btn:disabled {
      background: #adb5bd;
      color: #6c757d;
      cursor: not-allowed;
      opacity: 0.8;
    }

    .main-menu-screen .main-menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1rem;
      max-width: 280px;
    }

    .main-menu-btn {
      padding: 1rem 1.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      background: #17a2b8;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      text-align: center;
    }

    .main-menu-btn:hover {
      background: #138496;
    }

    .category-btn-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
      opacity: 0.95;
    }

    .category-btn-name {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.9;
      line-height: 1.25;
    }

    @media (max-width: 480px) {
      .quiz-header {
        flex-direction: column;
        align-items: stretch;
      }

      .timer {
        justify-content: center;
      }

      .controls {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="quiz-container">
    <header class="quiz-header">
      <div class="timer" aria-live="polite">0:00</div>
      <div class="controls">
        <button type="button" class="btn btn-back hidden" id="btn-back">Back</button>
        <button type="button" class="btn btn-show-answer" id="btn-show-answer">Show answer</button>
        <button type="button" class="btn btn-next-question hidden" id="btn-next-question">Next question</button>
        <button type="button" class="btn btn-skip">Skip</button>
        <button type="button" class="btn btn-pause">Pause</button>
        <button type="button" class="btn btn-resume hidden">Resume</button>
        <button type="button" class="btn btn-settings" id="btn-settings">Settings</button>
      </div>
    </header>

    <div class="settings-panel" id="settings-panel">
      <h3>Quiz settings</h3>
      <div class="setting-row">
        <label for="setting-question-time">Time per question (seconds)</label>
        <input type="range" id="setting-question-time" min="1" max="60" value="20" aria-label="Time per question in seconds">
        <span class="setting-value" id="question-time-value">20</span>
        <span>s</span>
      </div>
      <div class="setting-row">
        <label for="setting-wait-between">Wait between questions (seconds)</label>
        <input type="range" id="setting-wait-between" min="0" max="10" value="10" aria-label="Wait between questions in seconds">
        <span class="setting-value" id="wait-between-value">10</span>
        <span>s</span>
      </div>
      <div class="setting-row">
        <label for="setting-no-timers">No timers</label>
        <input type="checkbox" id="setting-no-timers" aria-label="Disable all timers; use Next question button to advance">
      </div>
    </div>

    <div class="progress-tracker hidden" id="progress-tracker">
      <div class="progress-stats">
        <span id="progress-current-total">1 / 0</span>
        <span id="progress-correct">Correct: 0</span>
        <span id="progress-wrong">Wrong: 0</span>
      </div>
      <div class="progress-bar-row">
        <div class="progress-bar-wrap" id="progress-bar"></div>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
    </div>

    <section class="question-container">
      <h2 class="question-text">Question text will appear here.</h2>
    </section>

    <div class="options" id="options-container">
      <!-- Option buttons are generated by displayQuestion() -->
    </div>
    <p class="load-warning hidden" id="load-warning" role="alert"></p>
  </main>

  <script>
    let questions = {};
    let activeQuestions = [];
    let categoryNames = {};
    let currentQuestionIndex = 0;
    let questionTimerId = null;
    let waitTimerId = null;
    let questionTimeSec = 20;
    let waitBetweenSec = 10;
    let noTimersMode = false;

    let isPaused = false;
    let pauseRemaining = 0;
    let pausePhase = null;
    let pauseQuestion = null;
    let pauseOptionsContainer = null;
    let questionRemainingSec = 0;
    let waitRemainingSec = 0;
    let score = 0;
    let wrongCount = 0;
    let answerResults = [];
    let currentCategory = null;

    const EMBEDDED_MARKDOWN = "## 6. Piatra Naturală\n### Definiții și Clasificări\n1) Cum se numește partea din scoarța terestră din care se exploatează rocile naturale care stau la baza materialelor de construcție sub formă de piatră naturală?\n- a) atmosferă;\n- b) biosferă;\n- c) litosferă;\n- d) stratosferă;\n- e) rockosferă.\n**Răspuns: c**\n2) Alegeți definiția corectă pentru minerale:\n- a) compuși chimici sub formă de roci cu structură cristalină;\n- b) materie primă la fabricarea unor noi materiale de construcții cu aceleași proprietăți fizice și chimice;\n- c) structuri minerale;\n- d) substanțe chimice cu compoziție bine definită;\n- e) materiale de construcții care se găsesc în natură sub formă de roci.\n**Răspuns: d**\n3) Alegeți definiția corectă pentru roci:\n- a) compuși chimici sub formă de roci cu structură cristalină;\n- b) materie primă la fabricarea unor noi materiale de construcții cu aceleași proprietăți fizice și chimice;\n- c) structuri minerale;\n- d) substanțe chimice cu compoziție bine definită;\n- e) materiale de construcții care se găsesc în natură sub formă de roci.\n**Răspuns: c**\n4) În construcții rocile se folosesc ca:\n- a) produse brute, prelucrate chimic modificându-li-se proprietățile fizice și chimice;\n- b) produse prelucrate mecanic, fără a li se modifica proprietățile fizice și chimice;\n- c) materie primă la fabricarea unor noi materiale de construcții cu aceleași proprietăți fizice și chimice;\n- d) materie primă la obținerea de noi materiale de construcții cu proprietăți fizice și chimice modificate;\n- e) produse finisate prin procedee chimice fără a li se schimba proprietățile fizice și chimice.\n**Răspuns: b,d**\n### Clasificarea Rocilor\n5) Rocile care iau naștere ca urmare a solidificării topiturii silicioase în drumul ei spre suprafața pământului se numesc:\n- a) roci sedimentare;\n- b) roci holocristaline;\n- c) roci eruptive;\n- d) roci metamorfice;\n- e) roci magmatice.\n**Răspuns: e**\n6) Rocile care iau naștere ca urmare a depunerilor succesive a produselor de eroziune se numesc:\n- a) roci sedimentare;\n- b) roci holocristaline;\n- c) roci eruptive;\n- d) roci metamorfice;\n- e) roci magmatice.\n**Răspuns: a**\n7) Rocile care iau naștere ca urmare a acțiunii presiunilor și temperaturilor ridicate asupra rocilor preexistente (schimbându-le structura) se numesc:\n- a) roci sedimentare;\n- b) roci holocristaline;\n- c) roci eruptive;\n- d) roci metamorfice;\n- e) roci magmatice.\n**Răspuns: d**\n### Structura și Textura Rocilor\n8) Rocile alcătuite din minerale cristalizate complet se numesc:\n- a) roci cu textură stratificată;\n- b) roci cu textură neorientată (masivă);\n- c) roci cu structură holocristalină;\n- d) roci cu structură hemicristalină;\n- e) roci cu textură șistoasă.\n**Răspuns: c**\n9) Rocile alcătuite din minerale cristaline amestecate cu minerale amorfe se numesc:\n- a) roci cu textură stratificată;\n- b) roci cu textură neorientată (masivă);\n- c) roci cu structură holocristalină;\n- d) roci cu structură hemicristalină;\n- e) roci cu textură șistoasă.\n**Răspuns: d**\n10) Rocile alcătuite din straturi succesive de minerale, fiecare strat fiind alcătuit din alt mineral se numesc:\n- a) roci cu textură stratificată;\n- b) roci cu textură neorientată (masivă);\n- c) roci cu structură holocristalină;\n- d) roci cu structură hemicristalină;\n- e) roci cu textură șistoasă.\n**Răspuns: a**\n11) Rocile alcătuite din minerale nearanjate ordonat în spațiu se numesc:\n- a) roci cu textură stratificată;\n- b) roci cu textură neorientată (masivă);\n- c) roci cu structură holocristalină;\n- d) roci cu structură hemicristalină;\n- e) roci cu textură șistoasă.\n**Răspuns: e**\n12) Rocile alcătuite din straturi succesive de minerale, fiecare strat fiind alcătuit din alt mineral se numesc:\n- a) roci cu textură stratificată;\n- b) roci cu textură neorientată (masivă);\n- c) roci cu structură holocristalină;\n- d) roci cu structură hemicristalină;\n- e) roci cu textură șistoasă.\n**Răspuns: b**\n13) Rocile formate prin răcirea magmei și întărirea ei la adâncime sunt:\n- a) roci granitice;\n- b) roci bazaltice;\n- c) roci efuzive;\n- d) roci intrusive;\n- e) roci filoniene.\n**Răspuns: d**\n14) Rocile formate prin răcirea și întărirea magmei în apropierea scoarței terestre se numesc:\n- a) roci granitice;\n- b) roci bazaltice;\n- c) roci efuzive;\n- d) roci intrusive;\n- e) roci filoniene.\n**Răspuns: e**\n15) Rocile formate prin răcirea bruscă a magmei și întărirea ei la suprafața scoarței terestre se numesc:\n- a) roci granitice;\n- b) roci bazaltice;\n- c) roci efuzive;\n- d) roci intrusive;\n- e) roci filoniene.\n**Răspuns: c**\n16) Granitul și sienitul sunt roci:\n- a) magmatice intrusive;\n- b) magmatice filoniene;\n- c) magmatice efuzive;\n- d) sedimentare detritice;\n- e) sedimentare de precipitație.\n**Răspuns: a**\n17) Porfirele și dacitele filoniene sunt roci:\n- a) magmatice intrusive;\n- b) magmatice filoniene;\n- c) magmatice efuzive;\n- d) sedimentare detritice;\n- e) sedimentare de precipitație.\n**Răspuns: b**\n18) Granodioritul și granitul sunt roci:\n- a) magmatice intrusive;\n- b) magmatice filoniene;\n- c) magmatice efuzive;\n- d) sedimentare detritice;\n- e) sedimentare de precipitație.\n**Răspuns: a**\n19) Bazaltul, andezitul și trahitul sunt roci:\n- a) magmatice intrusive;\n- b) magmatice filoniene;\n- c) magmatice efuzive;\n- d) sedimentare detritice;\n- e) sedimentare de precipitație.\n**Răspuns: c**\n20) Piatra ponce, scoria bazaltică și tufurile vulcanice sunt roci:\n- a) magmatice intrusive;\n- b) magmatice filoniene;\n- c) magmatice efuzive cu structură vitroasă;\n- d) sedimentare detritice;\n- e) sedimentare de precipitație.\n**Răspuns: c**\n21) Grohotișurile, prundișurile, nisipurile și gresiile sunt roci:\n- a) magmatice intrusive;\n- b) magmatice filoniene;\n- c) magmatice efuzive;\n- d) sedimentare detritice;\n- e) sedimentare de precipitație.\n**Răspuns: d**\n22) Ghipsul, tuful calcaros și travertinul sunt roci:\n- a) magmatice intrusive;\n- b) magmatice filoniene;\n- c) magmatice efuzive;\n- d) sedimentare detritice;\n- e) sedimentare de precipitație.\n**Răspuns: e**\n23) Diatomitul și calcarul cochilifer sunt roci:\n- a) sedimentare detritice;\n- b) metamorfice;\n- c) sedimentare de precipitație;\n- d) magmatice filoniene;\n- e) sedimentare organogene.\n**Răspuns: e**\n24) Gnaisul, cuarțitele și marmura sunt roci:\n- a) sedimentare detritice;\n- b) metamorfice;\n- c) sedimentare de precipitație;\n- d) magmatice filoniene;\n- e) sedimentare organogene.\n**Răspuns: b**\n25) Extragerea pietrei naturale se face:\n- a) pe cale manuală cu sapă și lopată;\n- b) pe cale manuală cu pârghii, ciocane de abataj;\n- c) pe cale mecanizată cu dispozitive de tăiat;\n- d) pe cale mecanizată cu excavatoare și dragline;\n- e) cu explozibili.\n**Răspuns: b,c,d,e**\n26) Piatra naturală se utilizează în construcții sub formă de:\n- a) piatră brută, așa cum a fost extrasă;\n- b) piatră brută tratată chimic;\n- c) piatră prelucrată;\n- d) piatră prelucrată chimic;\n- e) agregate naturale și artificiale.\n**Răspuns: a,c,e**\n27) Produsele de balastieră sunt:\n- a) piatra brută;\n- b) piatra prelucrată sub formă de moloane, piatră de talie;\n- c) pavele, calupuri, borduri;\n- d) nisip, pietriș, bolovani și balast;\n- e) treaptă, contratreaptă, solbanc, glaf, plintă, dale etc.\n**Răspuns: d**\n28) Produsele de carieră fasonate pe o față (cea vizibilă) și câțiva cm pe fețe denumesc:\n- a) piatra prelucrată sub formă de moloane;\n- b) piatra brută;\n- c) pavele, calăpuri, borduri;\n- d) nisip, pietriș, bolovani și balast;\n- e) treaptă, contratreaptă, solbanc, glaf, plintă, dale etc.\n**Răspuns: a**\n29) Produsele de carieră fasonate pe toate fețele denumesc:\n- a) piatra brută;\n- b) piatră de talie;\n- c) pavele, calăpuri, borduri;\n- d) nisip, pietriș, bolovani și balast;\n- e) treaptă, contratreaptă, solbanc, glaf, plintă, dale etc.\n**Răspuns: b**\n30) În construcția de drumuri se utilizează:\n- a) moloane;\n- b) piatra prelucrată sub formă de moloane, piatră de talie;\n- c) pavele, calupuri, borduri;\n- d) nisip, pietriș, bolovani și balast;\n- e) treaptă, contratreaptă, solbanc, glaf, plintă, dale etc.\n**Răspuns: c**\n31) Piatra naturală se utilizează și la realizarea următoarelor elemente de construcție finite:\n- a) piatra brută;\n- b) piatra prelucrată sub formă de moloane, piatră de talie;\n- c) pavele, calăpuri, borduri;\n- d) nisip, pietriș, bolovani și balast;\n- e) treaptă, contratreaptă, solbanc, glaf, plintă, dale etc.\n**Răspuns: e**\n32) Din produsele de balastieră fac parte:\n- a) nisipul;\n- b) savura; criblura;\n- c) pietrișul;\n- d) balastul;\n- e) bolovănișul.\n**Răspuns: a,c,d,e**\n33) Prelucrarea pietrei naturale se face prin:\n- a) tăiere;\n- b) cioplire;\n- c) șlefuire și lustruire;\n- d) buciardare;\n- e) concasare.\n**Răspuns: a,b,c,d,e**\n34) Limitarea dintre carosabil și acostament se realizează cu:\n- a) borduri;\n- b) pavele;\n- c) calăpuri;\n- d) bolovani;\n- e) nisip.\n**Răspuns: a**\n35) Produsele de concasare sunt:\n- a) filer, ghips, nisip de concasare și split;\n- b) filer, nisip de concasare, calcar, savură, split și criblură;\n- c) filer, nisip de concasare, savură, split, argilă, criblură, piatră spartă;\n- d) filer, nisip de concasare, savură, split, ghips, calcar, argilă și macadam;\n- e) filer, nisip de concasare, savură, split, criblură obținută prin dublă concasare și piatră spartă.\n**Răspuns: e**\n36) Acțiunea distructivă a aerului atmosferic asupra pietrei naturale are loc prin:\n- a) eroziune;\n- b) cristalizarea sărurilor dizolvate în apă în fisurile elementelor;\n- c) prezența în aerul atmosferic a bioxidului de carbon și a bioxidului de sulf care au caracter acid și atacă componentii mineralogici de natură bazică din piatră dând săruri solubile;\n- d) favorizarea dezvoltării microorganismelor;\n- e) pierderea culorii rocii sub acțiunea razelor solare.\n**Răspuns: a,c,d**\n37) Acțiunea distructivă a agenților agresivi diferă de la o rocă la altă funcție de:\n- a) compoziția mineralogică;\n- b) umiditatea;\n- c) porozitatea și compactitatea;\n- d) caracteristici mecanice;\n- e) structura.\n**Răspuns: a,b,c,d,e**\n38) Acțiunea distructivă a apei asupra elementelor din piatra naturală se manifestă prin:\n- a) eroziune;\n- b) cristalizarea sărurilor dizolvate în apă în fisurile elementelor;\n- c) prezența în aerul atmosferic a bioxidului de carbon și hidroxidului de sulf care au caracter acid și atacă componentii mineralogici de natură bazică din piatră dând săruri solubile;\n- d) favorizarea dezvoltării microorganismelor;\n- e) pierderea culorii rocii sub acțiunea razelor solare.\n**Răspuns: a,b,d**\n39) Care este procentul aproximativ al agregatului în beton?\n- a) 60-65 %\n- b) 80-85 %\n- c) 70-75 %\n- d) 75-80 %\n- e) 85-90 %\n**Răspuns: b**\n40) După natura chimică (și origine), agregatele sunt:\n- a) anorganice și organice;\n- b) naturale și artificiale;\n- c) grele compacte (ρga ≥ 1200 kg/m³) și ușoare poroase (ρga < 1200 kg/m³);\n- d) cu granule rotunjite, poliedrice, lamelare și aciculare;\n- e) cu granulozitate continuă, granulozitate discontinuă și monogranulare.\n**Răspuns: a**\n41) Protecția elementelor din piatră naturală împotriva agenților agresivi se face prin:\n- a) stropirea lor cu apă tot timpul;\n- b) utilizarea de roci cu caracteristici corespunzătoare;\n- c) evitarea suprafețelor orizontale;\n- d) vopsirea suprafețelor elementelor cu miniu de plumb;\n- e) tratarea suprafețelor elementelor cu compuși chimici, cu o soluție de sare sau cu uleiuri sicative.\n**Răspuns: b,c,e**\n42) Agregatele anorganice (după origine) pot fi:\n- a) anorganice și organice;\n- b) naturale și artificiale;\n- c) grele compacte (ρ₉ₐ ≥ 1200 kg/m³) și ușoare poroase (ρ₉ₐ < 1200 kg/m³);\n- d) cu granule rotunjite, poliedrice, lamelare și aciculare;\n- e) cu granulozitate continuă, granulozitate discontinuă și monogranulare.\n**Răspuns: b**\n43) Agregatele organice (după origine) pot fi:\n- a) anorganice și organice;\n- b) naturale și artificiale;\n- c) grele compacte (ρ₉ₐ ≥ 1200 kg/m³) și ușoare poroase (ρ₉ₐ < 1200 kg/m³);\n- d) cu granule rotunjite, poliedrice, lamelare și aciculare;\n- e) cu granulozitate continuă, granulozitate discontinuă și monogranulare.\n**Răspuns: b**\n44) După densitatea în grămadă, agregatele se clasifică în:\n- a) anorganice și organice;\n- b) naturale și artificiale;\n- c) grele compacte (ρ₉ₐ ≥ 1200 kg/m³) și ușoare poroase (ρ₉ₐ < 1200 kg/m³);\n- d) cu granule rotunjite, poliedrice, lamelare și aciculare;\n- e) cu granulozitate continuă, granulozitate discontinuă și monogranulare.\n**Răspuns: c**\n45) După forma granulelor, agregatele pot fi:\n- a) nisip, pietriș, bolovani și balast;\n- b) naturale și artificiale;\n- c) grele compacte (ρ₉ₐ ≥ 1200 kg/m³) și ușoare poroase (ρ₉ₐ < 1200 kg/m³);\n- d) cu granule rotunjite, poliedrice, lamelare și aciculare;\n- e) cu granulozitate continuă, granulozitate discontinuă și monogranulare.\n**Răspuns: d**\n46) După mărime și compoziția granulometrică, agregatele pot fi:\n- a) nisip, pietriș, bolovani și balast;\n- b) naturale și artificiale;\n- c) grele compacte (ρ₉ₐ ≥ 1200 kg/m³) și ușoare poroase (ρ₉ₐ < 1200 kg/m³);\n- d) cu granule rotunjite, poliedrice, lamelare și aciculare;\n- e) cu granulozitate continuă, granulozitate discontinuă și monogranulare.\n**Răspuns: a,e**\n47) După mărimea granulelor, agregatele de balastieră se împart în:\n- a) nisip, pietriș, bolovani și balast;\n- b) naturale și artificiale;\n- c) grele compacte (ρga≥1200kg/m³) și ușoare poroase (ρga<1200kg/m³);\n- d) cu granule rotunjite, poliedrice, lamelare și aciculare;\n- e) cu granulozitate continuă, granulozitate discontinuă și monogranulare.\n**Răspuns: a**\n48) Prin granulozitate - compoziția granulometrică – se înțelege:\n- a) compoziția procentuală (în volume) a diferitelor sorturi sau fracțiuni ce compun un agregat;\n- b) reprezentarea grafică a resturilor (în masă) din seria de ciururi și site standard;\n- c) reprezentarea grafică a procentelor trecerilor (în masă) prin seria de ciururi și site standard;\n- d) compoziția procentuală masică pe sorturi a unui agregat;\n- e) toate granulele de agregat care au granulele de diametru cuprins între două site sau ciururi impuse.\n**Răspuns: d**\n49) Prin curbă granulometrică se înțelege:\n- a) compoziția procentuală (în volume) a diferitelor sorturi sau fracțiuni ce compun un agregat;\n- b) reprezentarea grafică a resturilor (în masă) pe seria de ciururi și site standard;\n- c) reprezentarea grafică a procentelor trecerilor (în masă) prin seria de ciururi și site standard;\n- d) compoziția procentuală (în masă) a diferitelor sorturi și fracțiuni de agregat ce compun un agregat;\n- e) toate granulele de agregat care au granulele de diametru cuprins între două site sau ciururi impuse.\n**Răspuns: c**\n50) Prin sort se înțelege:\n- a) compoziția procentuală (în volume) a diferitelor sorturi sau fracțiuni ce compun un agregat;\n- b) reprezentarea grafică a resturilor (în masă) din seria de ciururi și site standard;\n- c) reprezentarea grafică a procentelor trecerilor (în masă) prin seria de ciururi și site standard;\n- d) compoziția procentuală (în masă) a diferitelor sorturi și fracțiuni de agregat ce compun un agregat;\n- e) toate granulele de agregat care au granulele de diametru maxim și minim cuprins în limite bine stabilite.\n**Răspuns: e**\n51) Nisipul poate fi:\n- a) silicios, calcaros;\n- b) de balastieră, de concasaj;\n- c) monogranlar, poligranular;\n- d) cu granulozitate continuă, cu granulozitate discontinuă;\n- e) având granulele cu diametre cuprinse între 0-15 mm.\n**Răspuns: a,b,c,d**\n52) Agregatele compacte grele sunt:\n- a) scoria bazaltică, piatra ponce, tuful vulcanic;\n- b) granulitul, perlitul expandat, zgura expandată, algoporitul, spărturile ceramice;\n- c) rumegușul, cojile de copac, deșeurile textile, puzderia de in și cânepă, cojile de orez;\n- d) nisip, pietriș, bolovani și balast;\n- e) nisipul de concasaj, filerul, savura, splitul, criblura obținută prin dublă concasare și piatră spartă.\n**Răspuns: d**\n53) Agregatele ușoare naturale anorganice sunt:\n- a) scoria bazaltică, piatra ponce, tuful vulcanic;\n- b) granulitul, perlitul expandat, zgura expandată, algoporitul, spărturile ceramice;\n- c) rumegușul, cojile de copac, deșeurile textile, puzderia de in și cânepă, cojile de orez;\n- d) nisip, pietriș, bolovani și balast;\n- e) nisipul de concasaj, filerul, savura, splitul, criblura obținută prin dublă concasare și piatră spartă.\n**Răspuns: a**\n54) Agregatele ușoare artificiale anorganice sunt:\n- a) scoria bazaltică, piatra ponce, tuful vulcanic;\n- b) granulitul, perlitul expandat, zgura expandată, algoporitul, spărturile ceramice;\n- c) rumegușul, cojile de copac, deșeurile textile, puzderia de in și cânepă, cojile de orez;\n- d) nisip, pietriș, bolovani și balast;\n- e) nisipul de concasaj, filerul, savura, splitul, criblura obținută prin dublă concasare și piatră spartă.\n**Răspuns: b**\n55) Agregatele ușoare organice sunt:\n- a) scoria bazaltică, piatra ponce, tuful vulcanic;\n- b) granulitul, perlitul expandat, zgura expandată, algoporitul, spărturile ceramice;\n- c) rumegușul, cojile de copac, deșeurile textile, puzderia de in și cânepă, cojile de orez;\n- d) nisip, pietriș, bolovani și balast;\n- e) nisipul de concasaj, filerul, savura, splitul, criblura obținută prin dublă concasare și piatră spartă.\n**Răspuns: c**\n56) Agregatele ușoare naturale sau artificiale se obțin prin:\n- a) sfărmarea naturală a rocilor eruptive poroase;\n- b) sfărmarea naturală a rocilor sedimentare poroase;\n- c) concasarea rocilor magmatice;\n- d) concasarea rocilor eruptive poroase;\n- e) concasarea rocilor sedimentare poroase.\n**Răspuns: a,b,d,e**\n57) Agregatele grele compacte au ρga:\n- a) mai mică decât 1200 kg/m³;\n- b) mai mare decât 1200 kg/m³;\n- c) mai mică decât 1800 kg/m³;\n- d) mai mare decât 1800 kg/m³;\n- e) egală cu 2500 kg/m³.\n**Răspuns: b**\n58) Pentru ca un agregat să fie acceptat, acesta trebuie să aibă coeficientul volumic mediu Cvm:\n- a) ≥ 0,18;\n- b) ≥ 0,20;\n- c) ≤ 0,20;\n- d) ≥ 0,15;\n- e) ≤ 0,15.\n**Răspuns: b**\n59) Forma ideală a granulelor agregatelor este:\n- a) sferică;\n- b) rotunjită;\n- c) poliedrică;\n- d) lamelară;\n- e) aciculară.\n**Răspuns: a**\n60) Argila expandată, zgura expandată, granulitul, perlitul expandat sunt:\n- a) agregate anorganice naturale;\n- b) agregate anorganice artificiale;\n- c) agregate organice naturale;\n- d) agregate organice artificiale;\n- e) agregate de concasaj.\n**Răspuns: b**\n61) Agregatele ușoare poroase au ρga:\n- a) mai mică decât 1200 kg/m³;\n- b) mai mare decât 1200 kg/m³;\n- c) mai mică decât 1800 kg/m³;\n- d) mai mare decât 1800 kg/m³;\n- e) egală cu 2500 kg/m³.\n**Răspuns: a**\n62) Prin creșterea progresivă a umidității cu 2% se poate studia:\n- a) conținutul de mică liberă;\n- b) conținutul de carbune;\n- c) humusul;\n- d) părțile levigabile;\n- e) variația de volum (înfoierea) a nisipului.\n**Răspuns: e**\n63) Nisipul se utilizează ca agregat la obținerea:\n- a) varului;\n- b) mortarelor;\n- c) betoanelor;\n- d) ipsosului;\n- e) cimentului.\n**Răspuns: b,c**\n64) Balastul este:\n- a) agregat cu dimensiunea maximă de 10 mm;\n- b) agregat cu dimensiunea maximă de 15 mm;\n- c) agregat cu dimensiunea maximă de 70 mm;\n- d) agregat cu dimensiunea maximă de 150 mm;\n- e) un amestec natural de nisip și pietriș.\n**Răspuns: e**\n65) Prin analiza culorii soluției de 3% hidroxid de sodiu (care s-a turnat peste nisip), la 24 ore de la efectuarea determinării conf. standardelor, se apreciază:\n- a) conținutul de mică liberă;\n- b) conținutul de carbune;\n- c) conținutul de humus;\n- d) părțile levigabile;\n- e) înfoierea nisipului.\n**Răspuns: c**\n66) Impuritățile care se pot îndepărta prin spălarea agregatelor sunt:\n- a) conținutul de mică liberă;\n- b) conținutul de carbune;\n- c) humusul;\n- d) părțile levigabile;\n- e) înfoierea nisipului.\n**Răspuns: d**\n67) Deșeurile de cauciuc sunt agregate:\n- a) agregate anorganice naturale;\n- b) agregate anorganice artificiale;\n- c) agregate de balastieră;\n- d) agregate ușoare organice;\n- e) agregate de concasaj.\n**Răspuns: d**\n68) Pentru a fi acceptat, un agregat trebuie să respecte următoarele condiții cu privire la formă:\n- a) b/a ≥ 0,68;\n- b) c/a ≥ 0,35;\n- c) b/a ≥ 0,66 și c/a ≥ 0,33;\n- d) b/a ≥ 0,60;\n- e) c/a ≥ 0,30;\n**Răspuns: c**\n69) Metoda de prelevare a cantității de agregat necesară determinărilor se numește:\n- a) metoda întregului;\n- b) metoda înjumătățirii;\n- c) metoda proporțiilor;\n- d) metoda fracțiilor;\n- e) metoda sferturilor.\n**Răspuns: e**\n70) Impuritățile vizibile cu ochiul liber se numesc:\n- a) părți lavigabile;\n- b) conținut de humus;\n- c) corpuri străine;\n- d) umiditate;\n- e) absorbție de apă.\n**Răspuns: c**\n71) Cantitatea de apă existentă la un moment dat în agregat se numește:\n- a) părți lavigabile;\n- b) conținut de humus;\n- c) corpuri străine;\n- d) umiditate;\n- e) absorbție de apă.\n**Răspuns: d**\n72) Proprietatea materialului definită cu formula (ms - m)/m * 100%, definește:\n- a) părți lavigabile;\n- b) conținut de humus;\n- c) corpuri străine;\n- d) umiditate;\n- e) absorbție de apă în masă.\n**Răspuns: e**\n73) Când amestecăm nisipul cu apă în cantități mici (2, 4, 6, 8 %) volumul în gramada în stare afânată al acestuia:\n- a) crește;\n- b) scade;\n- c) rămâne constant;\n- d) se înjumătățește;\n- e) se dublează.\n**Răspuns: a**\n74) Cu cât granulele de agregat sunt mai mari volumul de goluri al agregatului este:\n- a) mai mic;\n- b) constant;\n- c) scade;\n- d) crește;\n- e) mai mare.\n**Răspuns: e**\n75) Proprietatea agregatelor caracterizate de formula Va/Vs, definește:\n- a) formula granulelor;\n- b) curba granulometrică;\n- c) coeficientul volumic mediu;\n- d) umiditate absolută;\n- e) umiditate relativă.\n**Răspuns: c**\n76) Raportul b/a al agregatelor acceptate trebuie să aibă valoarea:\n- a) ≥ 0,20;\n- b) ≥ 0,33;\n- c) ≤ 0,66;\n- d) ≤ 0,45;\n- e) ≥ 0,66.\n**Răspuns: e**\n77) Raportul c/a al agregatelor acceptate trebuie să aibă valoarea:\n- a) ≥ 0,20;\n- b) ≥ 0,33;\n- c) ≤ 0,66;\n- d) ≤ 0,45;\n- e) ≥ 0,66.\n**Răspuns: b**\n78) Coeficientul volumic al agregatelor corespunzătoare trebuie să aibă valoarea:\n- a) ≥ 0,20;\n- b) ≥ 0,33;\n- c) ≤ 0,66;\n- d) ≤ 0,45;\n- e) ≥ 0,66.\n**Răspuns: a**\n79) Reprezentarea grafică procentuală masică a trecerilor prin seria de ciururi standard se numește:\n- a) formula granulelor;\n- b) curba granulometrică;\n- c) coeficientul volumic mediu;\n- d) umiditate absolută;\n- e) umiditate relativă.\n**Răspuns: b**\n80) Proprietatea agregatelor definită de formula: (mum - mus)/mus se numește:\n- a) formula granulelor;\n- b) curba granulometrică;\n- c) coeficientul volumic mediu;\n- d) umiditate absolută;\n- e) umiditate relativă.\n**Răspuns: d**\n81) Proprietatea agregatelor definită de formula: (mum - mus)/mum se numește:\n- a) formula granulelor;\n- b) curba granulometrică;\n- c) coeficientul volumic mediu;\n- d) umiditate absolută;\n- e) umiditate relativă.\n**Răspuns: e**\n82) Rocile alcătuite numai din minerale vitroase se numesc:\n- a) roci cu structură holocristalină;\n- b) roci cu structură hemicristalină;\n- c) roci amorfe;\n- d) roci cu textură șistoasă;\n- e) roci cu textură cristalină.\n**Răspuns: c**\n83) Rocile porfirice sunt roci:\n- a) magmatice efuzive;\n- b) sedimentare;\n- c) metamorfice;\n- d) magmatice intrusive;\n- e) magmatice filoniene.\n**Răspuns: e**\n84) Rocile granitice sunt roci:\n- a) magmatice efuzive;\n- b) sedimentare;\n- c) metamorfice;\n- d) magmatice intrusive;\n- e) magmatice filoniene.\n**Răspuns: d**\n85) Rocile bazaltice sunt roci:\n- a) magmatice efuzive;\n- b) sedimentare;\n- c) metamorfice;\n- d) magmatice intrusive;\n- e) magmatice filoniene.\n**Răspuns: a**\n86) Rocile cu structură vitroasă sunt roci:\n- a) magmatice efuzive;\n- b) sedimentare;\n- c) metamorfice;\n- d) magmatice intrusive;\n- e) magmatice filoniene.\n**Răspuns: a**\n87) După domeniul de utilizare, rocile se împart în:\n- a) roci pentru drumuri;\n- b) roci pentru fundații;\n- c) roci pentru construcții civile și industriale;\n- d) roci pentru ziduri de sprijin;\n- e) roci pentru construcții inginerești.\n**Răspuns: c,e**\n88) După densitatea în stare uscată rocile se împart în:\n- a) roci foarte ușoare;\n- b) roci cu densitate medie;\n- c) roci ușoare;\n- d) roci grele;\n- e) roci foarte grele.\n**Răspuns: c,d**\n## 7. Mortarul cu lianți anorganici\n### Definiții și Utilizări\n1) Alegeți definiția corectă pentru mortar:\n- a) amestec bine omogenizat de liant, pietriș și apă care după întărire ajunge la o structură asemănătoare gresiei;\n- b) amestec bine omogenizat de liant, nisip și apă care după întărire ajunge la o structură asemănătoare gresiei;\n- c) amestec bine omogenizat de liant, nisip apă care după întărire ajunge la o structură asemănătoare faianței;\n- d) amestec bine omogenizat de liant, pietriș și apă care după întărire ajunge la o structură asemănătoare faianței;\n- e) amestec bine omogenizat de liant, pietriș și apă care după întărire ajunge la o structură asemănătoare betonului.\n**Răspuns: b**\n2) La prepararea mortarelor se folosesc:\n- a) var, ciment, ipsos, nisip, pietriș, apă și adaosuri;\n- b) var, ciment, ipsos, nisip, apă și adaosuri;\n- c) var, ciment, ipsos, nisip, mărgăritar, apă și adaosuri;\n- d) var, ciment, ipsos, nisip, pietriș, bolovani și apă;\n- e) var, ciment, ipsos, nisip, macadam și apă.\n**Răspuns: b**\n3) La prepararea mortarelor se utilizează următorii aditivi:\n- a) aditivi plastificanți;\n- b) adaosuri hidraulice;\n- c) coloranți;\n- d) aceleratori și întârzieri de priză;\n- e) adaosuri impermeabilizatoare.\n**Răspuns: a,c,d**\n4) Mortarele pot fi utilizate la:\n- a) executarea zidăriilor;\n- b) turnarea stâlpilor și grinzilor;\n- c) executarea tencuielilor;\n- d) impermeabilizarea unor suprafețe;\n- e) protecția antiacidă, izolarea termică și fonică.\n**Răspuns: a,c,d,e**\n5) După domeniul de utilizare mortarele sunt:\n- a) mortare obișnuite de zidărie și tencuieli;\n- b) mortare obișnuite pentru stâlpi și grinzi;\n- c) mortare speciale pentru tencuieli decorative, anticorozive, refractare, de rezistență și hidrofuge;\n- d) mortare speciale de zidărie și tencuieli;\n- e) mortare speciale pentru plăci și pereți.\n**Răspuns: a,c,d**\n### Clasificarea Mortarelor\n12) După raportul liant/nisip, folosit la prepararea lor, mortarele sunt:\n- a) mortare slabe având raportul L/N=[1/5...1/7];\n- b) mortare simple având raportul L/N=[1/5...1/7];\n- c) mortare mijlocii având raportul L/N=[1/3...1/5];\n- d) mortare normale având raportul L/N=[1/3...1/5];\n- e) mortare grase având raportul L/N=[1/1...1/2].\n**Răspuns: a,c,e**\n13) După clasa, mortarele pot fi (rezistența la compresiune la 28 zile):\n- a) M4, M25, M50, M150;\n- b) M1Z, M2,5Z, M5Z, M10Z, M20Z;\n- c) M4, M10, M25, M50, M100, M150, M200;\n- d) M10, M25, M50, M100;\n- e) CSI; CSII; CSIII; CSIV.\n**Răspuns: b,e**\n14) Tipul de liant utilizat la prepararea mortarelor se alege în funcție de:\n- a) locul unde este amplasat obiectivul (sat, oraș);\n- b) mediul în care va fi utilizat (uscat sau umed);\n- c) destinația mortarului (zidărie, tencuială, special);\n- d) rezistențele mecanice necesare;\n- e) rezistențele chimice necesare.\n**Răspuns: b,c,d,e**\n15) Pentru lucrări de calitate liantul trebuie să îndeplinească următoarele condiții:\n- a) varul să nu conțină părți nestinse;\n- b) varul să nu conțină părți de Ca(OH) ca gel;\n- c) ipsosul să nu conțină granule de ghips;\n- d) ipsosul va fi utilizat numai în mediul uscat;\n- e) cimentul va fi utilizat de obicei în amestec cu ipsos pentru o priză mai bună.\n**Răspuns: a,d**\n16) Nisipul utilizat la prepararea mortarelor trebuie să:\n- a) aibă curba granulometrică corespunzătoare;\n- b) să nu conțină humus, mică, săruri solubile, cărbuni;\n- c) fie monogranular;\n- d) conțină granule aciculare;\n- e) nu conțină granule aciculare.\n**Răspuns: a,b,e**\n### Prepararea și Proprietățile Mortarelor\n17) La înfoierea nisipului:\n- a) volumul în grămadă crește;\n- b) densitatea în grămadă în stare afânată crește;\n- c) volumul de goluri scade;\n- d) volumul lui scade;\n- e) densitatea în grămadă în stare afânată scade.\n**Răspuns: a,e**\n18) La prepararea mortarelor se poate utiliza:\n- a) apă potabilă;\n- b) apă din lac sau râu;\n- c) ape minerale neutre față de hârtia de turnesol (neutre, slab alcaline, slab acide);\n- d) apă de mare neutre față de hârtia de turnesol (neutre, slab alcaline, slab acide);\n- e) apă de mare.\n**Răspuns: a,b,c,d**\n19) După gradul de finisare tencuielile pot fi:\n- a) brute;\n- b) drișcuite;\n- c) gletuite;\n- d) sclivisite;\n- e) decorative.\n**Răspuns: a,b,c,d,e**\n20) Practic, rețeta unui mortar se stabilește prin:\n- a) utilizarea rezultatelor stabilite;\n- b) utilizarea experienței în domeniul dulgherului;\n- c) utilizarea tablelor;\n- d) utilizarea diagramelor nisip/ciment/apă;\n- e) utilizarea curbei granulometrice la pietriș.\n**Răspuns: c**\n### Prepararea Mortarelor\n21) Mortarele de ipsos se prepară:\n- a) mecanic în malaxoare sau betoniere introducerea componentelor făcându-se în ordinea: apă (lapte de var), ciment, nisip, și restul apei (lapte de var) până la consistența dorită;\n- b) mecanic în malaxoare sau betoniere introducerea componentelor făcându-se în ordinea: ciment, nisip, apă (lapte de var);\n- c) mecanic în malaxoare sau betoniere introducerea componentelor făcându-se în ordinea: nisip, ciment, apă (lapte de var);\n- d) manual, introducându-se apă peste ipsos;\n- e) manual, introducându-se ipsos în apă numai atât cât poare fi pus în operă până la începutul prizei.\n**Răspuns: e**\n22) Prepararea mortarelor pe bază de ciment se face:\n- a) mecanic în malaxoare sau betoniere, introducerea componentelor făcându-se în ordinea: lapte de var, ciment, nisip;\n- b) mecanic în malaxoare sau betoniere, introducerea componentelor făcându-se în ordinea: ciment, nisip, apă (lapte de var);\n- c) mecanic în malaxoare sau betoniere, introducerea componentelor făcându-se în ordinea: nisip, ciment, apă (lapte de var);\n- d) manual, introducându-se apă peste ipsos în orice cantitate;\n- e) manual, introducându-se ipsos în apă numai atât cât poare fi pus în operă până la începutul prizei.\n**Răspuns: c**\n23) Înainte de punerea în operă mortarul va fi obligatoriu:\n- a) verificat dacă corespunde rețetei;\n- b) reamestecat până la omogenizare;\n- c) reamestecat pentru eliminarea apei;\n- d) reamestecat pentru a elimina tendința de segregare;\n- e) verificat dacă are suficient liant.\n**Răspuns: b,d**\n24) Manual mortarele de ciment se prepară:\n- a) pe pământ, ordinea de punere pe platformă fiind: ciment, apă, var, nisip;\n- b) pe o platformă de lemn sau beton, ordinea de punere pe platformă fiind: apă, var, ciment, nisip;\n- c) pe o platformă de lemn sau beton, ordinea de punere pe platformă fiind: nisip, var, apă, ciment;\n- d) pe o platformă de lemn sau beton, ordinea de punere pe platformă fiind: nisip, ciment, apă, var;\n- e) pe o platformă de lemn sau beton, ordinea de punere pe platformă fiind: nisip, ciment, lapte de var și apă.\n**Răspuns: e**\n25) Mortarele de var se prepară:\n- a) în găleți;\n- b) în lăzi de lemn;\n- c) pe platforme betonate;\n- d) pe o platformă de lemn;\n- e) pe o platformă de lemn sau beton.\n**Răspuns: b**\n### Straturile Tencuielilor\n26) O tencuială pe un perete de beton este alcătuită din următoarele straturi:\n- a) șpriț;\n- b) grund;\n- c) tinci;\n- d) șmir;\n- e) glet.\n**Răspuns: a,b,c**\n27) Stratul de tencuială care asigură legătura dintre stratul suport din beton și tencuială propriu-zisă se numește:\n- a) șpriț;\n- b) grund;\n- c) tinci;\n- d) șmir;\n- e) glet.\n**Răspuns: a**\n28) Stratul care asigură eliminarea denivelărilor grosiere având grosimea 8-20 mm, executat din mortar vârtos-plastic, se numește:\n- a) șpriț;\n- b) grund;\n- c) tinci;\n- d) șmir;\n- e) glet.\n**Răspuns: b**\n29) Stratul care asigură planeitatea finală a tencuieli, având grosimea de maxim 5 mm, realizat cu un nisip 0-1, se numește:\n- a) șpriț;\n- b) grund;\n- c) tinci;\n- d) șmir;\n- e) glet.\n**Răspuns: c**\n30) Primul strat la tencuieli pe rabiț, realizat din mortar de ipsos, având rolul de a ancora tencuiala în plasă, se numește:\n- a) șpriț;\n- b) grund;\n- c) tinci;\n- d) șmir;\n- e) glet.\n**Răspuns: d**\n31) Stratul suport pentru vopsitoriile în ulei, se numește:\n- a) șpriț;\n- b) grund;\n- c) tinci;\n- d) șmir;\n- e) glet.\n**Răspuns: e**\n### Tipuri de Tencuieli\n32) Tencuiala brută este alcătuită din următoarele straturi:\n- a) șpriț, grund, tinci;\n- b) șpriț, grund, tinci, glet;\n- c) grund-strat de 2 cm grosime;\n- d) șmir, grund, tinci;\n- e) grund, tinci.\n**Răspuns: c**\n33) Tencuiala pe zidăria de cărămidă este alcătuită din următoarele straturi:\n- a) șpriț, grund, tinci;\n- b) grund, tinci, glet;\n- c) grund-strat de 2 cm grosime;\n- d) șmir, grund, tinci;\n- e) grund, tinci.\n**Răspuns: b,e**\n34) Tencuiala pe beton este alcătuită din următoarele straturi:\n- a) șpriț, grund, tinci;\n- b) șpriț, grund, tinci, glet;\n- c) grund-strat de 2 cm grosime;\n- d) șmir, grund, tinci;\n- e) grund, tinci.\n**Răspuns: a,b**\n35) Tencuiala pe beton în mediul umed sau care trebuie vopsită în ulei are următoarele straturi:\n- a) șpriț, grund, scliviseală;\n- b) șpriț, grund, tinci, glet;\n- c) grund-strat de 2 cm grosime;\n- d) șmir, grund, tinci;\n- e) grund, tinci.\n**Răspuns: a,b**\n36) Tencuielile pe rabiț au următoarele straturi:\n- a) șpriț, grund, tinci;\n- b) șpriț, grund, tinci, glet;\n- c) grund-strat de 2 cm grosime;\n- d) șmir, grund, tinci;\n- e) șmir, grund, tinci și glet.\n**Răspuns: d,e**\n37) Cele mai frecvente tencuieli decorative sunt:\n- a) tencuieli cu praf de piatră;\n- b) tencuieli cu ipsos;\n- c) tencuieli cu mozaic;\n- d) tencuieli cu humus;\n- e) tencuieli colorate.\n**Răspuns: a,e**\n### Defecte și Proprietăți ale Mortarelor\n38) Defectele în tencuieli sunt:\n- a) împușcăturile;\n- b) crăpăturile;\n- c) decolorarea;\n- d) eflorescențele;\n- e) grosimi neuniforme.\n**Răspuns: a,b,d**\n39) Consistența mortarelor se determină cu:\n- a) vasul cilindric având înălțimea de 30cm;\n- b) conul etalon;\n- c) aparatul Fruhling-Michaels\n- d) presa hidraulică;\n- e) cu aparatul cu strat absorbant.\n**Răspuns: b**\n40) Tendința de segregare a mortarelor se determină cu:\n- a) vasul cilindric având înălțimea de 30cm;\n- b) conul etalon;\n- c) aparatul Fruhling-Michaels;\n- d) presa hidraulică;\n- e) cu aparatul cu strat absorbant.\n**Răspuns: a**\n41) Capacitatea de reținere a apei la mortare se determină cu:\n- a) vasul cilindric având înălțimea de 30cm;\n- b) conul etalon;\n- c) aparatul Fruhling-Michaels;\n- d) presa hidraulică;\n- e) cu aparatul cu strat absorbant.\n**Răspuns: e**\n42) Rezistența la întindere din încovoiere a mortarelor se determină cu:\n- a) vasul cilindric având înălțimea de 30cm;\n- b) conul etalon;\n- c) aparatul Fruhling-Michaels;\n- d) masa vibrantă;\n- e) cu aparatul cu strat absorbant.\n**Răspuns: c**\n43) Rezistența la compresiune a mortarelor se determină cu:\n- a) vasul cilindric având înălțimea de 30cm;\n- b) conul etalon;\n- c) aparatul Fruhling-Michaels;\n- d) presa hidraulică;\n- e) cu aparatul cu strat absorbant.\n**Răspuns: d**\n### Proprietăți Mecanice ale Mortarelor\n44) Tendința de segregare a mortarului este:\n- a) rezistența lui la compresiune;\n- b) rezistența lui la întindere din încovoiere;\n- c) densitatea lui în stare vibrantă;\n- d) proprietatea lui de a se separa în părțile componente;\n- e) densitatea lui aparentă în stare întărită.\n**Răspuns: d**\n45) Proprietatea mortarului determinată pe resturi de prismă 4 x 4 x 16 cm este:\n- a) rezistența la compresiune;\n- b) rezistența la întindere din încovoiere;\n- c) densitatea în stare presată;\n- d) proprietatea de a se separa în părțile componente;\n- e) densitatea aparentă în stare întărită.\n**Răspuns: a**\n46) Proprietatea mortarului determinată pe prisme 4 x 4 x 16 cm este:\n- a) rezistența la compresiune;\n- b) rezistența la întindere din încovoiere;\n- c) densitatea în stare compactată;\n- d) proprietatea de a se separa în părțile componente;\n- e) densitatea lui aparentă în stare întărită.\n**Răspuns: b**\n47) Proprietatea mortarului determinată cu formula ... = (mpils - mvas)/Vvas este:\n- a) rezistența la compresiune;\n- b) rezistența la întindere din încovoiere;\n- c) densitatea în stare proaspătă;\n- d) proprietatea de a se separa în părțile componente;\n- e) densitatea aparentă în stare întărită.\n**Răspuns: c**\n## 8. Betonul cu lianți anorganici\n### Definiții și Clasificări\n1) Betonul întărit este un material de construcție alcătuit din:\n- a) agregat, liant, apă;\n- b) agregat, liant, aer, apă;\n- c) agregat, liant, apă și aditivi;\n- d) piatra de ciment, agregate, bitum;\n- e) agregat, liant, apă, aer și aditivi.\n**Răspuns: a**\n2) Betonul proaspăt este un material de construcție alcătuit din:\n- a) agregat, liant, apă, var;\n- b) nisip, liant, aer, apă;\n- c) nisip, liant, apă și aditivi;\n- d) nisip, liant, aer și aditivi;\n- e) agregat, liant, apă.\n**Răspuns: e**\n3) Scheletul rigid al betonului este dat de:\n- a) piatra de ciment;\n- b) piatra de ciment și agregat;\n- c) agregate;\n- d) liantul amestecat cu apă și întărit;\n- e) agregatul amestecat cu liant.\n**Răspuns: c**\n4) Avantajele utilizării betonului în construcții sunt:\n- a) preț de cost redus;\n- b) întărire rapidă;\n- c) utilizează materiale locale;\n- d) se pot turnă elemente având formele dorite;\n- e) se comportă foarte bine la compresiune.\n**Răspuns: a,c,d,e**\n5) Dezavantajele utilizării betonului în construcții sunt:\n- a) preț de cost mare față de metal;\n- b) preț de cost mic față de lemn;\n- c) greutate mare a elementelor realizate din beton față de cele din lemn și metal;\n- d) greutate mică a elementelor realizate din beton față de cele din lemn și metal;\n- e) timpul lung până pot fi decofrate.\n**Răspuns: c,e**\n### Tipuri de Beton\n6) Betonul simplu întărit este:\n- a) amestec compozit alcătuit din agregat, liant, apă cu structură rigidă;\n- b) amestec de agregat și piatră de ciment cu structură rigidă;\n- c) amestec de apă, liant, agregat eventual aditivi, din momentul amestecării componentelor până în momentul începerii prizei liantului;\n- d) amestec de agregat, piatră de ciment, armătură cu structură rigidă;\n- e) amestec de apă, liant, agregat, armătură eventual aditivi din momentul amestecării.\n**Răspuns: b**\n7) Betonul armat este:\n- a) amestec compozit alcătuit din agregat, liant, apă cu structură rigidă;\n- b) amestec bine omogenizat alcătuit din agregat și piatră de ciment cu structură rigidă;\n- c) amestec de apă, liant, agregat eventual aditivi, din momentul amestecării componentelor până în momentul începerii prizei liantului;\n- d) amestec de agregat, piatră de ciment, armătură având o structură rigidă;\n- e) amestec de apă, liant, nisip, armătură eventual aditivi din momentul amestecării.\n**Răspuns: d**\n8) Lucrabilitatea este proprietatea betonului definită ca:\n- a) ușurința cu care se pune în operă betonul;\n- b) mobilitatea unui beton proaspăt sub acțiunea masei proprii sau a unor forțe exterioare care acționează asupra lui;\n- c) creșterea înălțimii grămezii de beton sub formă de trunchi de con sub masă proprie;\n- d) creșterea volumului betonului sub acțiunea unor șocuri;\n- e) timpul în care betonul deformat revine la forma inițială.\n**Răspuns: a**\n9) Tasarea este proprietatea betonului definită ca:\n- a) ușurința cu care se pune în operă betonul;\n- b) mobilitatea unui beton proaspăt sub acțiunea masei proprii sau a unor forțe exterioare care acționează asupra lui;\n- c) micșorarea înălțimii grămezii de beton proaspăt sub formă de trunchi de con sub masă proprie;\n- d) micșorarea volumului betonului sub acțiunea unor șocuri;\n- e) timpul în care betonul deformat revine la forma inițială.\n**Răspuns: c**\n10) Gradul de compactare este proprietatea betonului definită ca:\n- a) ușurința cu care se pune în operă betonul;\n- b) mobilitatea unui beton proaspăt sub acțiunea masei proprii sau a unor forțe exterioare care acționează asupra lui;\n- c) micșorarea înălțimii grămezii de beton sub formă de trunchi de con sub masă proprie;\n- d) micșorarea volumului betonului sub acțiunea unor șocuri;\n- e) timpul în care betonul deformat revine la forma inițială.\n**Răspuns: d**\n### Proprietăți ale Betonului\n11) Remodelarea este proprietatea betonului definită ca:\n- a) ușurința cu care se pune în operă betonul;\n- b) mobilitatea unui beton proaspăt sub acțiunea masei proprii sau a unor forțe exterioare care acționează asupra lui;\n- c) micșorarea înălțimii grămezii de beton sub formă de trunchi de con sub masă proprie;\n- d) micșorarea volumului betonului sub acțiunea unor șocuri;\n- e) timpul în care betonul deformat revine la forma inițială sub acțiunea vibrațiilor.\n**Răspuns: e**\n12) Notațiile următoare P40; P80; P420; P820 și P1220 se referă la:\n- a) rezistența la compresiune a betonului;\n- b) rezistența la îngheț-dezgheț a betonului;\n- c) permeabilitatea betonului;\n- d) penetrarea betonului;\n- e) densitatea aparentă a betonului.\n**Răspuns: c**\n13) Notațiile: C8/10 ; C25/30 și C50/60 se referă la:\n- a) rezistența la compresiune a betonului;\n- b) rezistența la îngheț-dezgheț a betonului;\n- c) permeabilitatea betonului;\n- d) penetrarea betonului;\n- e) densitatea aparentă a betonului.\n**Răspuns: a**\n14) Notațiile: G25 ; G50 și G100 se referă la:\n- a) rezistența la compresiune a betonului;\n- b) rezistența la îngheț-dezgheț a betonului;\n- c) permeabilitatea betonului;\n- d) penetrarea betonului;\n- e) densitatea aparentă a betonului.\n**Răspuns: b**\n15) Valorile: 2000 kg/m³; 2500 kg/m³ și 1800 kg/m³ reprezintă:\n- a) rezistența la compresiune a betonului;\n- b) rezistența la îngheț-dezgheț a betonului;\n- c) permeabilitatea betonului;\n- d) penetrarea betonului;\n- e) densitatea aparentă a betonului.\n**Răspuns: e**\n### Clasificarea Betonului\n16) Rezistența medie la compresiune la 28 de zile determinată pe cuburi cu latura de 200 mm în daN/cm² se numește:\n- a) clasa betonului (S.R.);\n- b) clasa betonului (STAS);\n- c) duritatea betonului;\n- d) marca betonului;\n- e) omogenitatea betonului.\n**Răspuns: d**\n17) Rezistența minimă la compresiune la 28 zile determinată pe cuburi cu latura de 141 mm sub a cărui valoare nu pot fi mai mult de 5% din rezistențele la compresiune determinate exprimată în N/mm² este:\n- a) clasa betonului (S.R);\n- b) clasa betonului (STAS);\n- c) duritatea betonului;\n- d) marca betonului;\n- e) omogenitatea betonului.\n**Răspuns: b**\n18) Rezistența minimă la compresiune la 28 zile determinată pe cilindru 150/300 mm sau cuburi cu latura de 150 mm sub a cărui valoare nu pot fi mai mult de 5% din rezistențele la compresiune determinate exprimată în N/mm² este:\n- a) clasa betonului (S.R);\n- b) clasa betonului (STAS);\n- c) duritatea betonului;\n- d) marca betonului;\n- e) omogenitatea betonului.\n**Răspuns: a**\n### Factori de Influiență în Prepararea Betonului\n19) La alegerea tipului de liant se ține seama de:\n- a) clasa betonului;\n- b) viteza de întărire a betonului;\n- c) condițiile de preparare, transport și punere în operă a betonului;\n- d) condițiile de exploatare a structurii care se realizează cu betonul;\n- e) cantitatea de beton necesară.\n**Răspuns: a,b,c,d**\n20) Raportul A/C la calculul rețetei de beton se alege funcție de:\n- a) clasa betonului;\n- b) tipul de ciment;\n- c) dimensiunea granulelor;\n- d) modalitatea de vibrare a betonului;\n- e) gradul de impermeabilitate impus prin proiect.\n**Răspuns: a,b**\n21) Dozajul de ciment este în funcție de:\n- a) clasa betonului;\n- b) dimensiunea granulelor;\n- c) condițiile de expunere;\n- d) condițiile de transport;\n- e) modalitatea de vibrare a betonului;\n**Răspuns: a,c**\n22) Cantitatea de apă de amestecare este funcție de:\n- a) consistența betonului impusă prin proiect;\n- b) dimensiunea maximă a granulei de agregat;\n- c) tipul de agregat utilizat;\n- d) existența aditivului (da sau nu);\n- e) tipul de liant utilizat.\n**Răspuns: a,b,c,d,e**\n### Dimensiuni și Granulozitate\n23) Dimensiunea maximă a granulei de agregat este funcție de:\n- a) tipul construcției;\n- b) consistența betonului;\n- c) dimensiunea minimă a elementului în care se toarnă betonul;\n- d) condițiile de preparare și transport;\n- e) distanța dintre armături.\n**Răspuns: c,e**\n24) Zona granulometrică a agregatului este determinată de:\n- a) tipul de impurități;\n- b) tipul liantului;\n- c) dozajul liantului;\n- d) clasa de tasare a betonului;\n- e) tehnologia de punere în operă a betonului:\n**Răspuns: c,d**\n### Aditivi și Adaosuri\n25) Aditivii sunt:\n- a) materiale omogene fine care se adaugă în beton pentru a-i îmbunătăți anumite proprietăți în proporție mai mare de 5% din cantitatea de liant;\n- b) materiale naturale, artificiale sub formă de granule poroase care au densitate în grămadă în stare afânată mai mică de 900 kg/m³;\n- c) materiale de construcții bogate în hidroxid de siliciu, solubil în soluții alcaline, întrebuințate ca adausuri hidraulice la fabricarea cimentului;\n- d) materiale granulare naturale sau artificiale sub formă de granule care au densitatea în grămadă în stare afânată mai mare de 2000 kg/m³;\n- e) produse chimice ce se adaugă în betoane în cantități mici, până la 5% din cantitatea de liant înainte sau în timpul amestecării lui în scopul modificării proprietăților betonului în stare proaspătă sau întărită.\n**Răspuns: e**\n26) Adaosurile sunt:\n- a) substanțe solide, insolubile în apă, care se adaugă în beton pentru a-i îmbunătăți anumite proprietăți în proporție mai mare de 5% din cantitatea de liant;\n- b) materiale naturale, artificiale sub formă de granule poroase care au densitate în grămadă în stare afânată mai mică de 900 kg/m³;\n- c) materiale de construcții bogate în hidroxid de siliciu, solubil în soluții alcaline, întrebuințate ca adausuri hidraulice la fabricarea cimentului;\n- d) materiale granulare naturale sau artificiale sub formă de granule care au densitatea în grămadă în stare afânată mai mare de 2000 kg/m³;\n- e) produse chimice ce se adaugă în betoane în cantități mici, până la 5% din cantitatea de liant înainte sau în timpul amestecării lui în scopul modificării proprietăților betonului în stare proaspătă sau întărită.\n**Răspuns: a**\n27) Agregatele ușoare sunt:\n- a) materiale omogene fine care se adaugă în beton pentru a-i îmbunătăți anumite proprietăți în proporție mai mare de 5% din cantitatea de liant;\n- b) materiale naturale, artificiale sub formă de granule poroase care au densitate în grămadă în stare afânată mai mică de 1200 kg/m³;\n- c) materiale de construcții bogate în hidroxid de siliciu, solubil în soluții alcaline, întrebuințate ca adausuri hidraulice la fabricarea cimentului;\n- d) materiale granulare naturale sau artificiale sub formă de granule care au densitatea în grămadă în stare afânată mai mare de 2000 kg/m³;\n- e) produse chimice ce se adaugă în betoane în cantități mici, până la 5% din cantitatea de liant înainte sau în timpul amestecării lui în scopul modificării proprietăților betonului în stare proaspătă sau întărită.\n**Răspuns: b**\n28) Agregatele grele sunt:\n- a) materiale omogene fine care se adaugă în beton pentru a-i îmbunătăți anumite proprietăți în proporție mai mare de 5% din cantitatea de liant;\n- b) materiale naturale, artificiale sub formă de granule poroase care au densitate în grămadă în stare afânată mai mică de 900 kg/m³;\n- c) materiale de construcții bogate în hidroxid de siliciu, solubil în soluții alcaline, întrebuințate ca adausuri hidraulice la fabricarea cimentului;\n- d) materiale granulare naturale sau artificiale sub formă de granule care au densitatea în grămadă în stare afânată mai mare de 1200 kg/m³;\n- e) produse chimice ce se adaugă în betoane în cantități mici, până la 5% din cantitatea de liant în scopul modificării proprietăților betonului.\n**Răspuns: d**\n### Rolul Aditivilor și Adaosurilor\n29) Aditivii utilizați la betoane sunt:\n- a) organici și anorganici;\n- b) electrolitii și plastifianti;\n- c) inerți și activi;\n- d) întârzietori de priză;\n- e) acceleratori de priză.\n**Răspuns: a,d,e**\n30) Aditivii utilizați la prepararea betonului au rolul de a:\n- a) accelera priza liantului;\n- b) accelera întărirea betonului;\n- c) mări gelivitatea și impermeabilitatea betonului;\n- d) îmbunătăți lucrabilitatea betonului;\n- e) îmbunătăți rezistența la agresivitate chimică a betonului;\n**Răspuns: a,b,c,d,e**\n31) Adaosurile utilizate la prepararea betonului sunt:\n- a) insolubile în apă;\n- b) electrolite și plastifiante;\n- c) inerte și/sau activ-hidraulice;\n- d) întârzietoare de priză;\n- e) acceleratoare de priză.\n**Răspuns: a,c**\n32) Rolul adaosurilor la prepararea betoanelor este:\n- a) de a accelera priza liantului;\n- b) de a îmbunătăți proprietățile betonului;\n- c) de a mări compactitatea betonului;\n- d) de a îmbunătăți lucrabilitatea betonului;\n- e) de a îmbunătăți rezistența la agresivitate chimică a betonului;\n**Răspuns: b,c,d,e**\n### Punerea în Operă a Betonului\n33) Betonul se poate pune în operă (după modul de turnare):\n- a) normal;\n- b) prin injectare;\n- c) prin pompare;\n- d) prin turnare sub apă;\n- e) prin autoclavizare.\n**Răspuns: a,b,c,d**\n34) Compactarea betonului se face prin:\n- a) compactare manuală;\n- b) vibrare;\n- c) vacuumare;\n- d) supervibrare;\n- e) torcretare.\n**Răspuns: a,b,c,e**\n### Condiții de Întărire\n35) Mediul exterior influențează proprietățile betonului prin:\n- a) umiditate;\n- b) capilaritate;\n- c) temperatură;\n- d) permeabilitate;\n- e) absorbție.\n**Răspuns: a,c**\n36) Pentru a preîntâmpina pierderea masivă a apei în primele 7-14 zile betonul va fi:\n- a) acoperit cu folie de aluminiu;\n- b) acoperit cu rogojini;\n- c) acoperit cu folie de polietilenă;\n- d) stropit cât se poate de des cu jet de apă;\n- e) protejat prin împrăștierea pe suprafața lui a unor substanțe hidrofobe.\n**Răspuns: b,c,e**\n37) Condițiile ideale pentru întărirea betonului sunt între temperaturile:\n- a) -4°C și +4°C;\n- b) -4°C și 0°C;\n- c) 0°C și 20°C;\n- d) +5°C și 20°C;\n- e) 0°C și 10°C.\n**Răspuns: d**\n### Tratamente Termice\n38) Turnarea betonului pe timp friguros se face luând următoarele măsuri:\n- a) se încălzesc agregatele și apa;\n- b) se adaugă până la 5% din cantitatea de liant un accelerator de priză;\n- c) se adaugă ipsos pentru a accelera întărirea;\n- d) se încălzesc cofrajele;\n- e) se înfășoară elementele turnate în elemente termoizolante minim 3 zile.\n**Răspuns: a,b,d,e**\n39) Influența acțiunii umidității mari, concomitent cu temperaturi ridicate, la presiune constantă, are asupra betonului un efect:\n- a) benefic prin creșterea timpului de decofrare;\n- b) distructiv prin reducerea timpului de decofrare;\n- c) benefic prin creșterea compactității;\n- d) benefic prin reducerea timpului de decofrare;\n- e) de reducere a rezistențelor mecanice finale față de betonul întărit normal.\n**Răspuns: d,e**\n40) Supunerea elementelor de beton la acțiunea simultană a temperaturilor și umidităților ridicate, la presiune constantă, poate fi numită:\n- a) tratament termic;\n- b) tratament baric;\n- c) tratament chimic la umiditate mare;\n- d) aburire;\n- e) autoclavizare.\n**Răspuns: a,d**\n41) Aburirea este tratamentul termic de:\n- a) supunere a betonului la presiune normală, umiditate 90 – 95% și o temperatură de 80 – 90°C;\n- b) supunere a betonului la presiune de 1,5 atm, umiditate 90 – 95% și o temperatură de 100 – 120°C;\n- c) supunere a betonului la acțiunea unor aburi suprasaturați la presiunea de 4 – 8 atm. și la o temperatură de 150 – 180°C;\n- d) supunere a betonului la acțiunea unor aburi suprasaturați la presiunea de 8 – 12 atm. și la o temperatură de 120 – 150°C;\n- e) supunere a betonului la cicluri repetate de îngheț-dezgheț.\n**Răspuns: a**\n42) Autoclavizarea este tratamentul termic de:\n- a) supunere a betonului la presiune normală, umiditate 90 – 95% și o temperatură de 80 – 90°C;\n- b) supunere a betonului la presiune de 1,5 atm, umiditate 90 – 95% și o temperatură de 100 – 120°C;\n- c) supunere a betonului la acțiunea unor aburi suprasaturați la presiunea de 4 – 8 atm. și la o temperatură de 150 – 180°C;\n- d) supunere a betonului la acțiunea unor aburi suprasaturați la presiunea de 2 – 12 atm. și la o temperatură de 120 – 190°C;\n- e) supunere a betonului la acțiunea unor aburi suprasaturați la presiunea de 2 – 4 atm. și la o temperatură de 150 – 180°C.\n**Răspuns: d**\n### Efectele Tratamentelor Termice\n43) Aburirea:\n- a) reduce timpul de decofrare;\n- b) reduce rezistentele mecanice finale;\n- c) crește rezistentele mecanice finale;\n- d) duce la o întărire rapidă a betonului;\n- e) este bine să înceapă după zece ore de la turnare.\n**Răspuns: a,b,d**\n44) Vacumarea:\n- a) duce la o întărire mai rapidă a betonului;\n- b) reduce raportul A/C;\n- c) crește rezistentele mecanice finale;\n- d) crește rezistența la gelivitate;\n- e) scade permeabilitatea.\n**Răspuns: a,b,c,d,e**\n### Tipuri Speciale de Beton\n45) Betoanele de mare rezistență se obțin utilizând:\n- a) cimenturi de clasă normală;\n- b) dozaj sporit de ciment portland fără adaosuri;\n- c) raportul A/C redus;\n- d) agregate de concasaj;\n- e) agregate de râu.\n**Răspuns: b,c,d**\n46) Betoanele de mare rezistență:\n- a) au clasa mai mare de 40 N/mm²;\n- b) se utilizează la clădiri cu deschideri mari;\n- c) se utilizează la realizarea elementelor de dimensiuni mici;\n- d) au o rezistență foarte bună la transfer termic;\n- e) sunt bune izolatoare fonice.\n**Răspuns: a,b**\n47) Betoanele hidrotehnice sunt betoane care:\n- a) au zone aflate permanent în contact cu apa;\n- b) au zone aflate periodic în contact cu apa;\n- c) rezistă la îngheț-dezgheț;\n- d) prezintă fenomenul de umflare;\n- e) rezistă la acțiunea corozivă a apelor.\n**Răspuns: a,b,c,e**\n48) Betoanele hidrotehnice se:\n- a) obțin prin utilizarea lianților speciali;\n- b) obțin prin utilizarea de agregate speciale rezistente la apă;\n- c) obțin utilizând adausuri hidrofobe;\n- d) utilizează la realizarea rezervoarelor de mare capacitate pentru cereale;\n- e) utilizează la construcția de baraje.\n**Răspuns: e**\n### Betoane Rutiere și Antiacide\n49) Betoanele rutiere:\n- a) se obțin utilizând un agregat cu o curbă granulometrică bună, cimenturi normale, raport A/C sub 0,30 și aditivi DISAN sub 5% din cantitatea de liant;\n- b) se obțin utilizând un agregat cu o curbă granulometrică bună, cimenturi normale, un raport A/C sub 0,30;\n- c) se utilizează la realizarea stratului de rezistență și de uzură la drumuri;\n- d) se utilizează la realizarea platformelor de orice fel, a pistelor de aerodromuri, a pistelor de încercare;\n- e) se utilizează la construcții hidrotehnice.\n**Răspuns: c,d**\n50) Betoanele antiacide:\n- a) rezistă la acțiunea mediilor cu agresivitate chimică;\n- b) rezistă la acțiunea agenților cu agresivitate eoliană;\n- c) folosesc lianți pe bază de sticlă solubilă;\n- d) folosesc ca liant cimentul de clasă superioară;\n- e) folosesc agregate-roci rezistente la agenți chimici.\n**Răspuns: a,c,e**\n### Betoane Ușoare și Refractare\n51) Betoanele ușoare:\n- a) au densitatea aparentă < 2000 kg/m³;\n- b) au capacitate de izolare termică și fonică scăzută;\n- c) au capacitate de izolare termică și fonică ridicată;\n- d) au rezistență la foc sporită în comparație cu betoanele grele;\n- e) se obțin amestecând ciment, fibre de azbest și apă.\n**Răspuns: a,c,d**\n52) Betoanele rezistente la temperaturi înalte sunt:\n- a) betoane slab termorezistente – refractaritatea < 1200°C utilizate între 200 –1100°C;\n- b) betoane termorezistente – refractaritatea < 1500 °C utilizate între 200–1100°C;\n- c) betoane refractare cu refractaritatea cuprinsă între 1500 °C și 1790 °C utilizate între 1100 – 1300 °C;\n- d) betoane foarte refractare cu refractaritatea > 1790 °C utilizate la temperaturi > 1300 °C;\n- e) betoane multi refractare cu refractaritatea > 1500 °C utilizate la temperaturi > 1100 °C.\n**Răspuns: b,c,d**\n53) Betoanele refractare:\n- a) se obțin utilizând lianți speciali pe bază de ciment belitic;\n- b) se obțin utilizând lianți speciali pe bază de ciment aluminos;\n- c) utilizând ca agregate: granulit, bazalt, mozaic de marmură etc.;\n- d) utilizând ca agregate: șamotă, minereu de crom, bauxite albe etc.;\n- e) se utilizează ca înlocuitor pentru produsele ceramice la căptușirea cuptoarelor, coșurilor de fum etc.\n**Răspuns: b,d,e**\n### Betoane Decorative și de Protecție\n54) Betoanele decorative:\n- a) sunt utilizate pentru realizarea elementelor din beton aparent;\n- b) sunt utilizate pentru obținerea unor efecte arhitecturale deosebite;\n- c) sunt utilizate pentru prețul de cost redus;\n- d) pot fi colorate;\n- e) pot avea fața văzută netedă sau în relief.\n**Răspuns: a,b,d,e**\n55) Azbocimentul:\n- a) se obține amestecând ciment, aracet și apă;\n- b) se obține amestecând ciment, fibre de azbest și apă;\n- c) se folosește pentru învelitori;\n- d) se toarnă în tipare plane și ondulate;\n- e) se folosește sub formă de pereți termoizolatori.\n**Răspuns: b,c,d,e**\n56) Avantajele utilizării azbocimentului sunt:\n- a) greutate redusă a elementelor de învelitori;\n- b) izolare fonică foarte bună;\n- c) durabilitate mare;\n- d) rezistența la foc bună;\n- e) manoperă de montare și întreținere redusă.\n**Răspuns: a,c,d,e**\n57) Betoanele de protecție împotriva radiațiilor:\n- a) trebuie să aibă o densitate mai mare de 3000 kg/m³;\n- b) se obțin cu dozaje mari de ciment;\n- c) se obțin cu agregate de concasaj provenite din roci foarte grele;\n- d) se obțin cu raport A/C sub 0,25;\n- e) se obțin utilizând materiale radioactive.\n**Răspuns: b,c**\n### Betoane cu Polimeri\n58) Betoanele cu polimeri:\n- a) se utilizează la realizarea elementelor compacte și impermeabile;\n- b) se obțin din beton obișnuit la care porii sunt umpluți cu emulsii de polimeri prin adăugarea acestor emulsii în timpul preparării;\n- c) se obțin prin impregnarea betonului obișnuit cu var și polimerizarea lui în masa betonului;\n- d) se obțin din agregat, var, polimer și apă;\n- e) sunt foarte rezistente la temperaturi mari.\n**Răspuns: a,b**\n59) Betonul ușor se caracterizează prin:\n- a) au capacitate de izolare termică ridicată;\n- b) au rezistența la compresiune mai mare decât 100 N/mm²;\n- c) au capacitate de izolare fonică ridicată;\n- d) au densitatea aparentă mai mare decât 2500 kg/m³;\n- e) au densitatea aparentă mai mică decât 2000 kg/m³.\n**Răspuns: a,c,e**\n### Clasificarea Betoanelor Ușoare\n60) Betoanele ușoare, după natura agregatului folosit, pot fi:\n- a) gazobetoane;\n- b) minerale;\n- c) spumobetoane;\n- d) vegetale;\n- e) din polimeri.\n**Răspuns: b,d**\n61) După domeniul de utilizare betoanele ușoare sunt:\n- a) termorezistente de rezistență;\n- b) termoizolatoare;\n- c) termoizolatoare și de rezistență;\n- d) termorezistente de structură;\n- e) de rezistență.\n**Răspuns: b,c,e**\n62) Betoanele macroporoase:\n- a) se realizează cu agregate cu granulozitate continuă;\n- b) se realizează cu agregate cu granulozitate discontinuă;\n- c) se realizează cu agregate cu un dozaj de ciment de cel mult 300 kg/m³;\n- d) se realizează fără agregate fine;\n- e) se utilizează la realizarea șapelor termoizolante.\n**Răspuns: b,d,e**\n63) Betoanele celulare:\n- a) se obțin prin amestecarea într-un mortar de ciment a unor substanțe generatoare de spumă;\n- b) se obțin prin amestecarea într-un mortar de ciment a unor substanțe generatoare de lichide;\n- c) se obțin prin amestecarea într-un mortar de ciment a unor substanțe generatoare de gaz;\n- d) au o bună izolare termică și fonică;\n- e) se utilizează pentru obținerea unor elemente de zidărie.\n**Răspuns: a,c,d,e**\n### Produse din Beton\n64) Din beton simplu se fabrică următoarele produse:\n- a) plăci de pavaj, borduri de beton și tuburi pentru canalizare;\n- b) plăci și stâlpișori;\n- c) fâșii, panouri, grinzi și stâlpi pentru structuri de rezistență;\n- d) blocuri mici din beton pentru zidării;\n- e) plăci plane, plăci ondulate și tuburi pentru alimentări cu apă.\n**Răspuns: a,d**\n65) Din beton armat se fabrică următoarele produse:\n- a) plăci de pavaj, borduri de beton și tuburi pentru canalizare;\n- b) plăci și stâlpi pentru garduri;\n- c) fâșii, panouri, grinzi și stâlpi pentru structuri de rezistență;\n- d) blocuri mici din beton pentru zidării;\n- e) plăci plane, plăci ondulate și tuburi pentru alimentări cu apă sau canalizări nearmate.\n**Răspuns: b,c**\n66) Din beton armat cu fibre de azbest se fabrică următoarele produse:\n- a) plăci de pavaj, borduri de beton și tuburi pentru canalizare;\n- b) plăci și stâlpi pentru garduri;\n- c) fâșii, panouri, grinzi și stâlpi pentru structuri de rezistență;\n- d) blocuri mici din beton pentru zidări;\n- e) plăci plane, plăci ondulate și tuburi pentru alimentări cu apă sau canalizări nearmate.\n**Răspuns: e**\n### Determinări asupra Betonului\n67) Lucrabilitatea betoanelor se determină prin:\n- a) metoda tasării;\n- b) metoda picnometrului;\n- c) metoda răspândirii;\n- d) metoda sferturilor;\n- e) metoda volumului de lichid dislocuit.\n**Răspuns: a,c**\n68) Asupra betonului proaspăt se fac următoarele determinări:\n- a) lucrabilitatea;\n- b) densitatea aparentă;\n- c) compacticitatea;\n- d) rezistența la întindere prin încovoiere;\n- e) permeabilitatea.\n**Răspuns: a,b**\n69) Asupra betonului întărit se fac următoarele determinări:\n- a) lucrabilitatea;\n- b) densitatea aparentă;\n- c) compacticitatea;\n- d) rezistența la întindere prin încovoiere;\n- e) permeabilitate.\n**Răspuns: b,d,e**\n70) Rezistența la compresiune a betonului se determină pe:\n- a) prisme 10x10x55 cm;\n- b) cuburi cu latura de 15 cm;\n- c) cilindri cu diametrul 150 mm și h = 300 mm;\n- d) resturi de prisme;\n- e) prisme 4x4x16 cm.\n**Răspuns: b,c,d**\n71) Rezistența la întindere din încovoiere a betonului se determină pe:\n- a) prisme 10x10x55 cm;\n- b) cuburi cu latura de 15 cm;\n- c) cilindrii cu diametrul 150 mm și h = 300 mm;\n- d) resturi de prisme;\n- e) prisme 4x4x16 cm.\n**Răspuns: a**\n### Relații de Calcul\n72) Rezistența de compresiune a betonului se determină cu relația:\n- a) Rt = N/A\n- b) Rti = (3/2) * (P * l)/(b * h²)\n- c) Rc = P/A\n- d) Rc = A/N\n- e) Rti = M/W\n**Răspuns: c**\n73) Rezistența la întindere prin încovoiere a betonului se determină cu relația:\n- a) Rt = N/A\n- b) Rti = (3/2) * (P * l)/(b * h²)\n- c) Rc = P/A\n- d) Rc = N/A\n- e) Rti = M/W\n**Răspuns: b,e**\n74) Întotdeanuna rezistența la compresiune a betonului este mai ... ca și rezistența lui la întindere din încovoiere:\n- a) mică;\n- b) egală;\n- c) aproximativ egală;\n- d) mare;\n- e) nu se poate compara.\n**Răspuns: d**\n## 9. Produse ceramice și refractare\n### Definiții și Clasificări\n1) Materialele ceramice se obțin prin:\n- a) arderea bioxidului de siliciu fasonat în forme;\n- b) arderea calcarului fasonat în forme;\n- c) arderea calcarului cu ghips fasonat în forme;\n- d) arderea produselor din argilă fasonate în forme;\n- e) arderea argilei și calcarului fasonate în forme;\n**Răspuns: d**\n2) După gradul de prelucrare, produsele ceramice pot fi:\n- a) brute;\n- b) finite;\n- c) semifinite;\n- d) grosiere;\n- e) filiforme.\n**Răspuns: a,b,c**\n3) Faianțele sunt materiale ceramice:\n- a) brute, colorate și poroase;\n- b) fine, colorate și clincherizate;\n- c) finite, poroase, albe și/sau colorate;\n- d) fine, albe și poroase;\n- e) fine, albe și vitrificate.\n**Răspuns: c**\n4) Cărămizile sunt materiale ceramice:\n- a) brute, colorate și poroase;\n- b) fine, colorate și clincherizate;\n- c) fine, colorate și poroase;\n- d) fine, albe și poroase;\n- e) fine, albe și vitrificate.\n**Răspuns: a**\n5) Tuburile de drenaj sunt materiale ceramice:\n- a) brute, colorate și poroase;\n- b) fine, colorate și clincherizate;\n- c) fine, colorate și poroase;\n- d) fine, albe și poroase;\n- e) fine, albe și vitrificate.\n**Răspuns: a**\n6) Țiglele sunt materiale ceramice:\n- a) brute, colorate și poroase;\n- b) fine, colorate și clincherizate;\n- c) fine, colorate și poroase;\n- d) fine, albe și poroase;\n- e) fine, albe și vitrificate.\n**Răspuns: a**\n7) Materialele pentru învelitori sunt materiale ceramice:\n- a) brute, colorate și poroase;\n- b) fine, colorate și clincherizate;\n- c) fine, colorate și poroase;\n- d) fine, albe și poroase;\n- e) fine, albe și vitrificate.\n**Răspuns: a**\n8) Materialele refractare sunt produse ceramice:\n- a) brute, colorate și rezistente la temperaturi mai mari de 1580°C;\n- b) fine, colorate și clincherizate;\n- c) fine, colorate și poroase;\n- d) fine, albe și poroase;\n- e) fine, albe și compacte.\n**Răspuns: a**\n9) Porțelanul este un produs ceramic:\n- a) brute, colorate și poroase;\n- b) fine, colorate și clincherizate;\n- c) fine, colorate și poroase;\n- d) fine, albe și poroase;\n- e) finite, albe și vitrificate.\n**Răspuns: e**\n10) Obiectele sanitare sunt produse ceramice:\n- a) brute, colorate și poroase;\n- b) fine, colorate și clincherizate;\n- c) finite;\n- d) fine, albe și poroase;\n- e) fine, albe și vitrificate.\n**Răspuns: c**\n### Proprietăți și Clasificări\n11) Care este proprietatea argilei pe care se bazează fabricarea produselor ceramice:\n- a) absorbția de apă;\n- b) ductilitatea;\n- c) volumul de goluri;\n- d) elasticitatea;\n- e) plasticitatea.\n**Răspuns: e**\n12) În funcție de porozitate, produsele ceramice se numesc:\n- a) clincherizate (n < 8%);\n- b) topite (n < 8%);\n- c) vitrificate (n < 2%);\n- d) solidificate (n < 5%);\n- e) compacte (n < 4%).\n**Răspuns: a,c**\n13) În funcție de indicele de plasticitate argilele pot fi cu:\n- a) plasticitate superioară;\n- b) plasticitate medie;\n- c) plasticitate moderată;\n- d) plasticitate scăzută;\n- e) neplastice.\n**Răspuns: a,b,d,e**\n14) Temperatura de deformare a argilelor sub greutate proprie se numește:\n- a) punct de clincherizare;\n- b) punct de topire;\n- c) punct de refractaritate;\n- d) punct de vitrificare;\n- e) punct de fuzibilitate.\n**Răspuns: c**\n15) În funcție de punctul de refractaritate argilele sunt:\n- a) fuzibile;\n- b) clincherizate;\n- c) vitrificabile;\n- d) ductibile;\n- e) refractare.\n**Răspuns: a,c,e**\n### Materiale Auxiliare și Utilizări\n16) La fabricarea produselor ceramice se folosesc ca materiale auxiliare:\n- a) degresanți pentru reducerea plasticității și contractiei la uscare (nisip, etc.);\n- b) aglomeranți pentru mărirea plasticității (varul, gudronul, melasa etc.);\n- c) fondanți pentru a mări temperatura de vitrificare (feldspat, calcar, creta etc.);\n- d) fondanți pentru a reduce temperatura de vitrificare (feldspat, calcar, creta etc.);\n- e) adaosuri refractare pentru a ridica temperatura de topire a produselor refractare (cuarțul, cuarțitele).\n**Răspuns: a,b,d,e**\n17) Materialele ceramice utilizate la zidării sunt:\n- a) cărămizi pline, cărămizi cu goluri;\n- b) blocuri mici de beton;\n- c) blocuri ceramice pentru planșee;\n- d) cărămizi radiale pentru coșuri;\n- e) cărămizi pentru placaje.\n**Răspuns: a**\n18) Materialele ceramice pentru învelitori sunt:\n- a) țigle;\n- b) olane;\n- c) coame;\n- d) jgheaburi;\n- e) burlane.\n**Răspuns: a,b,c**\n19) Materialele ceramice pentru drenaj sunt:\n- a) tuburi de canalizare din beton;\n- b) tuburi de drenaj din beton;\n- c) tuburi de drenaj ceramice;\n- d) blocuri ceramice cu goluri orizontale;\n- e) blocuri ceramice cu lambă și uluc.\n**Răspuns: c**\n20) Materialele ceramice pentru planșee sunt:\n- a) cărămizi ceramice cu lambă și uluc;\n- b) blocuri ceramice cu nervuri dese din beton armat;\n- c) blocuri ceramice radiale;\n- d) blocuri ceramice pentru pardoseli;\n- e) blocuri ceramice pentru zidării.\n**Răspuns: b**\n### Utilizări Speciale\n21) Cărămizile de clincher din gresie ceramică se uti
